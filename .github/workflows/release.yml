name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Build HTML
        run: python build.py

      - name: Create ZIP
        run: zip -r design-system-${{ github.ref_name }}.zip design-system/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: design-system-${{ github.ref_name }}.zip
          generate_release_notes: true
