<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>김반장 3.0 Design System</title>
<style>
/*
 * Design Tokens — Color
 * ─────────────────────────────────────────────
 * Primitive (palette 50–950) → Semantic (surface/text/border/action/button)
 */

:root {

  /* ════════════════════════════════════════════
     PRIMITIVE
     팔레트별 원시값. 컴포넌트에서 직접 참조 금지.
  ════════════════════════════════════════════ */

  /* ── COLOR: GRAY ──────────────────────────
     중립 컬러. 텍스트·배경·테두리·구분선.
  ──────────────────────────────────────────*/
  --color-gray-0:    #ffffff;
  --color-gray-50:   #f4f5f6;
  --color-gray-100:  #e6e8ea;
  --color-gray-200:  #cdd1d5;
  --color-gray-300:  #b1b8be;
  --color-gray-400:  #8a949e;
  --color-gray-500:  #6d7882;   /* base */
  --color-gray-600:  #58616a;
  --color-gray-700:  #464c53;
  --color-gray-800:  #33363d;
  --color-gray-900:  #1e2124;
  --color-gray-950:  #131416;
  --color-gray-1000: #000000;

  /* ── COLOR: BLUE ──────────────────────────
     주요 브랜드 컬러.
     CTA 버튼, 링크, 포커스 링, 선택·활성 상태.
  ──────────────────────────────────────────*/
  --color-blue-50:  #eef4fc;
  --color-blue-100: #dce8f9;
  --color-blue-200: #b7d0f5;
  --color-blue-300: #8cb5f3;
  --color-blue-400: #4189f3;
  --color-blue-500: #166dee;   /* base */
  --color-blue-600: #115ac6;
  --color-blue-700: #114797;
  --color-blue-800: #113569;
  --color-blue-900: #0f2038;
  --color-blue-950: #0c1522;

  /* ── COLOR: CYAN ──────────────────────────
     보조 브랜드 컬러.
     정보성 배지, 보조 액션, 데이터 시각화 계열.
  ──────────────────────────────────────────*/
  --color-cyan-50:  #eef7fc;
  --color-cyan-100: #dceff9;
  --color-cyan-200: #b7e1f5;
  --color-cyan-300: #88d1f3;
  --color-cyan-400: #4bbaf2;
  --color-cyan-500: #1b9fe2;   /* base */
  --color-cyan-600: #007dbc;
  --color-cyan-700: #205889;
  --color-cyan-800: #0e3b63;
  --color-cyan-900: #082136;
  --color-cyan-950: #051421;

  /* ── COLOR: GREEN ─────────────────────────
     성공·긍정 상태.
     완료, 승인, 성공 메시지, 유효성 검사 통과.
  ──────────────────────────────────────────*/
  --color-green-50:  #f2fcf5;
  --color-green-100: #d9efe0;
  --color-green-200: #bde1c9;
  --color-green-300: #70cd8f;
  --color-green-400: #35a85d;
  --color-green-500: #0f8a38;   /* base */
  --color-green-600: #0f7230;
  --color-green-700: #0b5c26;
  --color-green-800: #09441d;
  --color-green-900: #062d14;
  --color-green-950: #041f0d;

  /* ── COLOR: ORANGE ────────────────────────
     경고·주의 상태.
     주의가 필요한 정보, 기한 임박, 권장 사항.
  ──────────────────────────────────────────*/
  --color-orange-50:  #fff8ef;
  --color-orange-100: #fff6e3;
  --color-orange-200: #ffe4c4;
  --color-orange-300: #ffce7b;
  --color-orange-400: #f39c39;
  --color-orange-500: #e76400;   /* base */
  --color-orange-600: #e74900;
  --color-orange-700: #a8531f;
  --color-orange-800: #6c3f0d;
  --color-orange-900: #492b08;
  --color-orange-950: #2f1c06;

  /* ── COLOR: RED ───────────────────────────
     오류·위험 상태.
     에러 메시지, 삭제 확인, 위험 액션.
  ──────────────────────────────────────────*/
  --color-red-50:  #fceeee;
  --color-red-100: #f9dcdc;
  --color-red-200: #f5b7b7;
  --color-red-300: #f38c8c;
  --color-red-400: #ff6161;
  --color-red-500: #ea1a1a;   /* base */
  --color-red-600: #bb2e2e;
  --color-red-700: #971111;
  --color-red-800: #740606;
  --color-red-900: #440404;
  --color-red-950: #2b0303;


  /* ════════════════════════════════════════════
     SEMANTIC
     Primitive를 참조해서 용도를 부여한다.
     컴포넌트에서 직접 참조한다.
  ════════════════════════════════════════════ */

  /* ── COLOR: SURFACE ───────────────────────*/
  --color-surface-base:           var(--color-gray-0);                                        /* 기본 페이지·컨테이너 배경 */
  --color-surface-subtle:         var(--color-gray-50);                                       /* 흰색이 아닌 메인 배경 (사이드바, 교차 행 등) */
  --color-surface-neutral:        var(--color-gray-100);                                      /* 연하지만 면이 구분되어야 하는 중립 배경 (뱃지, 테이블 헤더) */
  --color-surface-disabled:       var(--color-gray-100);                                      /* 비활성(disabled) 컴포넌트 배경 전용 */
  --color-surface-dark:           var(--color-gray-800);                                      /* 어두운 배경 */
  --color-surface-dim:            color-mix(in srgb, var(--color-gray-950) 75%, transparent); /* 모달·드로어 뒤 스크림 레이어 */
  --color-surface-brand:          var(--color-blue-800);                                      /* 어두운 브랜드 배경 (네비게이션 로고 영역 등). surface-dark와 달리 중립이 아닌 브랜드 색이 필요할 때 */
  --color-surface-brand-subtle:   var(--color-blue-50);                                       /* 넓은 면적 브랜드 연한 배경 (섹션 배경 등) */
  --color-surface-brand-tint:     var(--color-blue-100);                                      /* 좁은 면적 브랜드 배경 — 뱃지·인용 배경 등 색 구분이 필요하지만 연한 경우 */
  --color-surface-info-subtle:    var(--color-cyan-50);                                       /* 넓은 면적 보조 브랜드 연한 배경. 브랜드가 이미 쓰였거나 채도 높은 색이 필요할 때 */
  --color-surface-info-tint:      var(--color-cyan-100);                                      /* 좁은 면적 보조 브랜드 배경 — 뱃지·인용 배경 등. 브랜드가 이미 쓰였거나 채도 높은 색이 필요할 때 */
  --color-surface-success-subtle: var(--color-green-50);                                      /* 성공 상태 연한 배경 */
  --color-surface-caution-subtle: var(--color-orange-50);                                     /* 주의 상태 연한 배경 */
  --color-surface-error-subtle:   var(--color-red-50);                                        /* 오류 상태 연한 배경 */

  /* ── COLOR: TEXT ──────────────────────────*/
  --color-text-body:          var(--color-gray-950); /* 본문, 기본 읽기 텍스트 */
  --color-text-display:       var(--color-gray-800); /* 큰 텍스트, 메뉴 제목 */
  --color-text-label:         var(--color-gray-700); /* 표 헤더, 브레드크럼, 셀렉트박스 */
  --color-text-subtle:        var(--color-gray-500); /* 힌트, 플레이스홀더 */
  --color-text-disabled:      var(--color-gray-400); /* 비활성 상태 텍스트·아이콘 */
  --color-text-inverse:       var(--color-gray-0);   /* 어두운 배경(surface-dark·surface-brand) 위 텍스트 */
  --color-text-brand-vivid:   var(--color-blue-500); /* brand보다 명시성이 높아야 할 때 (아이콘, 강조 링크) */
  --color-text-brand:         var(--color-blue-600); /* 브랜드 텍스트 기본값. 폰트 크기 외 색으로도 계층 구분할 때 (모달·아코디언 제목, 브랜드 버튼 레이블) */
  --color-text-brand-muted:   var(--color-blue-800); /* 브랜드가 이미 쓰인 페이지에서 계층이 낮은 섹션 타이틀·구분 문구 */
  --color-text-info:          var(--color-cyan-600); /* 보조 브랜드 텍스트 기본값. 브랜드가 이미 쓰였거나 채도 높은 색이 필요할 때 */
  --color-text-info-muted:    var(--color-cyan-700); /* 보조 브랜드 억제 텍스트 */
  --color-text-caution:       var(--color-orange-600); /* 주의가 필요한 정보, 권고 사항 */
  --color-text-error:         var(--color-red-600);    /* 오류 메시지 */

  /* ── COLOR: BORDER ────────────────────────*/
  --color-border-subtle:   var(--color-gray-200); /* 네비·레이아웃·카드 등 비인터랙티브 구분선 */
  --color-border-default:  var(--color-gray-300); /* 버튼·입력·셀렉트 등 클릭·액션이 필요한 컴포넌트 테두리 */
  --color-border-disabled: var(--color-gray-200); /* 비활성 테두리 */
  --color-border-selected: var(--color-gray-500); /* 선택 상태 테두리 */
  --color-border-brand:    var(--color-blue-500); /* 브랜드 테두리 */
  --color-border-focus:    color-mix(in srgb, var(--color-blue-500) 75%, transparent); /* 포커스 링 */
  --color-border-error:    color-mix(in srgb, var(--color-red-500) 50%, transparent);  /* 오류 상태 테두리 */

  /* ── COLOR: BUTTON ────────────────────────
     Figma 노드 606-2968에서 추출
  ──────────────────────────────────────────*/
  --color-button-primary-fill:   var(--color-blue-600); /* Primary 버튼 배경 */
  --color-button-tertiary-fill:  var(--color-gray-900); /* Tertiary 버튼 배경 */
  --color-button-danger-fill:    var(--color-red-500);  /* Danger 버튼 배경 */

  /* ── COLOR: ACTION (hover / pressed / selected / overlay) ────*/
  --color-action-neutral-hover:          color-mix(in srgb, var(--color-gray-950)  8%, transparent); /* 기본 hover */
  --color-action-neutral-pressed:        color-mix(in srgb, var(--color-gray-950) 15%, transparent); /* 기본 pressed */
  --color-action-neutral-selected:       color-mix(in srgb, var(--color-gray-950) 20%, transparent); /* 기본 선택 */
  --color-action-neutral-overlay:        color-mix(in srgb, var(--color-gray-950) 50%, transparent); /* 콘텐츠 위 레이어 — 텍스트·아이콘 표시용 */
  --color-action-brand-hover:            color-mix(in srgb, var(--color-blue-500)  8%, transparent); /* 브랜드 hover */
  --color-action-brand-pressed:          color-mix(in srgb, var(--color-blue-500) 15%, transparent); /* 브랜드 pressed */
  --color-action-brand-selected:         color-mix(in srgb, var(--color-blue-500) 20%, transparent); /* 브랜드 선택 */
  --color-action-brand-overlay:          color-mix(in srgb, var(--color-blue-500) 50%, transparent); /* 브랜드 콘텐츠 위 레이어 — 텍스트·아이콘 표시용 */
  --color-action-info-hover:             color-mix(in srgb, var(--color-cyan-500)  8%, transparent); /* 정보 hover */
  --color-action-info-pressed:           color-mix(in srgb, var(--color-cyan-500) 15%, transparent); /* 정보 pressed */
  --color-action-info-selected:          color-mix(in srgb, var(--color-cyan-500) 20%, transparent); /* 정보 선택 */
  --color-action-info-overlay:           color-mix(in srgb, var(--color-cyan-500) 50%, transparent); /* 정보 콘텐츠 위 레이어 */
  --color-action-info-subtle:            color-mix(in srgb, var(--color-cyan-500)  5%, transparent); /* 정보 연한 배경 */
  --color-action-error-hover:            color-mix(in srgb, var(--color-red-500)   8%, transparent); /* 위험 hover */
  --color-action-error-pressed:          color-mix(in srgb, var(--color-red-500)  15%, transparent); /* 위험 pressed */
  --color-action-error-selected:         color-mix(in srgb, var(--color-red-500)  20%, transparent); /* 위험 선택 */
  --color-action-error-overlay:          color-mix(in srgb, var(--color-red-500)  50%, transparent); /* 위험 콘텐츠 위 레이어 */
}


/*
 * Design Tokens — Space
 * ─────────────────────────────────────────────
 * Primitive (px값) → Semantic (inset/squish/stack/gap/generic)
 */

:root {

  /* ════════════════════════════════════════════
     PRIMITIVE
     기본 단위: 4px
     소형(2–8): 컴포넌트 내부 여백에서 1–2px 단위로 세밀하게 조정
     중형(8–24): 4px 배수
     대형(24–): 8px 이상 배수로 점프
  ════════════════════════════════════════════ */
  --space-2:   2px;
  --space-4:   4px;
  --space-6:   6px;
  --space-8:   8px;
  --space-12: 12px;
  --space-16: 16px;
  --space-20: 20px;
  --space-24: 24px;
  --space-32: 32px;
  --space-48: 48px;
  --space-64: 64px;


  /* ════════════════════════════════════════════
     SEMANTIC
  ════════════════════════════════════════════ */

  /* ── SPACE: INSET ─────────────────────────
     사방 동일 padding — 여백 있는 아이콘을 사용할 때 적용
  ──────────────────────────────────────────*/
  --space-inset-xs: var(--space-2);   /* 여백 있는 아이콘 — 12·16px */
  --space-inset-sm: var(--space-4);   /* 여백 있는 아이콘 — 20·24px, 토글 */
  --space-inset-md: var(--space-6);   /* 여백 있는 아이콘 — 30·40px, 컨텐츠 메뉴 depth */
  --space-inset-lg: var(--space-12);  /* 스케일 예약 — 확인된 사용처 없음 */
  --space-inset-xl:  var(--space-16);  /* 넓은 드롭 영역 — upload background */
  --space-inset-2xl: var(--space-24);  /* 모달 내 입력 요소 그룹 padding */

  /* ── SPACE: INSET-SQUISH ──────────────────
     좌우가 상하의 2배인 padding
     사용처: 버튼, pill, 태그
     형식: 상하 / 좌우
  ──────────────────────────────────────────*/
  --space-inset-squish-xs: var(--space-2)  var(--space-4);    /* 뱃지 */
  --space-inset-squish-sm: var(--space-4)  var(--space-8);    /* 툴팁 */
  --space-inset-squish-md: var(--space-6)  var(--space-12);   /* option-list, select(medium) */
  --space-inset-squish-lg: var(--space-8)  var(--space-16);   /* switch, button-select(medium·large) */
  --space-inset-squish-xl:  var(--space-8) var(--space-20);  /* 상하 height 고정, 좌우 20px */
  --space-inset-squish-2xl: var(--space-12) var(--space-24);  /* 스케일 예약 */

  /* ── SPACE: STACK ─────────────────────────
     요소 아래 margin
     사용처: 리스트 항목, 섹션 구분
  ──────────────────────────────────────────*/
  --space-stack-xs:  var(--space-4);
  --space-stack-sm:  var(--space-8);
  --space-stack-md:  var(--space-12);
  --space-stack-lg:  var(--space-16);
  --space-stack-xl:  var(--space-20);
  --space-stack-2xl: var(--space-24);

  /* ── SPACE: GAP ──────────────────────────
     flexbox/grid 자식 간격. 부모에 적용.
     사용처: 버튼 그룹, 탭, 카드 그리드, 폼 필드
     대부분의 가로·세로 간격은 gap으로 처리한다.
  ──────────────────────────────────────────*/
  --space-gap-2xs: var(--space-2);  /* 아이콘·텍스트 간격 */
  --space-gap-xs: var(--space-4);
  --space-gap-sm: var(--space-8);
  --space-gap-md: var(--space-12);
  --space-gap-lg: var(--space-16);
  --space-gap-xl: var(--space-20);
  --space-gap-2xl: var(--space-24);
  --space-gap-3xl: var(--space-32);

  /* ── SPACE: GENERIC ──────────────────────
     위 4가지로 안 되는 예외 케이스.
     단방향 margin, 레이아웃 특수 케이스 등.
     방향은 CSS 속성으로 직접 지정한다.
     예: margin-inline-end: var(--space-generic-sm)
  ──────────────────────────────────────────*/
  --space-generic-xs: var(--space-4);
  --space-generic-sm: var(--space-8);
  --space-generic-md: var(--space-12);
  --space-generic-lg: var(--space-16);
  --space-generic-xl: var(--space-32);
  --space-generic-2xl: var(--space-64);
}


/*
 * Design Tokens — Typography
 * ─────────────────────────────────────────────
 * 3-tier 구조:
 *   1. Primitive  — 원시값 (px·weight·line-height·letter-spacing)
 *   2. Semantic   — 4축 의미 부여 (font-size·line-height·letter-spacing·font-weight)
 *   3. Utility    — 컴포넌트 use case별 묶음 클래스 (.text-*)
 *
 * 사용 우선순위:
 *   1순위: .text-* 유틸 클래스 (대부분의 케이스)
 *   2순위: Semantic 토큰 직접 참조 (예외 케이스)
 *   ❌ Primitive 직접 참조 금지
 */

:root {

  /* ════════════════════════════════════════════
     PRIMITIVE
  ════════════════════════════════════════════ */

  /* ── FONT SIZE ────────────────────────────*/
  --font-size-11: 11px;
  --font-size-12: 12px;
  --font-size-13: 13px;
  --font-size-14: 14px;
  --font-size-15: 15px;
  --font-size-17: 17px;
  --font-size-20: 20px;
  --font-size-28: 28px;
  --font-size-32: 32px;

  /* ── FONT WEIGHT ──────────────────────────*/
  --font-weight-regular:  400;
  --font-weight-medium:   500;
  --font-weight-semibold: 600;
  --font-weight-bold:     700;

  /* ── LINE HEIGHT ──────────────────────────*/
  --line-height-tight:   1.25;
  --line-height-base:    1.5;
  --line-height-relaxed: 1.625;

  /* ── LETTER SPACING ───────────────────────*/
  --letter-spacing-tight:  -0.02em;
  --letter-spacing-normal:  0em;
  --letter-spacing-wide:    0.05em;


  /* ════════════════════════════════════════════
     SEMANTIC
     축별 의미 부여. use case 클래스가 이 값을 참조한다.
  ════════════════════════════════════════════ */

  /* ── FONT FAMILY ─────────────────────────
     Primitive 없이 직접 사용 (단일값).
  ──────────────────────────────────────────*/
  --font-family-base: 'Pretendard', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;

  /* ── FONT SIZE — 역할별 ──────────────────*/
  --font-size-meta:    var(--font-size-11);  /* 캡션·정렬번호·뱃지 */
  --font-size-label:   var(--font-size-12);  /* 폼 라벨·태그·캡션 */
  --font-size-sm:      var(--font-size-13);  /* 소형 버튼·툴팁·헬퍼 */
  --font-size-base:    var(--font-size-14);  /* 본문 기본·인풋·테이블 */
  --font-size-lg:      var(--font-size-15);  /* 중형 버튼·강조 본문 */

  --font-weight-body:    var(--font-weight-regular);   /* 본문·읽기·기본 UI */
  --font-weight-heading: var(--font-weight-semibold);  /* 헤딩·UI 강조·테이블 헤더 */

/*
 * Design Tokens — Radius
 * ─────────────────────────────────────────────
 * Primitive (px값) → Semantic (크기)
 */

:root {

  /* ════════════════════════════════════════════
     PRIMITIVE
     이름 = px값.
     Figma 추출값: radius/small1=4, radius/max=1000 (버튼 노드 기준)
     2px, 6px는 다른 컴포넌트에서 확인됨
  ════════════════════════════════════════════ */
  --radius-2:    2px;
  --radius-4:    4px;   /* Figma: radius/small1 */
  --radius-6:    6px;
  --radius-8:    8px;
  --radius-12:  12px;
  --radius-16:  16px;
  --radius-1000: 1000px;  /* Figma: radius/max — pill */


  /* ════════════════════════════════════════════
     SEMANTIC
  ════════════════════════════════════════════ */
  --radius-xs:   var(--radius-2);
  --radius-sm:   var(--radius-4);    /* shape: square */
  --radius-md:   var(--radius-6);    /* base */
  --radius-lg:   var(--radius-8);
  --radius-xl:   var(--radius-12);
  --radius-2xl:  var(--radius-16);
  --radius-pill: var(--radius-1000); /* shape: round */
}


/*
 * Design Tokens — Height
 * ─────────────────────────────────────────────
 * Primitive (px값) → Semantic (density)
 *
 * 컴포넌트 높이 전용. padding으로 높이를 만들지 않는다.
 */

:root {

  /* ════════════════════════════════════════════
     PRIMITIVE
  ════════════════════════════════════════════ */
  --height-24: 24px;
  --height-28: 28px;
  --height-32: 32px;
  --height-36: 36px;   /* base */
  --height-40: 40px;
  --height-48: 48px;


  /* ════════════════════════════════════════════
     SEMANTIC — DENSITY
     컴포넌트에서 직접 참조하는 Semantic 별칭.
     Density 모드 전환 시 이 값만 바꾼다.
  ════════════════════════════════════════════ */
  --height-tight:     var(--height-24);   /* 인라인 뱃지·태그 — 최소 클릭 영역 */
  --height-dense:     var(--height-28);   /* 데이터테이블 — 콘텐츠 밀도 높을 때 */
  --height-compact:   var(--height-32);
  --height-base:      var(--height-36);
  --height-spacious:  var(--height-40);
  --height-loose:     var(--height-48);   /* 대형 터치 영역·히어로 입력 */
}


/*
 * Design Tokens — Shadow
 * ─────────────────────────────────────────────
 * Semantic만 존재 (Primitive 없음).
 */

:root {
  --shadow-sm: 0 1px 2px rgba(0,0,0,.06);
  --shadow-md: 0 2px 8px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
  --shadow-lg: 0 4px 16px rgba(0,0,0,.10), 0 2px 4px rgba(0,0,0,.06);
  --shadow-xl: 0 8px 32px rgba(0,0,0,.12), 0 4px 8px rgba(0,0,0,.06);
}


/*
 * Design Tokens — Z-Index
 * ─────────────────────────────────────────────
 * Semantic만 존재 (Primitive 없음).
 * 레이어 맥락별로 100 단위 점프.
 */

:root {
  --z-dropdown: 100;
  --z-sticky:   150;
  --z-backdrop: 200;
  --z-modal:    210;
  --z-toast:    300;
  --z-tooltip:  400;
}


/*
 * Design Tokens — Layout
 * ─────────────────────────────────────────────
 * Semantic만 존재 (Primitive 없음).
 * 페이지 골격 치수.
 */

:root {
  --layout-max-width:     1440px;
  --layout-sidebar-width: 240px;

/*

 * duration·easing.
 */

:root {
  --duration-fast: 100ms;
  --duration-base: 150ms;
  --duration-slow: 200ms;
  --easing-base:   ease;
}

  }
  .md pre {
    font-family: var(--font-family-mono);
    background: var(--color-gray-900);
    color: var(--color-gray-100);
    padding: var(--space-16);
    border-radius: var(--radius-lg);
    overflow-x: auto;
    margin-bottom: var(--space-12);
    font-size: var(--font-size-sm);
    line-height: 1.6;
  }
  .md pre code { background: transparent; border: 0; color: inherit; padding: 0; font-size: inherit; }
  .md table {
    border-collapse: collapse;
    width: 100%;
    margin-bottom: var(--space-12);
    font-size: var(--font-size-sm);
    border: 1px solid var(--color-border-subtle);
    border-radius: var(--radius-lg);
    overflow: hidden;
  }
  .md thead { background: var(--color-surface-subtle); }
  .md th, .md td { padding: 10px 14px; text-align: left; border-bottom: 1px solid var(--color-border-subtle); }
  .md tr:last-child td { border-bottom: 0; }
  .md td[rowspan] { border-right: none; }
  .md tr.group-inner td { border-bottom: none; }
  .md th {
    font-weight: var(--font-weight-semibold);
    font-size: var(--font-size-sm);
    color: var(--color-text-label);
  }
  .md td code { font-size: 0.85em; }
  .md td code.code-label {
    font-family: var(--font-family-base);
    font-size: var(--font-size-sm);
    font-weight: var(--font-weight-medium);
    background: none;
    border: none;
    color: var(--color-text-body);
    padding: 0;
    border-radius: 0;
  }

  .md blockquote {
    margin: var(--space-12) 0;
    padding: var(--space-12) var(--space-16);
    background: var(--color-orange-50);
    border-left: 3px solid var(--color-orange-500);
    border-radius: 0 var(--radius-md) var(--radius-md) 0;
    color: var(--color-gray-800);
  }
  .md blockquote p { margin-bottom: 0; }
  .md blockquote p + p { margin-top: 4px; }
  .md blockquote.tip {
    background: var(--color-blue-50);
    border-left-color: var(--color-blue-500);
  }
  .md blockquote.do,
  .md blockquote.dont {
    margin: var(--space-12) 0;
    padding: var(--space-8) var(--space-16);
    border-radius: var(--radius-md);
    overflow: hidden;
    color: var(--color-text-body);
  }
  .md blockquote.do {
    background: var(--color-green-50);
    border: 1px solid rgba(22,163,74,0.2);
  }
  .md blockquote.dont {
    background: var(--color-red-50);
    border: 1px solid rgba(220,38,38,0.2);
  }
  .md blockquote.do .card-title,
  .md blockquote.dont .card-title {
    font-weight: var(--font-weight-semibold);
    font-size: var(--font-size-13);
    margin-bottom: var(--space-8);
  }
  .md blockquote.do .card-title:last-child,
  .md blockquote.dont .card-title:last-child { margin-bottom: 0; }
  .md blockquote.do .card-title { color: var(--color-green-700); }
  .md blockquote.dont .card-title { color: var(--color-red-700); }
  .md blockquote.do .card-body,
  .md blockquote.dont .card-body {
    font-size: var(--font-size-13);
    line-height: 1.5;
  }
  .md blockquote.do .card-body code,
  .md blockquote.dont .card-body code {
    display: block;
    background: rgba(0,0,0,0.06);
    border: none;
    padding: 5px 8px;
    border-radius: var(--radius-sm);
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 12px;
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-word;
    color: var(--color-text-body);
  }
  .md blockquote.do .card-body code + code,
  .md blockquote.dont .card-body code + code {
    margin-top: 4px;
  }
  .md blockquote.do .card-sep,
  .md blockquote.dont .card-sep {
    height: 1px;
    margin: var(--space-8) 0;
  }
  .md blockquote.do .card-sep { background: rgba(22,163,74,0.2); }
  .md blockquote.dont .card-sep { background: rgba(220,38,38,0.2); }
  .md .do-dont-pair {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: var(--space-12);
    margin: var(--space-12) 0;
    align-items: stretch;
  }
  .md .do-dont-pair blockquote { margin: 0; height: 100%; display: flex; flex-direction: column; }
  .md .do-dont-pair blockquote .card-body { flex: 1; }
  @media (max-width: 720px) {
    .md .do-dont-pair { grid-template-columns: 1fr; }
  }

  /* ═══ 3-Actor Flow Diagram ═══ */
  .md .actor-flow {
    display: grid;
    grid-template-columns: 1fr auto 1fr auto 1fr;
    gap: 0;
    align-items: stretch;
    margin: var(--space-24) 0 var(--space-32);
  }
  .md .actor-card {
    padding: var(--space-16);
    border-radius: var(--radius-lg);
    border: 1px solid var(--color-border-default);
    background: var(--color-surface-base);
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-width: 0;
    transition: all var(--duration-fast) ease;
    position: relative;
  }
  /* 클릭 가능한 카드 (a 태그로 감싸진 카드) */
  .md a.actor-card-link {
    text-decoration: none !important;
    border-bottom: 0 !important;
    display: block;
  }
  .md a.actor-card-link .actor-card {
    cursor: pointer;
  }
  .md a.actor-card-link:hover .actor-card {
    border-color: var(--color-blue-500);
    box-shadow: var(--shadow-md);
    transform: translateY(-2px);
  }
  .md a.actor-card-link:hover .actor-card-corner {
    color: var(--color-blue-600);
  }
  /* 카드 우상단 코너 (→ 또는 — 표시) */
  .md .actor-card-corner {
    position: absolute;
    top: 12px;
    right: 14px;
    font-size: 14px;
    color: var(--color-text-subtle);
    transition: color var(--duration-fast) ease;
    font-family: var(--font-family-mono);
    line-height: 1;
  }
  /* 비활성 카드 (개발자) */
  .md .actor-card--disabled {
    opacity: 0.55;
    background: var(--color-surface-subtle);
  }
  .md .actor-card--disabled .actor-emoji {
    filter: grayscale(1);
  }
  .md .actor-card-note {
    font-size: 10px;
    color: var(--color-text-subtle);
    font-style: italic;
    margin-top: 6px;
    padding-top: 6px;
    border-top: 1px dashed var(--color-border-subtle);
    line-height: 1.4;
  }
  /* 비활성 카드로 향하는 화살표 dim */
  .md .flow-arrow--dim {
    opacity: 0.4;
  }
  .md .actor-emoji {
    font-size: 22px;
    line-height: 1;
    margin-bottom: 4px;
  }
  .md .actor-role {
    font-size: var(--font-size-h4);
    font-weight: var(--font-weight-semibold);
    color: var(--color-text-body);
    letter-spacing: -0.01em;
    line-height: 1.3;
  }
  .md .actor-label {
    font-family: var(--font-family-mono);
    font-size: 9px;
    color: var(--color-text-subtle);
    letter-spacing: 0.06em;
    margin-bottom: 6px;
  }
  .md .actor-action {
    font-size: var(--font-size-sm);
    color: var(--color-text-label);
    line-height: 1.4;
  }
  .md .actor-output {
    margin-top: auto;
    padding-top: 10px;
    border-top: 1px dashed var(--color-border-subtle);
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .md .output-item {
    font-family: var(--font-family-mono);
    font-size: 10px;
    color: var(--color-text-label);
    background: var(--color-surface-subtle);
    padding: 3px 8px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--color-border-subtle);
    width: fit-content;
  }
  .md .flow-arrow {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0 var(--space-12);
    gap: 6px;
  }
  .md .arrow-label-top {
    font-size: 10px;
    color: var(--color-text-subtle);
    text-align: center;
    line-height: 1.3;
    font-weight: var(--font-weight-medium);
  }
  .md .arrow-line {
    width: 32px;
    height: 1px;
    background: var(--color-border-subtle);
    position: relative;
  }
  .md .arrow-line::after {
    content: '';
    position: absolute;
    right: -1px;
    top: -3px;
    border: 4px solid transparent;
    border-left-color: var(--color-border-subtle);
    border-right-width: 0;
  }
  /* 좁은 화면: 세로로 떨어지게 */
  @media (max-width: 700px) {
    .md .actor-flow {
      grid-template-columns: 1fr;
    }
    .md .flow-arrow {
      padding: var(--space-8) 0;
    }
    .md .arrow-line {
      width: 1px;
      height: 20px;
    }
    .md .arrow-line::after {
      right: -3px;
      top: auto;
      bottom: -1px;
      border: 4px solid transparent;
      border-top-color: var(--color-border-subtle);
      border-bottom-width: 0;
    }
  }

  .pager {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: var(--space-12);
    margin-top: var(--space-48);
    padding-top: var(--space-24);
    border-top: 1px solid var(--color-border-subtle);
  }
  .pager-link {
    display: flex; flex-direction: column; gap: 4px;
    padding: var(--space-16);
    border: 1px solid var(--color-border-default);
    border-radius: var(--radius-lg);
    text-decoration: none;
    transition: all var(--duration-fast) ease;
  }
  .pager-link:hover {
    border-color: var(--color-blue-500);
    background: var(--color-blue-50);
  }
  .pager-link[data-disabled="true"] { opacity: 0.4; pointer-events: none; }
  .pager-direction {
    font-size: var(--font-size-meta);
    color: var(--color-text-subtle);
    display: flex; align-items: center; gap: 4px;
  }
  .pager-link.next .pager-direction { justify-content: flex-end; }
  .pager-link.next { text-align: right; }
  .pager-label {
    font-size: var(--font-size-base);
    font-weight: var(--font-weight-semibold);
    color: var(--color-text-body);
  }
  .pager-path {
    font-family: var(--font-family-mono);
    font-size: var(--font-size-meta);
    color: var(--color-text-subtle);
  }

  .toc {
    padding: var(--space-24) var(--space-16);
    position: sticky;
    top: var(--layout-topbar-height);
    height: calc(100vh - var(--layout-topbar-height));
    overflow-y: auto;
    border-left: 1px solid var(--color-border-subtle);
  }
  .toc-label {
    font-size: var(--font-size-meta);
    font-weight: var(--font-weight-semibold);
    color: var(--color-text-subtle);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    padding: 0 var(--space-8) var(--space-8);
  }
  .toc ul { list-style: none; }
  .toc a {
    display: block;
    padding: 4px var(--space-8);
    color: var(--color-text-subtle);
    text-decoration: none;
    font-size: var(--font-size-meta);
    line-height: 1.5;
    border-left: 2px solid transparent;
    margin-left: -2px;
    transition: all var(--duration-fast) ease;
  }
  .toc a:hover { color: var(--color-text-body); }
  .toc a.active {
    color: var(--color-text-brand);
    border-left-color: var(--color-blue-500);
    font-weight: var(--font-weight-medium);
  }
  .toc a.h3-link { padding-left: var(--space-16); font-size: 10px; }
  .toc-empty {
    padding: var(--space-8);
    color: var(--color-text-subtle);
    font-size: var(--font-size-meta);
    font-style: italic;
  }

  .toast {
    position: fixed;
    bottom: var(--space-32);
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--color-gray-900);
    color: var(--color-gray-0);
    padding: 10px 16px;
    border-radius: var(--radius-pill);
    font-size: var(--font-size-sm);
    box-shadow: var(--shadow-lg);
    opacity: 0;
    pointer-events: none;
    transition: all var(--duration-base) ease;
    z-index: 100;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .kbd-hint {
    position: fixed;
    bottom: var(--space-16);
    right: var(--space-16);
    font-size: var(--font-size-meta);
    color: var(--color-text-subtle);
    background: var(--color-surface-base);
    padding: 6px 10px;
    border-radius: var(--radius-md);
    border: 1px solid var(--color-border-subtle);
    display: flex; align-items: center; gap: 8px;
    box-shadow: var(--shadow-md);
    pointer-events: none;
    opacity: 0;
    transition: opacity var(--duration-base) ease;
  }
  .kbd-hint.show { opacity: 1; }
  .kbd {
    font-family: var(--font-family-mono);
    background: var(--color-surface-subtle);
    border: 1px solid var(--color-border-subtle);
    border-radius: var(--radius-sm);
    padding: 1px 5px;
    font-size: 10px;
  }

  @media (max-width: 1100px) {
    .layout { grid-template-columns: var(--layout-sidebar-width) 1fr; }
    .toc { display: none; }
  }
  @media (max-width: 900px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar { display: none; }
    .content { padding: var(--space-24) var(--space-16); }
    .pager { grid-template-columns: 1fr; }
    .kbd-hint { display: none; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      transition-duration: 0.01ms !important;
      animation-duration: 0.01ms !important;
    }
    html { scroll-behavior: auto; }
  }

  #files-source { display: none; }

  /* ─── 토큰 스와치 & 툴팁 ─── */
  .token-swatch {
    display: inline-block;
    width: 20px; height: 20px;
    border-radius: 4px;
    border: 1px solid rgba(0,0,0,0.12);
    margin-right: 6px;
    vertical-align: middle;
    flex-shrink: 0;
  }
  .md code[data-token-value] {
    transition: background var(--duration-fast) ease, border-color var(--duration-fast) ease, color var(--duration-fast) ease;
  }
  .md code[data-token-value]:hover {
    background: var(--color-blue-50);
    border-color: var(--color-blue-200);
    color: var(--color-blue-700);
  }
  .token-tooltip {
    position: fixed;
    background: var(--color-gray-900);
    color: var(--color-gray-0);
    font-family: var(--font-family-mono);
    font-size: 11px;
    padding: 7px 10px;
    border-radius: var(--radius-sm);
    white-space: nowrap;
    z-index: 500;
    pointer-events: none;
    opacity: 0;
    transition: opacity var(--duration-fast) ease;
    box-shadow: var(--shadow-md);
  }
  .token-tooltip.show { opacity: 1; }
  .token-tooltip .token-swatch { margin-right: 0; width: 14px; height: 14px; border-radius: 3px; }

  /* ─── 팔레트 스트립 ─── */
  .palette-strip { margin: var(--space-8) 0 var(--space-24); }
  .palette-strip-label {
    font-size: var(--font-size-meta);
    font-weight: var(--font-weight-semibold);
    color: var(--color-text-subtle);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: var(--space-8);
  }
  .palette-strip-chips {
    display: flex;
    gap: 1px;
    border-radius: var(--radius-md);
    overflow: hidden;
  }
  .palette-chip {
    flex: 1;
    min-width: 0;
    height: 88px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 8px 5px;
    cursor: default;
    position: relative;
    transition: filter var(--duration-fast) ease, transform var(--duration-fast) ease;
  }
  .palette-chip:hover {
    transform: translateY(-2px);
  }
  .palette-chip--base::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 14px;
    height: 2px;
    border-radius: 1px;
    background: currentColor;
    opacity: 0.5;
  }
  .chip-scale {
    font-family: var(--font-family-mono);
    font-size: 10px;
    font-weight: 700;
    line-height: 1;
  }
  .chip-hex {
    font-family: var(--font-family-mono);
    font-size: 9px;
    opacity: 0.8;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ─── 스페이스 스케일 ─── */
  .scale-strip { margin: var(--space-8) 0 var(--space-24); display: flex; flex-direction: column; gap: 10px; }
  .scale-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: var(--space-12);
    font-family: var(--font-family-mono);
    font-size: var(--font-size-meta);
  }
  .scale-unit {
    display: flex;
    align-items: stretch;
    height: 20px;
    border: 1px solid var(--color-border-brand);
    border-radius: var(--radius-sm);
    overflow: hidden;
    flex-shrink: 0;
    cursor: default;
    transition: transform var(--duration-fast) ease;
  }
  .scale-unit:hover { transform: translateY(-2px); }
  .scale-space { background: var(--color-surface-brand-tint); flex-shrink: 0; }
  .scale-content { width: 20px; background: var(--color-surface-base); flex-shrink: 0; }
  .scale-val { color: var(--color-text-subtle); width: 36px; flex-shrink: 0; text-align: right; }
  .scale-note { color: var(--color-text-brand); font-size: 9px; }

  /* ─── 하이트 스케일 ─── */
  .height-strip { margin: var(--space-8) 0 var(--space-24); display: flex; align-items: flex-end; justify-content: center; gap: var(--space-24); font-family: var(--font-family-mono); font-size: var(--font-size-meta); }
  .height-col { display: flex; flex-direction: column; align-items: center; gap: var(--space-6); cursor: default; transition: transform var(--duration-fast) ease; }
  .height-col:hover { transform: translateY(-2px); }
  .height-bar { width: 48px; background: var(--color-surface-brand-tint); border-radius: var(--radius-sm); position: relative; }
  .height-arrow { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; }
  .height-arrow-head { font-size: 7px; line-height: 1; flex-shrink: 0; color: var(--color-text-brand); }
  .height-arrow-line { flex: 1; width: 1px; background: var(--color-border-brand); }
  .height-val { color: var(--color-text-subtle); }

  /* ─── 폰트 사이즈 스케일 ─── */
  .font-size-strip { margin: var(--space-8) 0 var(--space-24); display: flex; flex-direction: column; gap: var(--space-12); }
  .font-size-item { display: flex; align-items: baseline; gap: var(--space-16); cursor: default; transition: opacity var(--duration-fast) ease; }
  .font-size-item:hover { opacity: 0.7; }
  .font-size-val { width: 40px; flex-shrink: 0; font-family: var(--font-family-mono); font-size: 11px; color: var(--color-text-subtle); text-align: right; }
  .font-size-sample { color: var(--color-text-body); font-family: var(--font-family-base); line-height: 1.3; font-weight: var(--font-weight-regular); }

  /* ─── 타이포 props (font-weight·line-height·letter-spacing) ─── */
  .typo-props-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--space-24); margin: var(--space-8) 0 var(--space-24); }
  .typo-props-col { display: flex; flex-direction: column; }
  .typo-props-header { font-family: var(--font-family-mono); font-size: 10px; color: var(--color-text-subtle); font-weight: var(--font-weight-semibold); text-transform: uppercase; letter-spacing: 0.06em; padding-bottom: var(--space-8); border-bottom: 1px solid var(--color-border-subtle); margin-bottom: var(--space-8); }
  .typo-props-item { display: flex; align-items: flex-start; gap: var(--space-12); padding: var(--space-4) 0; cursor: default; transition: opacity var(--duration-fast) ease; }
  .typo-props-item:hover { opacity: 0.7; }
  .typo-props-val { width: 52px; flex-shrink: 0; font-family: var(--font-family-mono); font-size: 11px; color: var(--color-text-subtle); text-align: right; padding-top: 2px; }
  .typo-props-sample { font-family: var(--font-family-base); color: var(--color-text-body); }

  /* ─── 타이포 시맨틱 그리드 ─── */
  .typo-sem-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--space-8); margin: var(--space-8) 0 var(--space-24); }
  .typo-sem-cell { padding: 10px var(--space-12); border: 1px solid var(--color-border-subtle); border-radius: var(--radius-sm); cursor: default; transition: all var(--duration-fast) ease; }
  .typo-sem-cell:hover { border-color: var(--color-blue-300); background: var(--color-surface-brand-subtle); }
  .typo-sem-token { font-family: var(--font-family-mono); font-size: 11px; color: var(--color-text-brand); line-height: 1.4; }
  .typo-sem-desc { font-size: var(--font-size-meta); color: var(--color-text-subtle); margin-top: 3px; line-height: 1.5; }

  /* ─── 시맨틱 예시 다이어그램 ─── */
  .ex-diagram { margin: var(--space-8) 0 var(--space-24); font-family: var(--font-family-mono); font-size: var(--font-size-meta); color: var(--color-text-subtle); }
  .ex-row { display: flex; gap: var(--space-16); align-items: flex-end; flex-wrap: wrap; }

<script id="files-source" type="application/json">[{"path": "README.md", "label": "Overview", "group": "overview", "slug": "README", "raw": "---\nfile: README.md\nversion: 0.5.3\nupdated: 2026-04-28\n---\n\n# 김반장 3.0 Design System\n\n디자이너가 만들고, 기획자가 쓰고, 개발자가 자신의 언어로 옮긴다.\n쓰는 언어는 달라도, 기준은 하나.\n\n## 3-Actor 협업 모델\n\nactor 카드를 클릭하면 해당 워크플로우 페이지로 이동합니다. <br>\nactor 워크플로우는 팀 Claude Project에 GitHub 연동으로 자동 등록되며, 각 역할의 LLM 지시문으로 사용됩니다.\n\n<div class=\"actor-flow\">\n\n  <a class=\"actor-card-link\" href=\"#workflow--designer\">\n    <div class=\"actor-card\">\n      <div class=\"actor-card-corner\">→<\/div>\n      <div class=\"actor-emoji\">🎨<\/div>\n      <div class=\"actor-role\">Designer<\/div>\n      <div class=\"actor-label\">OWNER<\/div>\n      <div class=\"actor-action\">시스템·HTML/CSS<br>직접 관리<\/div>\n      <div class=\"actor-output\">\n        <div class=\"output-item\">tokens.css<\/div>\n        <div class=\"output-item\">component.html / css<\/div>\n      <\/div>\n    <\/div>\n  <\/a>\n\n  <div class=\"flow-arrow\">\n    <div class=\"arrow-label-top\">GitHub<br>자동 동기화<\/div>\n    <div class=\"arrow-line\"><\/div>\n  <\/div>\n\n  <a class=\"actor-card-link\" href=\"#workflow--planner\">\n    <div class=\"actor-card\">\n      <div class=\"actor-card-corner\">→<\/div>\n      <div class=\"actor-emoji\">🧭<\/div>\n      <div class=\"actor-role\">Planner<\/div>\n      <div class=\"actor-label\">CONSUMER<\/div>\n      <div class=\"actor-action\">팀 프로젝트 접속 →<br>프로토타입 도출<\/div>\n      <div class=\"actor-output\">\n        <div class=\"output-item\">Prototype HTML/CSS<\/div>\n      <\/div>\n    <\/div>\n  <\/a>\n\n  <div class=\"flow-arrow flow-arrow--dim\">\n    <div class=\"arrow-label-top\">프로토타입<br>인계<\/div>\n    <div class=\"arrow-line\"><\/div>\n  <\/div>\n\n  <div class=\"actor-card actor-card--disabled\">\n    <div class=\"actor-card-corner\">—<\/div>\n    <div class=\"actor-emoji\">💻<\/div>\n    <div class=\"actor-role\">Developer<\/div>\n    <div class=\"actor-label\">TRANSLATOR<\/div>\n    <div class=\"actor-action\">실제 프레임워크<br>변환<\/div>\n    <div class=\"actor-output\">\n      <div class=\"output-item\">React · Vue<\/div>\n      <div class=\"output-item\">Flutter · SwiftUI<\/div>\n    <\/div>\n    <div class=\"actor-card-note\">개발팀 자체 진행 영역 — 이 시스템에는 포함 안 됨<\/div>\n  <\/div>\n\n<\/div>\n\n## 시스템 버전 변경 시\n\n| Actor | MAJOR | MINOR | PATCH |\n|-------|-------|-------|-------|\n| 🎨 디자이너 | 즉시 (본인이 변경) | 즉시 | 즉시 |\n| 🧭 기획자 | 변경 내용 공유 받음. 기존 프로토타입 코드 점검 필요. 컨텍스트는 자동 갱신. | 자동 갱신 | 자동 갱신 |\n\n> 💡 시스템 버전은 우상단 pill에 항상 표시. 프로토타입 인계 시 메타에도 명시.\n\n## 파일 구조\n\n```\ndesign-system/\n├── README.md            ← 지금 이 파일\n├── workflow/\n│   ├── designer.md      ← 🎨 디자이너 모드 LLM 지시문\n│   └── planner.md       ← 🧭 기획자 모드 LLM 지시문\n├── governance.md        ← 시스템 관리·버전·deprecation\n├── tokens/\n│   ├── _index.md        ← 토큰 아키텍처 (3-tier)\n│   ├── space.md  · radius.md  · color.md\n│   ├── typography.md  · elevation.md\n│   └── motion.md  · icon.md\n├── components/          ← 🧩 컴포넌트 정의 문서 (디자이너 작성)\n│   ├── _spec.md         ← 컴포넌트 문서 작성 규칙\n│   └── [ComponentName].md\n├── adaptation.md        ← 반응형 + 다크모드\n├── product.md           ← B2B 제약 + 상태 패턴 + 데이터 포맷팅 + Microcopy\n├── accessibility.md     ← 접근성 (WCAG 2.1 AA)\n└── architecture.md      ← Variant 모델 + 컴포넌트 계층\n```\n\n## 토큰 실제 값\n실제 CSS 토큰 값은 `tokens.css` 파일을 참조한다. 이 문서는 **사용 원칙**을 정의하고, `tokens.css`는 **실제 값**을 정의한다.\n"}, {"path": "workflow/designer.md", "label": "🎨 Designer", "group": "workflow", "slug": "workflow--designer", "raw": "---\nfile: workflow/designer.md\nversion: 0.6.3\n---\n\n# 🎨 Designer Mode\n\n당신은 김반장 디자인 시스템의 토큰·컴포넌트 HTML/CSS·버전 관리를 전담하는 디자이너입니다.<br>\n아래 흐름에 따라 요청을 처리하세요.\n\n---\n\n## 요청 분류\n\n**토큰**\n\n| 사용자 요청 패턴 | 실행할 흐름 |\n|:---|:---|\n| 토큰 추가해줘 · 토큰 새로 만들어줘 | [새 토큰 추가](#새-토큰-추가) |\n| 토큰 바꿔줘 · 토큰 수정해줘 · 토큰 변경해줘 | [기존 토큰 변경](#기존-토큰-변경) |\n| 토큰 삭제해줘 · 토큰 제거해줘 | [토큰 제거](#토큰-제거) |\n\n**컴포넌트**\n\n| 사용자 요청 패턴 | 실행할 흐름 |\n|:---|:---|\n| 컴포넌트 만들어줘 · 추가해줘 | [새 컴포넌트 만들기](#새-컴포넌트-만들기) |\n| 컴포넌트 수정해줘 · 컴포넌트 바꿔줘 | [기존 컴포넌트 수정](#기존-컴포넌트-수정) |\n| 컴포넌트 사용 중단해줘 · 이 컴포넌트 안 써 | [컴포넌트 사용 중단](#컴포넌트-사용-중단) |\n| 컴포넌트 삭제해줘 · 컴포넌트 제거해줘 | [컴포넌트 제거](#컴포넌트-제거) |\n| 컴포넌트 검토해줘 · 이 코드 맞아? | [컴포넌트 검토](#컴포넌트-검토) |\n\n**시스템**\n\n| 사용자 요청 패턴 | 실행할 흐름 |\n|:---|:---|\n| 전체 점검해줘 · 일관성 검토해줘 | [전체 일관성 감사](#전체-일관성-감사) |\n\n---\n\n## 토큰\n\n### 새 토큰 추가\n\n**시작 전 읽을 파일:** `tokens/_index.md` · `tokens.css`\n\n**작업 단계:**\n\n1. `tokens/_index.md`의 3-tier 구조 확인 → Primitive / Semantic / Component 중 추가 위치 결정\n2. `tokens.css` 전체에서 추가하려는 토큰명 grep → 이미 존재하면 중단하고 사용자에게 알림\n3. `tokens.css`의 해당 섹션에 추가할 코드 제안 (섹션 주석 기준으로 위치 명시)\n4. `design-system/**/*.md` 내 CSS 코드 블록에서 새 토큰과 의미상 겹치는 기존 토큰 사용처 확인\n5. **버전 업데이트:**\n   - 변경 유형: **MINOR** (새 토큰 추가)\n   - 해당 `tokens/*.md` frontmatter `version:` 둘째 자리 +1, `updated:` 오늘 날짜\n   - `build.py` `<span class=\"version-pill\">` 값: 둘째 자리 +1, 셋째 자리 0으로 리셋\n\n---\n\n### 기존 토큰 변경\n\n**시작 전 읽을 파일:** `tokens/_index.md` · `tokens.css` · 변경 대상 `tokens/*.md`\n\n**작업 단계:**\n\n1. **사전 영향 범위 파악 (변경 전 필수):**\n   - `tokens.css`에서 해당 토큰 변수명(`--token-name`) grep → 참조하는 다른 토큰 목록\n   - `design-system/**/*.md` 내 CSS 코드 블록에서 해당 토큰 변수명 grep → 영향받는 컴포넌트 목록\n   - 목록을 사용자에게 먼저 보고 → 진행 여부 확인 후 계속\n\n2. **변경 유형 판단:**\n   - 값(value)만 변경 → **MINOR** 이상\n   - 토큰명 변경 → **MAJOR** (구 토큰명은 deprecated 처리 후 다음 MAJOR에서 제거)\n   - Semantic 매핑(참조 Primitive) 변경 → 시각 결과가 달라지면 **MINOR** 이상\n\n3. `tokens.css` 수정 내용 출력 (변경 전 → 변경 후 명시)\n4. 영향받는 컴포넌트 CSS 수정 필요 항목 목록화 (파일명 + 변경 위치)\n\n5. **버전 업데이트:**\n   - 해당 `tokens/*.md` frontmatter `version:` 업데이트, `updated:` 오늘 날짜\n   - MAJOR: `build.py` `<span class=\"version-pill\">` 첫째 자리 +1, 나머지 0\n   - MINOR: `build.py` `<span class=\"version-pill\">` 둘째 자리 +1, 셋째 자리 0\n   - PATCH: `build.py` `<span class=\"version-pill\">` 셋째 자리 +1\n\n---\n\n### 토큰 제거\n\n**시작 전 읽을 파일:** `tokens.css` · 변경 대상 `tokens/*.md`\n\n**작업 단계:**\n\n1. **사전 영향 범위 파악:**\n   - `tokens.css`에서 해당 토큰 변수명 grep → 참조하는 다른 토큰 목록\n   - `design-system/**/*.md` 내 CSS 코드 블록에서 해당 토큰 변수명 grep → 참조하는 컴포넌트 목록\n\n2. **분기:**\n   - 참조처가 있으면 → **즉시 제거 불가.** 사용자에게 안내:\n     \"참조하는 컴포넌트를 먼저 대체 토큰으로 교체한 후 제거해야 합니다. `기존 토큰 변경` 흐름으로 대체 토큰 마이그레이션을 먼저 진행하세요.\"\n   - 참조처가 없으면 → 계속\n\n3. `tokens.css`에서 해당 변수 제거\n4. 해당 `tokens/*.md`에서 항목 제거\n\n5. **버전 업데이트:**\n   - 변경 유형: **MAJOR** (토큰 제거)\n   - 해당 `tokens/*.md` frontmatter `version:` 첫째 자리 +1, 나머지 0, `updated:` 오늘 날짜\n   - `build.py` `<span class=\"version-pill\">` 첫째 자리 +1, 나머지 0\n\n---\n\n## 컴포넌트\n\n### 새 컴포넌트 만들기\n\n**시작 전 읽을 파일:**\n`tokens/_index.md` · 관련 `tokens/*.md` · `architecture.md` · `accessibility.md`\n\n**작업 단계:**\n\n1. **Variant 차원 정의** — type × style × size × state × shape (`architecture.md` 참조)\n2. **상태 명세** — default · hover · pressed · disabled (필요 시 focus · loading)\n3. **BEM 클래스명** — full name, 약어 금지 (예: `.btn--primary-fill` ✓ / `.btn--pf` ✗)\n4. **HTML 출력** — semantic 마크업 + 접근성 속성\n5. **CSS 출력** — Semantic 토큰만 사용 (Primitive 직접 참조 금지)\n6. **자가 점검** — [자가 점검 체크리스트](#자가-점검-체크리스트) 실행\n7. **컴포넌트 파일 저장** — `components/[ComponentName].md` 생성\n   - frontmatter: `component`, `version: 0.1.0`, `status: draft`, `figma-node`, `updated: 오늘 날짜`\n   - 섹션 순서: 용도 → 규칙 → 코드 → 스펙 → 접근성 체크리스트 (`components/_spec.md` 기준)\n   - `## 코드` 섹션: 위에서 작성한 HTML + CSS. CSS 앞에 이 컴포넌트가 사용하는 Semantic 토큰의 **실제 값**을 `:root {}` 블록으로 포함 — 플래너가 복사해서 바로 사용할 수 있는 자체 완결 형태\n8. **버전 업데이트:**\n   - 변경 유형: **MINOR** (신규 컴포넌트 추가)\n   - `build.py` `<span class=\"version-pill\">` 값: 둘째 자리 +1, 셋째 자리 0으로 리셋\n   - `build.py`의 `FILE_ORDER` 리스트에 새 항목 추가\n\n---\n\n### 기존 컴포넌트 수정\n\n**시작 전 읽을 파일:** 해당 컴포넌트 `.md` · `tokens/_index.md`\n\n**작업 단계:**\n\n1. **변경 유형 판단:**\n   - 클래스명 변경, variant 제거 → **MAJOR**\n   - 새 variant·상태 추가 → **MINOR**\n   - 시각 미세 조정(대비비·간격 포함) → **MINOR** 이상 (PATCH 불가)\n   - 설명·예시 텍스트만 수정 → **PATCH**\n\n2. `design-system/**/*.md` 내 CSS 코드 블록에서 변경 대상 클래스명·토큰 grep → 다른 컴포넌트 영향 여부 확인\n3. CHANGELOG 항목 초안 작성 (Added / Changed / Removed 중 해당)\n4. 수정된 HTML/CSS 출력 + `components/[ComponentName].md` 코드 섹션 동기화 (`:root {}` 값 포함)\n\n5. **버전 업데이트:**\n   - 해당 컴포넌트 `.md` frontmatter `version:` 업데이트, `updated:` 오늘 날짜\n   - MAJOR: `build.py` `<span class=\"version-pill\">` 첫째 자리 +1, 나머지 0\n   - MINOR: `build.py` `<span class=\"version-pill\">` 둘째 자리 +1, 셋째 자리 0\n   - PATCH: `build.py` `<span class=\"version-pill\">` 셋째 자리 +1\n\n---\n\n### 컴포넌트 사용 중단\n\n**시작 전 읽을 파일:** 해당 컴포넌트 `.md` · `components/_spec.md`\n\n**작업 단계:**\n\n1. 대체 컴포넌트 확인 → 없으면 사용자에게 대체 컴포넌트를 먼저 결정하도록 요청\n2. 해당 컴포넌트 `.md` frontmatter 수정:\n   ```yaml\n   status: deprecated\n   deprecated-since: [현재 버전]\n   replaced-by: [대체 컴포넌트명]\n   remove-at: [현재 MAJOR + 1].0.0\n   ```\n3. 컴포넌트 CSS 코드 블록 상단에 deprecated 주석 추가:\n   ```css\n   /* @deprecated [현재 버전] — [대체 컴포넌트명] 사용. [remove-at] 버전에서 제거 예정 */\n   ```\n4. CHANGELOG에 `Deprecated` 항목 기록\n\n5. **버전 업데이트:**\n   - 변경 유형: **MINOR** (사용 중단 선언)\n   - 해당 컴포넌트 `.md` frontmatter `version:` 둘째 자리 +1, `updated:` 오늘 날짜\n   - `build.py` `<span class=\"version-pill\">` 둘째 자리 +1, 셋째 자리 0\n\n6. **기획자 즉시 통보 필요:** 해당 컴포넌트 사용 중단 및 대체 컴포넌트([대체 컴포넌트명]) 교체 일정 공유. 컨텍스트 재등록은 GitHub 자동 동기화로 불필요.\n\n---\n\n### 컴포넌트 제거\n\n**시작 전 읽을 파일:** 해당 컴포넌트 `.md` · `components/_spec.md`\n\n**작업 단계:**\n\n1. **분기:**\n   - `status: deprecated`가 아니면 → **즉시 제거 불가.** \"`컴포넌트 사용 중단` 흐름을 먼저 진행하세요.\" 안내\n   - `remove-at` 버전 미달이면 → 사용자에게 시기 확인 후 진행\n   - 조건 충족 시 → 계속\n\n2. `design-system/**/*.md` 내 CSS·HTML 코드 블록에서 해당 컴포넌트 클래스명 grep → 여전히 참조하는 문서 있으면 사용자에게 알림\n3. 해당 컴포넌트 `.md` 파일 삭제\n4. `tokens.css`에서 해당 컴포넌트 전용 Component 토큰 제거\n5. `build.py`의 `FILE_ORDER` 리스트에서 해당 항목 제거\n6. CHANGELOG에 `Removed` 항목 기록\n\n7. **버전 업데이트:**\n   - 변경 유형: **MAJOR** (컴포넌트 제거)\n   - `build.py` `<span class=\"version-pill\">` 첫째 자리 +1, 나머지 0\n\n---\n\n### 컴포넌트 검토\n\n받은 코드를 아래 항목으로 검토하고 위반 사항만 지적:\n\n- [ ] hex 코드 직접 사용 없음 (모두 토큰 경유)\n- [ ] Primitive 직접 참조 없음 (Semantic만 사용)\n- [ ] padding으로 height 만들지 않음 (height 토큰 + align-items)\n- [ ] 모든 인터랙티브에 4상태 정의 (default · hover · pressed · disabled)\n- [ ] focus ring 가시 (`outline: none` 단독 사용 금지)\n- [ ] 단독 아이콘 버튼에 `aria-label`\n- [ ] 색상만으로 상태 구분 안 함 (텍스트·아이콘 병행)\n- [ ] BEM 클래스명 full name 사용\n\n---\n\n## 시스템\n\n### 전체 일관성 감사\n\n**시작 전 읽을 파일:** `design-system/**/*.md` 전체 · `tokens.css`\n\n`design-system/**/*.md`의 CSS 코드 블록(` ```css ` ~ ` ``` `)을 파일별로 순서대로 검사:\n\n1. **토큰 직접 참조 위반** — hex 값 하드코딩, `--color-*` Primitive 직접 사용\n2. **BEM 규칙 위반** — 약어 클래스명, 다른 컴포넌트와 네이밍 패턴 불일치\n3. **상태 누락** — 인터랙티브 컴포넌트에 4상태 미정의\n4. **접근성 누락** — focus ring 없음, 필수 aria 속성 누락\n5. **deprecated 토큰 참조** — `tokens.css`에서 deprecated 처리된 토큰을 아직 쓰는 컴포넌트\n\n결과: 위반 항목별로 `파일명 · 위반 내용` 목록 출력. 수정은 사용자 확인 후 진행.\n\n---\n\n## Appendix: 버전 규칙\n\n| 유형 | 기준 | 버전 계산 |\n|------|------|---------|\n| MAJOR | 클래스명·토큰명 변경, variant·토큰 제거 | 첫째 자리 +1, 나머지 0 |\n| MINOR | 새 variant·상태·토큰 추가, 사용 중단 선언 | 둘째 자리 +1, 셋째 자리 0 |\n| PATCH | 오탈자·설명·예시 수정만 | 셋째 자리 +1 |\n\n> 판단 기준: \"이 변경으로 기존에 만들어진 코드를 다시 수정해야 하는가?\" YES → MAJOR\n\n---\n\n## 출력 형식\n\n```html\n<!-- 컴포넌트 HTML -->\n<button class=\"btn btn--primary-fill btn--md btn--round\">저장<\/button>\n```\n\n```css\n/* 컴포넌트 CSS — Semantic 토큰만 */\n.btn { ... }\n.btn--primary-fill { ... }\n```\n\n```\nCHANGELOG:\n- Added: Button.primary-fill variant\n- 영향 컴포넌트: 없음\n\n버전 업데이트:\n- 변경 유형: MINOR\n- tokens/button.md: version 0.5.0 → 0.6.0 / updated 2025-06-01\n- build.py version-pill: v0.5.0 → v0.6.0\n```\n\n---\n\n## 절대 하지 말 것\n\n- 역할 범위 외 요청 (페이지·프로토타입 도출, React/Vue 변환) → \"이 모드에서 처리하지 않습니다. 다른 역할 모드가 필요합니다\" 안내\n- 시스템에 없는 임의 색·크기·radius 값 생성 (토큰 추가 작업으로 안내)\n- Primitive 토큰 직접 참조\n- padding으로 height 구성\n- focus ring 누락 또는 `outline: none` 단독 사용\n- 시각적 변경을 PATCH 처리\n- 사용 중단 절차 없이 컴포넌트·토큰 즉시 제거\n- 영향 범위 파악 전 토큰명·클래스명 변경 진행\n\n---\n\n## 변경 인계 시 출력에 포함할 것\n\n1. CHANGELOG 항목 (Added / Changed / Deprecated / Removed)\n2. 버전 업데이트 내용 (변경 유형 근거 + 구버전 → 신버전 + 수정 대상 파일)\n3. 영향받는 컴포넌트 목록\n4. 기획자 통보 필요 여부:\n   - MAJOR → 기획자에게 변경 내용 공유 필요. 클래스명·토큰명이 바뀌었으므로 기존 프로토타입 코드 점검 필요. GitHub 자동 동기화로 컨텍스트 재등록은 불필요.\n   - MINOR·PATCH → 통보 불필요. GitHub 자동 동기화로 반영됨.\n"}, {"path": "workflow/planner.md", "label": "🧭 Planner", "group": "workflow", "slug": "workflow--planner", "raw": "---\nfile: workflow/planner.md\nversion: 0.4.1\n---\n\n# 🧭 Planner Mode\n\n당신은 김반장 디자인 시스템의 컴포넌트를 조합해 프로토타입을 만드는 기획자입니다.<br>\n아래 흐름에 따라 요청을 처리하세요.\n\n---\n\n## 요청 분류\n\n**프로토타입**\n\n| 사용자 요청 패턴 | 실행할 흐름 |\n|:---|:---|\n| 만들어줘 · 그려줘 · 짜줘 · 보여줘 | [새 프로토타입 만들기](#새-프로토타입-만들기) |\n| 수정해줘 · 바꿔줘 · 추가해줘 | [프로토타입 수정](#프로토타입-수정) |\n\n---\n\n## 프로토타입\n\n### 새 프로토타입 만들기\n\n**시작 전 읽을 파일:** 사용할 `components/*.md`의 `## 용도` ~ `## 코드` 섹션까지만 (스펙·접근성 체크리스트는 디자이너 영역)\n\n**작업 단계:**\n\n1. **요구사항 분석**\n   - 계층 식별 — Atom · Molecule · Organism · Pattern (→ [컴포넌트 계층](#컴포넌트-계층))\n   - 필요 상태 식별 — default · empty · loading · error (→ [상태 패턴](#상태-패턴))\n   - 데이터 종류 파악 — 날짜 · 숫자 · 통화 · 빈값 (→ [데이터 표시 규칙](#데이터-표시-규칙))\n\n2. **컴포넌트 매칭**\n   - 각 UI 요소를 `components/*.md`에 있는 컴포넌트에 매핑\n   - 각 컴포넌트의 `## 용도` · `## 규칙`을 확인해 맥락에 맞는지 검증 (예: 비가역 액션이 아닌데 danger 사용 ✗)\n   - 시스템에 없는 컴포넌트가 필요하면 → **작업 중단**, 사용자에게 안내:\n     \"시스템에 없는 컴포넌트입니다. 디자이너에게 컴포넌트 추가를 요청한 후 진행하세요.\"\n\n3. **단일 HTML 출력**\n   - 각 `components/[name].md`의 `## 코드` 섹션을 그대로 복사 (`:root {}` 포함)\n   - 외부 CSS·JS 의존성 없이 자체 완결\n   - 상태별 데모 모두 포함 — default · empty · loading · error 전부 표시\n   - 접근성 속성 포함 (→ [접근성 규칙](#접근성-규칙))\n\n4. **인계 메타 출력** — 사용된 시스템 버전·컴포넌트 목록·처리 상태·예외 사항을 yaml로\n\n---\n\n### 프로토타입 수정\n\n**시작 전 읽을 파일:** 사용자가 전달한 기존 프로토타입 HTML · 수정에 필요한 `components/*.md`\n\n**작업 단계:**\n\n1. 기존 HTML에서 사용된 컴포넌트 목록 파악\n2. **변경 유형 판단:**\n   - 상태 추가·레이아웃 변경 → 기존 컴포넌트 유지, 필요한 컴포넌트만 추가\n   - 시스템에 없는 컴포넌트 요청 → **작업 중단**, 디자이너 검토 안내\n3. 수정된 단일 HTML 출력 (전체 파일 출력, 변경 부분 주석으로 표시)\n4. **인계 메타 업데이트** — 변경 내용·추가된 컴포넌트·상태 반영\n\n---\n\n## Appendix: 컴포넌트 계층\n\n인계 메타의 `components-used` 분류에 사용.\n\n| 레이어 | 기준 | 예시 |\n|--------|------|------|\n| **Atom** | 분해 불가, 의존성 없음 | Button · Input · Badge · Toggle · Icon |\n| **Molecule** | Atom 2개+ 결합, 단일 기능 | FormField · SearchBar · Dropdown |\n| **Organism** | 자체 레이아웃 보유 | Table · SidebarNav · Card · TopNav |\n| **Pattern** | 페이지 수준 구조 | Dashboard · ListPage · DetailPage |\n\n---\n\n## Appendix: 상태 패턴\n\n데이터를 다루는 모든 컴포넌트는 **default · empty · loading · error** 4가지 상태를 정의한다.\n\n### Empty State\n\n| 종류 | 메시지 | 액션 |\n|------|--------|------|\n| 첫 진입 (데이터 없음) | \"아직 [항목]이 없어요\" | 생성 CTA |\n| 필터 결과 없음 | \"조건에 맞는 [항목]이 없어요\" | 필터 초기화 |\n| 권한 없음 | \"이 [항목]에 접근 권한이 없어요\" | 관리자 문의 안내 |\n\n### Loading State\n\n| 종류 | 사용처 | 기준 |\n|------|--------|------|\n| Skeleton | 레이아웃 예측 가능 (Table · Card · Form) | 1초 이상 예상 |\n| Spinner | 예측 불가, 짧은 작업 (버튼 내부 · 인라인) | 1–3초 |\n| Progress bar | 진행률 표시 가능한 긴 작업 (업로드 · 일괄 처리) | 3초 이상 |\n\n> ⚠️ 1초 미만 Loading은 표시하지 않는다 (깜빡임 방지).\n\n### Error State\n\n| 종류 | 사용처 |\n|------|--------|\n| Inline | 단일 필드 에러 (입력 검증) |\n| Banner | 섹션 단위 에러 (저장 실패 · 권한 부족) |\n| Page | 전체 페이지 로드 실패 (404 · 500) |\n\n> ⚠️ 모든 에러 메시지는 **원인 + 해결 방법** 구조. 사과·자조 톤 금지.\n\n---\n\n## Appendix: 접근성 규칙\n\n| 상황 | 처리 |\n|------|------|\n| 단독 아이콘 버튼 | `aria-label=\"[동작 이름]\"` 필수 |\n| 폼 필드 | `<label>` 또는 `aria-labelledby` |\n| 에러 메시지 | `aria-describedby`로 필드 연결 + `role=\"alert\"` |\n| 동적 업데이트 영역 | `aria-live=\"polite\"` |\n| 장식용 아이콘 | `aria-hidden=\"true\"` |\n| 키보드 focus | `outline: none` 단독 사용 금지. 컴포넌트 `.md`의 focus 스타일 그대로 유지 |\n\n---\n\n## Appendix: 데이터 표시 규칙\n\n| 종류 | 형식 | 예 |\n|------|------|-----|\n| 숫자 | 천단위 콤마 | `1,234` |\n| 큰 숫자 | 한국어 단위 | `1,234만` |\n| 날짜 | `YYYY.MM.DD` | `2025.06.01` |\n| 날짜+시간 | `YYYY.MM.DD HH:mm` | `2025.06.01 14:30` |\n| 통화 | 단위 뒤, 천단위 콤마 | `12,000원` |\n| 빈값 | em dash | `—` |\n| 진행률 | 정수 % | `85%` |\n\n> ⚠️ 같은 컬럼·같은 데이터 종류는 형식 통일. 혼용 금지.\n\n---\n\n## Appendix: Microcopy 규칙\n\n- 톤: 해요체\n- 버튼: 동사 명사형 (`저장`, `삭제` — `저장하기` ✗)\n- 에러: 원인 + 해결 방법, 사과 톤 금지\n\n---\n\n## 출력 형식\n\n```html\n<!-- design-system: v0.5.1 -->\n<!-- prototype: [한 줄 설명] -->\n<!DOCTYPE html>\n<html lang=\"ko\">\n<head>\n  <meta charset=\"UTF-8\">\n  <title>[프로토타입 이름]<\/title>\n  <style>\n    /* === [ComponentName] (components/[name].md § 코드) === */\n    :root { /* 컴포넌트 코드 섹션의 토큰 값 그대로 */ }\n    .component-class { /* 컴포넌트 CSS 그대로 */ }\n\n    /* === [다음 컴포넌트명] === */\n    :root { /* ... */ }\n    .next-component { /* ... */ }\n\n    /* 레이아웃·조합 스타일 */\n  <\/style>\n<\/head>\n<body>\n  <section data-state=\"default\">...<\/section>\n  <section data-state=\"empty\">...<\/section>\n  <section data-state=\"loading\">...<\/section>\n  <section data-state=\"error\">...<\/section>\n<\/body>\n<\/html>\n```\n\n```yaml\n# 개발자 인계 메타\nprototype: [한 줄 설명]\ndesign-system-version: 0.5.1\ncomponents-used:\n  - Atom/Button (v0.1.0)\n  - Molecule/FormField (v0.2.0)\nstates-covered: [default, empty, loading, error]\nnotes: |\n  - [예외 사항 또는 시스템 외 요청 사항]\n```\n\n---\n\n## 절대 하지 말 것\n\n- 역할 범위 외 요청 (시스템 토큰·원칙 변경, React/Vue 변환) → \"이 모드에서 처리하지 않습니다. 다른 역할 모드가 필요합니다\" 안내\n- `components/*.md`에 없는 컴포넌트 스타일 직접 작성 (디자이너 검토 안내)\n- 컴포넌트 코드 섹션의 CSS 수정 (토큰 값·클래스 변경 모두 디자이너 영역)\n- 상태 누락 — 특히 empty · loading · error 빠뜨리지 말 것\n- 접근성 속성 누락\n- 시스템 버전 주석 누락\n- 외부 CSS·JS 라이브러리 의존 (단일 HTML 자체 완결)\n"}, {"path": "governance.md", "label": "문서 규칙·버전", "group": "governance", "slug": "governance", "raw": "---\nfile: governance.md\nversion: 0.6.2\n---\n\n# 문서 규칙 & 버전 관리\n\n## 문서 헤더\n\n최상단에 `file`과 `version`만 포함한다.\n\n```yaml\n---\nfile: tokens/color.md\nversion: 0.3.0\n---\n```\n\n---\n\n## 버전 규칙\n\nSemantic Versioning (MAJOR.MINOR.PATCH)\n\n| 버전 | 자리 | 기준 | 해당하는 변경 |\n|------|------|------|-------------|\n| **MAJOR** | 첫째 | 기존 코드가 깨지는 변경 | 클래스명·토큰명 변경, variant 제거 |\n| **MINOR** | 둘째 | 기존 코드 유지 + 기능 추가 | 새 variant·상태·토큰 추가 |\n| **PATCH** | 셋째 | 스펙 변경 없는 문서 수정 | 오탈자·설명·예시 수정 |\n\n```\n# MAJOR — 기존 코드를 다시 수정해야 함\n0.2.0  →  1.0.0   .btn--primary 클래스명이 .btn--brand로 변경됨\n\n# MINOR — 기존 코드는 그대로, 새 기능만 추가됨\n0.1.0  →  0.2.0   ghost variant 추가\n\n# PATCH — 코드와 스펙 변경 없음\n0.1.0  →  0.1.1   설명 오탈자 수정\n```\n\n> 💡 **판단 기준:** \"이 변경으로 기존에 만들어진 코드를 다시 수정해야 하는가?\"\n> YES → MAJOR  /  새 기능 추가 → MINOR  /  문서만 수정 → PATCH\n\n변경 절차: `CHANGELOG.md [Unreleased]` 기록 → 헤더 업데이트 → 릴리즈 시 git tag.\n"}, {"path": "tokens/_index.md", "label": "아키텍처", "group": "tokens", "slug": "tokens--index", "raw": "---\nfile: tokens/_index.md\nversion: 0.4.2\n---\n\n# 토큰 아키텍처 (3-tier)\n\n\nPrimitive(원시값) → Semantic(용도 부여) → Component(컴포넌트 전용) 순으로 참조한다.\n\n| Tier | 위치 | 컴포넌트에서 직접 사용 |\n|------|------|----------------------|\n| Primitive | `tokens.css` 상단 | ❌ 금지 |\n| Semantic | `tokens.css` 중단 | ✅ 사용 |\n| Component | 각 `.md` 스펙 섹션 | ✅ 사용 |\n\n## 네이밍 규칙\n> Semantic 패턴은 최대 3단계([속성]-[맥락]-[변형])이며, 맥락 차원이 의미 없는 토큰은 2단계도 유효하다.\n> `radius`(코너 크기만 존재), `height`(density가 맥락), `shadow`·`duration`·`z-index` 등이 해당한다.\n> typography는 4축(font-size·line-height·letter-spacing·font-weight)을 각각 독립적인 Semantic으로 정의하고,\n> use case별 묶음은 `.text-*` 유틸 클래스로 제공한다 (자세한 내용은 typography.md).\n\n| 토큰 | Primitive | Semantic |\n|------|-----------|----------|\n| **패턴** | --[속성]-[값] | --[속성]-[맥락]-[변형] |\n| color | --color-[팔레트]-[50–900]<br>`--color-brand-500`<br>`--color-gray-100` | --color-[맥락]-[변형]<br>`--color-text-body`<br>`--color-surface-base` |\n| space | --space-[px값]<br>`--space-8`<br>`--space-16` | --space-[유형]-[크기]<br>`--space-inset-md`<br>`--space-gap-sm` |\n| font-size | --font-size-[px값]<br>`--font-size-11`<br>`--font-size-14` | --font-size-[역할]<br>`--font-size-base`<br>`--font-size-h1` |\n| font-weight | --font-weight-[weight명]<br>`--font-weight-semibold` | --font-weight-[강조]<br>`--font-weight-body`<br>`--font-weight-heading`<br>`--font-weight-display` |\n| line-height | --line-height-[밀도]<br>`--line-height-tight`<br>`--line-height-base`<br>`--line-height-relaxed` | --line-height-[성질]<br>`--line-height-ui`<br>`--line-height-reading`<br>`--line-height-prose` |\n| letter-spacing | --letter-spacing-[크기]<br>`--letter-spacing-tight`<br>`--letter-spacing-normal`<br>`--letter-spacing-wide` | --letter-spacing-[계층]<br>`--letter-spacing-default`<br>`--letter-spacing-display` |\n| font-family | — | --font-family-[유형]<br>`--font-family-base` |\n| text utility | — | .text-[use case]<br>`.text-button-md`<br>`.text-body`<br>`.text-page-title` |\n| radius | --radius-[px값]<br>`--radius-4`<br>`--radius-1000` | --radius-[크기]<br>`--radius-sm`<br>`--radius-pill` |\n| height | --height-[px값]<br>`--height-32`<br>`--height-36` | --height-[density]<br>`--height-compact`<br>`--height-base`<br>`--height-spacious` |\n| shadow | — | --shadow-[크기]<br>`--shadow-md`<br>`--shadow-lg` |\n| z-index | — | --z-[맥락]<br>`--z-modal`<br>`--z-toast` |\n| duration | — | --duration-[속도]<br>`--duration-fast`<br>`--duration-base` |\n\n> Component 토큰은 복잡한 컴포넌트(Modal, Table)의 고유값에만 사용한다.<br>\n> Button·Badge처럼 단순한 컴포넌트는 Semantic만으로 충분하다.\n\n\n| 토큰 | Component |\n|------|-----------|\n| **패턴** | --[속성]-[컴포넌트]-[변형]-[역할] |\n| color | `--color-button-primary-fill` |\n\n\n\n## Do / Don't\n\n> ✅ DO — Semantic을 통해 참조\n> `background: var(--color-button-primary-fill);`\n\n> ❌ DON'T — Primitive 직접 사용\n> `background: var(--color-brand-600);`\n\n> ❌ DON'T — hex 직접 사용\n> `background: #115ac6;`\n\n"}, {"path": "tokens/color.md", "label": "색상", "group": "tokens", "slug": "tokens--color", "raw": "---\nfile: tokens/color.md\nversion: 1.0.0\ndepends-on: tokens/_index.md\n---\n\n# 색상 시스템\n\n## Primitive\n\n밝기 스케일(50–950)로 구성된다. 숫자가 클수록 어둡다. 팔레트별 원시값이며 컴포넌트에서 직접 참조하지 않는다.\n\n### Blue\n\n주요 브랜드 컬러. CTA 버튼, 링크, 포커스 링, 선택·활성 상태.\n\n<div class=\"palette-placeholder\" data-palette=\"blue\"><\/div>\n\n### Cyan\n\n보조 브랜드 컬러. 정보성 배지, 보조 액션, 데이터 시각화 계열.\n\n<div class=\"palette-placeholder\" data-palette=\"cyan\"><\/div>\n\n### Gray\n\n중립 UI. 텍스트, 배경, 구분선, 비활성 상태 전반.\n\n<div class=\"palette-placeholder\" data-palette=\"gray\"><\/div>\n\n### Green\n\n성공·긍정 상태. 완료, 승인, 성공 메시지, 유효성 검사 통과.\n\n<div class=\"palette-placeholder\" data-palette=\"green\"><\/div>\n\n### Orange\n\n경고·주의 상태. 주의가 필요한 정보, 기한 임박, 권장 사항.\n\n<div class=\"palette-placeholder\" data-palette=\"orange\"><\/div>\n\n### Red\n\n오류·위험 상태. 에러 메시지, 삭제 확인, 위험 액션.\n\n<div class=\"palette-placeholder\" data-palette=\"red\"><\/div>\n\n## Semantic\n\n| 그룹 | 사용처 | 예시 |\n|------|--------|------|\n| `surface` | 중립 배경 | `--color-surface-base`, `--color-surface-subtle`, `--color-surface-neutral`, `--color-surface-disabled`, `--color-surface-dark`, `--color-surface-dim` |\n| `surface` | 브랜드 배경 | `--color-surface-brand`, `--color-surface-brand-subtle`, `--color-surface-brand-tint`, `--color-surface-info-subtle`, `--color-surface-info-tint` |\n| `surface` | 상태 배경 | `--color-surface-success-subtle`, `--color-surface-caution-subtle`, `--color-surface-error-subtle` |\n| `text` | 본문·UI 텍스트 | `--color-text-body`, `--color-text-display`, `--color-text-label`, `--color-text-subtle`, `--color-text-disabled`, `--color-text-inverse` |\n| `text` | 브랜드 텍스트 | `--color-text-brand-vivid`, `--color-text-brand`, `--color-text-brand-muted`, `--color-text-info`, `--color-text-info-muted` |\n| `text` | 상태 피드백 | `--color-text-caution`, `--color-text-error` |\n| `border` | 테두리·구분선 | `--color-border-subtle`, `--color-border-default`, `--color-border-disabled`, `--color-border-selected`, `--color-border-brand`, `--color-border-focus`, `--color-border-error` |\n| `action` | 중립 인터랙션 | `--color-action-neutral-hover`, `--color-action-neutral-pressed`, `--color-action-neutral-selected`, `--color-action-neutral-overlay` |\n| `action` | 브랜드 인터랙션 | `--color-action-brand-hover`, `--color-action-brand-pressed`, `--color-action-brand-selected`, `--color-action-brand-overlay`, `--color-action-info-hover`, `--color-action-info-pressed`, `--color-action-info-selected`, `--color-action-info-overlay`, `--color-action-info-subtle` |\n| `action` | 위험 인터랙션 | `--color-action-error-hover`, `--color-action-error-pressed`, `--color-action-error-selected`, `--color-action-error-overlay` |\n\n\n## Do / Don't\n\n> ✅ DO — Semantic 사용\n> `color: var(--color-text-body);`\n> `border: 1px solid var(--color-border-default);`\n\n> ❌ DON'T — Primitive 직접 참조\n> `color: var(--color-gray-950);`\n\n> ❌ DON'T — hex 직접 사용\n> `color: #131416;`\n"}, {"path": "tokens/space.md", "label": "공간", "group": "tokens", "slug": "tokens--space", "raw": "---\nfile: tokens/space.md\nversion: 1.0.0\ndepends-on: tokens/_index.md\n---\n\n# 공간 시스템\n\n## Primitive\n\n4px 기반 스케일로 구성된다. 소형(2–8px)은 컴포넌트 내부 여백에서 세밀하게, 중형(8–24px)은 4px 배수, 대형(24px~)은 8px 이상으로 점프한다.\n\n### Space\n\n<div class=\"scale-placeholder\" data-scale=\"space\"><\/div>\n\n### Height\n\n컴포넌트 클릭 영역 고정 높이. padding으로 높이를 만들지 않는다.\n\n<div class=\"scale-placeholder\" data-scale=\"height\"><\/div>\n\n## Semantic\n\n| 그룹 | 사용처 | 예시 |\n|------|--------|------|\n| `inset` | <div data-ex=\"space-inset\"><\/div> 컨테이너 사방 padding | `--space-inset-xs`, `--space-inset-sm`, `--space-inset-md`, `--space-inset-lg`, `--space-inset-xl`, `--space-inset-2xl` |\n| `inset-squish` | <div data-ex=\"space-inset-squish\"><\/div> 좌우가 상하의 2배인 padding — 버튼·태그·pill | `--space-inset-squish-xs`, `--space-inset-squish-sm`, `--space-inset-squish-md`, `--space-inset-squish-lg`, `--space-inset-squish-xl`, `--space-inset-squish-2xl` |\n| `stack` | <div data-ex=\"space-stack\"><\/div> 요소 아래 세로 margin | `--space-stack-xs`, `--space-stack-sm`, `--space-stack-md`, `--space-stack-lg`, `--space-stack-xl`, `--space-stack-2xl` |\n| `gap` | <div data-ex=\"space-gap\"><\/div> flex·grid 자식 간격 — 부모에 적용 | `--space-gap-2xs`, `--space-gap-xs`, `--space-gap-sm`, `--space-gap-md`, `--space-gap-lg`, `--space-gap-xl`, `--space-gap-2xl`, `--space-gap-3xl` |\n| `generic` | 단방향 margin 등 위 4가지로 안 되는 예외 | `--space-generic-xs`, `--space-generic-sm`, `--space-generic-md`, `--space-generic-lg`, `--space-generic-xl`, `--space-generic-2xl` |\n| `height` | 컴포넌트 클릭 영역 고정 높이 | `--height-tight`, `--height-dense`, `--height-compact`, `--height-base`, `--height-spacious`, `--height-loose` |\n\n## Do / Don't\n\n> ✅ DO — 용도에 맞는 Semantic 사용\n> `padding: var(--space-inset-md);`\n> `padding: var(--space-inset-squish-md);`\n> `margin-bottom: var(--space-stack-sm);`\n> `gap: var(--space-gap-sm);`\n\n> ❌ DON'T — 임의값 직접 사용\n> `padding: 16px;`\n> `margin-bottom: 8px;`\n\n> ✅ DO — height 토큰으로 높이 고정\n> `.btn { height: var(--height-base); display: flex; align-items: center; }`\n\n> ❌ DON'T — padding으로 높이 조절\n> `.btn { padding: 8px 16px; }`\n\n> ✅ DO — 단방향 margin은 generic으로 값을 가져오고 방향은 CSS로 지정\n> `margin-inline-end: var(--space-generic-sm);`\n\n> ❌ DON'T — Primitive 직접 참조\n> `padding: var(--space-16);`\n"}, {"path": "tokens/typography.md", "label": "타이포그래피", "group": "tokens", "slug": "tokens--typography", "raw": "---\nfile: tokens/typography.md\nversion: 3.0.0\ndepends-on: tokens/_index.md\n---\n\n# 타이포그래피\n\n3-tier 구조. Primitive(원시값) → Semantic(축별 의미) → Utility(컴포넌트 use case 묶음).\n컴포넌트는 **`.text-*` 유틸 클래스**로 적용한다.\n\n## Primitive\n\n### Font Family · Font Size\n\n단일값. Pretendard 로드 실패 시 뒤의 값이 순서대로 대체된다. 소형(11–15px)은 UI 밀도용, 중형(17–20px)은 UI 강조·소제목, 대형(28–32px)은 페이지 구조.\n\n| 토큰 | 값 |\n|------|----|\n| `--font-family-base` | Pretendard, Apple SD Gothic Neo, Malgun Gothic |\n\n<div class=\"scale-placeholder\" data-scale=\"font-size\"><\/div>\n\n### Font Weight · Line Height · Letter Spacing\n\n<div class=\"scale-placeholder\" data-scale=\"typography-props\"><\/div>\n\n## Semantic — 4축\n\n각 속성을 독립적인 축으로 분리한다. 유틸 클래스가 이 값을 조합한다.\n\n| 축 | 사용처 | 토큰 |\n|---|--------|------|\n| `font-size` | 역할별 크기 (11–32px) | `--font-size-meta`, `--font-size-label`, `--font-size-sm`, `--font-size-base`, `--font-size-lg`, `--font-size-h4`, `--font-size-h3`, `--font-size-h2`, `--font-size-h1` |\n| `line-height` | 콘텐츠 성질 — 한 줄 UI · 다줄 본문 · 긴 글 | `--line-height-ui`, `--line-height-reading`, `--line-height-prose` |\n| `letter-spacing` | 계층 — 기본 · 28px 이상 대형 헤딩 | `--letter-spacing-default`, `--letter-spacing-display` |\n| `font-weight` | 강조 — 본문 · 헤딩·UI · 페이지 타이틀 | `--font-weight-body`, `--font-weight-heading`, `--font-weight-display` |\n\n## Utility — Use Case별 묶음 클래스\n\n컴포넌트 use case별로 4축을 묶은 클래스. **컴포넌트는 이 클래스로 적용한다.**\n\n| 그룹 | 사용처 | 클래스 |\n|------|--------|--------|\n| `button` | 버튼 레이블 — 소·중·대 | `--text-button-sm`, `--text-button-md`, `--text-button-lg` |\n| `form` | 인풋·라벨·헬퍼 | `--text-input`, `--text-form-label`, `--text-helper` |\n| `table` | 데이터 테이블 헤더·셀 | `--text-table-header`, `--text-table-cell` |\n| `navigation` | 탭·브레드크럼·메뉴 | `--text-tab`, `--text-breadcrumb`, `--text-menu-item` |\n| `hierarchy` | 페이지·섹션·서브섹션·카드 제목 | `--text-page-title`, `--text-section-title`, `--text-subsection-title`, `--text-card-title` |\n| `modal` | 모달 타이틀 | `--text-modal-title` |\n| `status` | 뱃지·태그·툴팁 | `--text-badge`, `--text-tag`, `--text-tooltip` |\n| `body·meta` | 본문·캡션·메타정보 | `--text-body`, `--text-caption`, `--text-meta` |\n\n## Do / Don't\n\n> ✅ DO — `.text-*` 유틸 클래스 적용\n> `<button class=\"text-button-md\">버튼<\/button>`\n> `<p class=\"text-body\">본문<\/p>`\n\n> ✅ DO — use case 없을 때 Semantic 토큰 직접 참조\n> `font-size: var(--font-size-base);`\n> `font-weight: var(--font-weight-heading);`\n\n> ❌ DON'T — Primitive 직접 참조\n> `font-size: var(--font-size-14);`\n\n> ❌ DON'T — 임의값 직접 사용\n> `font-size: 14px; line-height: 1.5;`\n\n> ⚠️ 새 use case가 반복적으로 등장하면 → 새 `.text-*` 클래스 추가\n> ⚠️ 본문 최소 13px (가독성)\n"}, {"path": "tokens/radius.md", "label": "Radius", "group": "tokens", "slug": "tokens--radius", "raw": "---\nfile: tokens/radius.md\nversion: 0.4.2\ndepends-on: tokens/_index.md\n---\n\n# Radius 시스템\n\n\nPrimitive는 px값을 이름으로 쓴다. Semantic은 컴포넌트에서 쓰이는 맥락으로 이름 붙인다. 실제 토큰 스케일은 `tokens.css` 참조.\n\n## 컴포넌트 shape와의 관계\n\nVariant 모델의 `shape` 차원이 radius 토큰에 직접 대응한다.\n\n```\nshape: round   →  --radius-pill   (1000px)\nshape: square  →  --radius-sm     (4px)\n```\n\n## Do / Don't\n\n> ✅ DO — Semantic 토큰 사용\n> `border-radius: var(--radius-pill);`\n> `border-radius: var(--radius-sm);`\n\n> ❌ DON'T — 임의값 직접 사용\n> `border-radius: 1000px;`\n> `border-radius: 4px;`\n\n> ⚠️ Figma에 없는 radius 값을 임의로 추가하지 않는다.\n> 새 값이 필요하면 Figma에 먼저 정의한 후 추출한다.\n"}, {"path": "tokens/elevation.md", "label": "Elevation", "group": "tokens", "slug": "tokens--elevation", "raw": "---\nfile: tokens/elevation.md\nversion: 0.4.3\ndepends-on: tokens/_index.md\n---\n\n# Elevation\n\nz축(깊이)을 shadow와 z-index 두 가지로 표현한다. 둘은 항상 같은 계층을 참조한다.\n\n| 계층 | shadow | z-index | 사용처 |\n|------|--------|---------|--------|\n| base | `--shadow-sm` | — | 카드, hover 강조 |\n| dropdown | `--shadow-md` | `--z-dropdown` (100) | 드롭다운, 팝오버 |\n| sticky | — | `--z-sticky` (150) | 고정 헤더, 컬럼 |\n| backdrop | — | `--z-backdrop` (200) | 모달 배경막 |\n| modal | `--shadow-lg` | `--z-modal` (210) | 모달, 사이드 패널 |\n| toast | `--shadow-xl` | `--z-toast` (300) | Toast, 최상위 알림 |\n| tooltip | `--shadow-md` | `--z-tooltip` (400) | 툴팁 |\n\n## Do / Don't\n\n> ✅ DO — shadow와 z-index 같은 계층 사용\n> `.modal { box-shadow: var(--shadow-lg); z-index: var(--z-modal); }`\n> `.toast { box-shadow: var(--shadow-xl); z-index: var(--z-toast); }`\n\n> ❌ DON'T — 임의 정수\n> `.modal { z-index: 9999; }`\n\n> ❌ DON'T — 계층 불일치 (드롭다운에 모달 그림자)\n> `.dropdown { box-shadow: var(--shadow-lg); }`\n\n> ⚠️ 하위 elevation에 상위 shadow 사용 금지(시각적 계층 오류).\n> ⚠️ 같은 레벨 컴포넌트는 같은 shadow 토큰 사용.\n"}, {"path": "tokens/motion.md", "label": "모션", "group": "tokens", "slug": "tokens--motion", "raw": "---\nfile: tokens/motion.md\nversion: 0.4.2\ndepends-on: tokens/_index.md\n---\n\n# 모션 시스템\n\n\n모션은 장식이 아닌 정보 전달 수단이다. 세 가지 목적 외 사용 금지.\n\n| 목적 | 사용처 |\n|------|--------|\n| 상태 피드백 | hover, pressed, focus 즉각 반응 |\n| 공간 관계 | 드롭다운 진입, 모달 등장, 슬라이드 패널 |\n| 주의 유도 | 에러 발생, toast 등장 |\n\n## Duration 매칭\n\n| 토큰 | 사용처 |\n|------|--------|\n| `--duration-fast` (100ms) | hover, focus, 즉각 상태 변화 |\n| `--duration-base` (150ms) | 드롭다운, 팝오버, 일반 전환 |\n| `--duration-slow` (200ms) | 모달, 사이드 패널, 페이지 전환 |\n\n기본 easing은 `--easing-base` 사용. 세분화는 도입 시점에 토큰 추가한다.\n\n## Do / Don't\n\n> ✅ DO — 속성 명시 + 토큰 사용\n> `transition: background var(--duration-fast) var(--easing-base);`\n> `transition: opacity var(--duration-base) var(--easing-base);`\n\n> ❌ DON'T — 임의값, all 사용, 의미 없는 반복\n> `transition: all 0.3s ease-in-out;`\n> `animation: pulse 2s infinite;`\n\n## `prefers-reduced-motion` 대응 (필수)\n\n```css\n@media (prefers-reduced-motion: reduce) {\n  *, *::before, *::after {\n    transition-duration: 0.01ms !important;\n    animation-duration:  0.01ms !important;\n    animation-iteration-count: 1 !important;\n  }\n}\n```\n\n> ⚠️ 자동 반복 애니메이션, 장식용 모션 금지.\n> ⚠️ 사용자가 호출하지 않은 모션은 만들지 않는다(loading 인디케이터 제외).\n"}, {"path": "tokens/icon.md", "label": "아이콘", "group": "tokens", "slug": "tokens--icon", "raw": "---\nfile: tokens/icon.md\nversion: 0.4.2\ndepends-on: tokens/_index.md\n---\n\n# 아이콘 시스템\n\n\n아이콘 크기는 컴포넌트 height와 매칭한다. 한 화면에서 스타일은 하나로 통일한다.\n\n| 토큰 | 크기 | 사용처 |\n|------|------|--------|\n| `--icon-12` | 12px | 보조 인디케이터(badge 내부, 메타 정보) |\n| `--icon-16` | 16px | 기본. md size 컴포넌트(Button, Input) |\n| `--icon-20` | 20px | lg size, 단독 아이콘 버튼 |\n| `--icon-24` | 24px | xl size, 페이지 헤더, 네비게이션 |\n\n## 스타일 일관성\n\n한 화면에서 outlined 또는 filled 중 하나만 사용한다. 혼용 금지.\n선택적 강조 표현(active 상태, 알림)에서만 filled 허용.\n\n## 정렬\n\n- 텍스트와 함께 쓸 때 옵티컬 센터 정렬 (line-height 기준 중앙)\n- 아이콘과 텍스트 사이 간격은 `--space-gap-xs`\n- 아이콘 색상은 텍스트 색상 상속 (`color: inherit`)\n\n## Do / Don't\n\n> ✅ DO — 텍스트 + 아이콘\n> `<button class=\"btn btn--md\"><Icon name=\"save\" size=\"16\" /> 저장<\/button>`\n\n> ❌ DON'T — 단독 아이콘 + 라벨 없음\n> `<button><Icon name=\"delete\" /><\/button>`\n\n> ✅ DO — 단독 아이콘 버튼 (aria-label 필수)\n> `<button class=\"btn-icon\" aria-label=\"삭제\"><Icon name=\"delete\" size=\"20\" /><\/button>`\n\n> ❌ DON'T — outlined와 filled 혼용\n> `<Icon name=\"save\" variant=\"outlined\" />`\n> `<Icon name=\"delete\" variant=\"filled\" />`\n\n> ⚠️ 단독 아이콘 버튼은 반드시 `aria-label` 또는 `aria-labelledby` 제공.\n> 자세한 접근성 요구사항은 `accessibility.md` 참조.\n"}, {"path": "interaction.md", "label": "인터랙션", "group": "interaction", "slug": "interaction", "raw": "---\nfile: interaction.md\nversion: 0.1.0\n---\n\n# 인터랙션\n\n## 상태 패턴 (모든 인터랙티브 컴포넌트 동일)\n\n```\ndefault  →  hover(밝게)  →  pressed(어둡게)  →  disabled\n                                               bg:   --color-gray-100\n                                               text: --color-gray-400\n```\n\n> ⚠️ 색상만으로 상태를 구분하지 않는다. 아이콘·텍스트를 반드시 병행한다.\n> 텍스트-배경 대비 최소 **4.5:1** (WCAG AA). 자세한 기준은 `accessibility.md` 참조.\n"}, {"path": "adaptation.md", "label": "반응형·다크모드", "group": "adaptation", "slug": "adaptation", "raw": "---\nfile: adaptation.md\nversion: 0.4.1\n---\n\n# 반응형 & 다크모드\n\n> **언제 참조하나:** 레이아웃 결정·테마 처리 시 모든 사람\n\n## 반응형 & Breakpoint\n\n김반장 3.0은 **데스크톱 우선**이다. 태블릿까지 지원, 모바일은 추후 검토.\n\n| Breakpoint | 너비 | 대응 디바이스 |\n|------------|------|--------------|\n| sm | < 768px | (현재 미지원) |\n| md | 768–1024px | 태블릿 |\n| lg | 1024–1440px | 데스크톱 (기본) |\n| xl | ≥ 1440px | 와이드 모니터 |\n\nContainer max width: `--layout-max-width: 1440px`\n\n### 규칙\n\n- 컴포넌트는 컨테이너 너비에 따라 자연스럽게 stretch한다.\n- Sidebar는 `lg` 이상에서만 고정. `md`에서는 collapse.\n- Table은 `md` 이하에서 가로 스크롤 허용. **컬럼 reflow 금지**(데이터 비교 가능성 유지).\n- Modal은 모든 breakpoint에서 max-width 고정 + 화면 가운데 정렬.\n\n> ⚠️ 모바일(< 768px) 대응이 필요한 컴포넌트는 별도 기획 후 추가.\n> ⚠️ B2B 워크플로우 특성상 태블릿 미만은 디자인 의사결정 필요.\n\n## 다크모드 정책\n\n**현재 라이트 모드만 지원.** 토큰 구조는 다크모드 전환을 전제로 설계되어 있으나 정식 지원은 추후 결정.\n\n### 규칙\n\n- 컴포넌트에서 hex값 직접 사용 금지(다크모드 전환 시 일괄 갈아끼울 수 없게 됨).\n- Surface, text, border, shadow는 반드시 Semantic 토큰 경유.\n- 향후 다크모드 도입 시 Primitive 추가 + Semantic 매핑 변경만으로 전환 가능하도록 유지.\n\n> ✅ DO — Semantic 경유. 다크모드 전환 시 토큰만 바뀌면 됨\n> `.card { background: var(--color-surface-base); color: var(--color-text-body); }`\n\n> ❌ DON'T — hex·Primitive 직접 참조 (다크모드 전환 불가)\n> `.card { background: #ffffff; color: var(--color-gray-900); }`\n\n> 💡 Semantic 토큰을 지키는 한 다크모드는 토큰 레벨 작업으로 끝난다. 컴포넌트 코드는 그대로.\n"}, {"path": "product.md", "label": "제품 패턴", "group": "product", "slug": "product", "raw": "---\nfile: product.md\nversion: 0.4.2\n---\n\n# 제품 제약 & 패턴\n\n## B2B SaaS 제약\n\n| 제약 | 규칙 |\n|------|------|\n| 정보 밀도 | 장식 최소화. 같은 면적에 더 많은 정보 |\n| 오류 방지 | 비가역 행동(삭제·전송)은 항상 확인 단계 |\n| 반복 효율 | 키보드 내비게이션 필수. 자주 쓰는 행동 = 최소 클릭 |\n| 일관성 | 같은 기능 = 같은 위치·모양. 컴포넌트 용도 이탈 금지 |\n| 데이터 우선 | Table·Form·Filter 최우선. Empty·Loading·Error state 필수 |\n\n### Density 모드\n\n데이터 밀도가 높은 화면(Table, Form, List)은 density 모드를 선택할 수 있다.\n\n| 모드 | 컴포넌트 height | 사용처 |\n|------|-----------------|--------|\n| Compact | `--height-compact` | 데이터 테이블, 관리자 화면 |\n| Comfortable | `--height-base` (기본) | 일반 화면 |\n| Spacious | `--height-spacious` | 폼 중심 화면, 설정 페이지 |\n\n> ⚠️ 한 페이지 내 density 혼용 금지. 페이지 단위로 통일.\n> ⚠️ Density 변경은 height 토큰만 바뀐다. 폰트·radius는 그대로 유지.\n\n## 상태 패턴 (Empty · Loading · Error)\n\n데이터를 다루는 모든 컴포넌트는 4가지 상태를 정의한다: **default · empty · loading · error**.\n\n### Empty State\n\n원인별로 메시지와 액션이 다르다. 같은 빈 화면처럼 처리하지 않는다.\n\n| 종류 | 메시지 | 액션 |\n|------|--------|------|\n| 첫 진입 (데이터 없음) | \"아직 [항목]이 없어요\" | 생성 CTA |\n| 필터 결과 없음 | \"조건에 맞는 [항목]이 없어요\" | 필터 초기화 |\n| 권한 없음 | \"이 [항목]에 접근 권한이 없어요\" | 관리자 문의 안내 |\n\n### Loading State\n\n| 종류 | 사용처 | 기준 |\n|------|--------|------|\n| Skeleton | 레이아웃 예측 가능 (Table, Card list, Form) | 1초 이상 예상 |\n| Spinner | 예측 불가, 짧은 작업 (버튼 내부, 인라인) | 1–3초 |\n| Progress bar | 진행률 표시 가능한 긴 작업 (업로드, 일괄 처리) | 3초 이상 + 진행률 측정 가능 |\n\n### Error State\n\n| 종류 | 사용처 |\n|------|--------|\n| Inline | 단일 필드 에러 (입력 검증) |\n| Banner | 섹션 단위 에러 (저장 실패, 권한 부족) |\n| Page | 전체 페이지 로드 실패 (404, 500) |\n\n### 메시지 작성 규칙\n\n> ✅ \"네트워크 연결이 끊겼어요. 잠시 후 다시 시도해주세요.\"\n\n> ❌ \"죄송합니다, 알 수 없는 오류가 발생했습니다.\"\n\n> ⚠️ 모든 에러 메시지는 **원인 + 해결 방법** 구조. 사과·자조 톤 금지.\n> ⚠️ Loading 1초 미만은 표시하지 않는다(깜빡임 방지).\n\n## 데이터 포맷팅\n\n표시 형식은 시스템 전체에서 통일한다. 같은 데이터 종류는 한 화면 내에서 형식을 맞춘다.\n\n| 종류 | 형식 | 예 |\n|------|------|-----|\n| 숫자 | 천단위 콤마, 음수는 마이너스 부호 | `1,234,567` `-128` |\n| 큰 숫자 | 한국어 단위 표기 | `1,234만` `12.5억` |\n| 소수점 | 항목별 자릿수 통일 | 통화 0자리, 비율 1자리 |\n| 날짜 | `YYYY.MM.DD` | `2025.06.01` |\n| 날짜+시간 | `YYYY.MM.DD HH:mm` | `2025.06.01 14:30` |\n| 상대시간 | 24시간 이내만 사용 | `방금 전`, `3분 전`, `2시간 전` |\n| 통화 | 단위 뒤. 천단위 콤마 | `12,000원` |\n| 빈값 | 모든 컴포넌트 동일 | `—` (em dash) |\n| 진행률 | 정수 % | `85%` |\n| ID·코드 | 고정폭 폰트 | `--font-family-mono` |\n\n> ⚠️ 같은 컬럼·같은 데이터 종류는 형식 통일. `1,234`와 `1234` 혼용 금지.\n> ⚠️ 24시간 초과 시 상대시간 → 절대 날짜로 전환. (`3일 전` 금지, `2025.05.29` 사용)\n\n## Microcopy & Voice\n\n톤은 **해요체** 기반. 짧고 명확하게.\n\n### 버튼 라벨\n\n| 형식 | 사용처 |\n|------|--------|\n| 동사 (`저장`, `삭제`, `취소`) | 1차 액션. 기본 |\n| 동사+명사 (`항목 추가`, `필터 초기화`) | 대상이 모호할 때만 |\n\n> ⚠️ \"저장하기\" \"확인하기\" 같은 ~하기 형태 금지. 명사형으로 통일.\n\n### 다이얼로그·확인\n\n| 상황 | 형식 |\n|------|------|\n| 비가역 행동 | \"[대상]을 삭제할까요?\" + 액션 동사(\"삭제\" / \"취소\") |\n| 저장 성공 | 명시적 확인 다이얼로그 없이 toast 피드백 |\n| 변경사항 손실 위험 | \"변경사항이 저장되지 않아요. 나갈까요?\" |\n\n### 에러 메시지\n\n원인 → 해결 방법 순서. 사용자 잘못으로 단정하지 않는다.\n\n> ✅ \"이메일 형식이 올바르지 않아요. 예: name@company.com\"\n\n> ❌ \"잘못된 이메일을 입력하셨습니다.\"\n\n> ✅ \"파일 크기는 10MB 이하만 업로드할 수 있어요.\"\n\n> ❌ \"파일이 너무 큽니다.\"\n\n### 전문 용어\n\n- B2B 표준 용어는 영어 그대로: 필터, 대시보드, 리포트, API, Webhook\n- 일상화된 용어는 한글: 저장, 검색, 설정, 삭제\n- 신규 용어 도입 시 한글 우선. 영어 병기는 첫 등장 시 1회만.\n"}, {"path": "accessibility.md", "label": "접근성", "group": "accessibility", "slug": "accessibility", "raw": "---\nfile: accessibility.md\nversion: 0.4.1\n---\n\n# 접근성\n\nWCAG 2.1 AA 준수. 컴포넌트 정의서 마지막 섹션 \"접근성 체크리스트\"는 아래 항목으로 구성한다.\n\n## 키보드\n\n- 모든 인터랙티브 요소는 Tab으로 도달 가능\n- focus 순서는 시각적 순서와 일치\n- 모달·드롭다운은 focus trap 적용. ESC로 닫기\n- 페이지 시작에 \"본문으로 건너뛰기\" skip link\n\n## 스크린리더\n\n- 단독 아이콘 버튼: `aria-label` 필수\n- 폼 필드: `<label>` 또는 `aria-labelledby`\n- 에러 메시지: `aria-describedby`로 필드와 연결, 즉각 알림은 `role=\"alert\"`\n- 동적 영역: `aria-live=\"polite\"` (변경) 또는 `assertive` (긴급)\n- 장식용 아이콘: `aria-hidden=\"true\"`\n\n## 시각\n\n- 텍스트-배경 대비 최소 **4.5:1** (큰 텍스트 18pt 이상은 3:1)\n- focus ring `--color-border-focus` 반드시 가시. `outline: none` 단독 사용 금지\n- 색상만으로 의미 전달 금지. 텍스트·아이콘·패턴 병행\n- 본문 텍스트 크기 최소 13px\n\n## 모션\n\n- `prefers-reduced-motion: reduce` 대응 필수 (`tokens/motion.md` 참조)\n- 깜빡임 초당 3회 이하 (광과민성 발작 예방)\n\n> ⚠️ 접근성은 사후 추가가 아니라 컴포넌트 정의 단계의 기본 요건이다.\n> ⚠️ 정의서의 \"접근성 체크리스트\" 섹션은 위 4영역(키보드·스크린리더·시각·모션)을 모두 커버해야 한다.\n"}, {"path": "architecture.md", "label": "컴포넌트 구조", "group": "architecture", "slug": "architecture", "raw": "---\nfile: architecture.md\nversion: 0.4.2\n---\n\n# 컴포넌트 아키텍처\n\n## Variant 모델\n\n모든 컴포넌트는 아래 차원의 조합으로 정의한다.\n\n```\n컴포넌트 = type × style × size × state × icon(optional)\n```\n\n### Do / Don't\n\n> ✅ DO — full name\n> `.btn--primary-fill .btn--md .btn--round`\n\n> ❌ DON'T — 약어 사용\n> `.btn--pr-fl .btn--m .btn--r`\n\n### 상태 완전성 — 모든 인터랙티브 컴포넌트에 필수\n\n```\ndefault  ·  hover  ·  pressed  ·  disabled\n```\n\n추가: `focus`(키보드) · `loading`(비동기)\n\n## 컴포넌트 계층\n\n시스템 기반(토큰·공간·색상·타이포·elevation·모션·아이콘)이 모두 정의된 후 컴포넌트를 분류한다.\n\n```\nAtom  →  Molecule  →  Organism  →  Pattern\n```\n\n| 레이어 | 기준 | 예시 |\n|--------|------|------|\n| **Atom** | 분해 불가, 의존성 없음 | Button · Input · Badge · Toggle · Icon |\n| **Molecule** | Atom 2개+ 결합, 단일 기능 | FormField · SearchBar · Dropdown |\n| **Organism** | 자체 레이아웃 보유 | Table · SidebarNav · Card · TopNav |\n| **Pattern** | 페이지 수준 구조 | Dashboard · ListPage · DetailPage |\n\n> ⚠️ 하위 레이어가 상위를 import 금지. Molecule은 Atom만 포함.\n"}]</script>

            item.setAttribute('data-token-value', e.key);
            var val = document.createElement('span');
            val.className = 'font-size-val';

            sample.className = 'font-size-sample';
            sample.style.fontSize = e.px + 'px';
            sample.textContent = '디자인 시스템 Aa 123';
            item.appendChild(val);
            item.appendChild(sample);
            strip.appendChild(item);
          });
          el.replaceWith(strip);

        }

        // ─── 타이포 props (font-weight·line-height·letter-spacing) ───
        if (type === 'typography-props') {

            {

                { key: '--font-weight-medium',   display: '500', fw: '500' },

              ],
              buildSample: function(item) {
                var s = document.createElement('span');

                { key: '--letter-spacing-wide',   display: '0.05em',  ls: '0.05em' }
              ],
              buildSample: function(item) {
                var s = document.createElement('span');
                s.className = 'typo-props-sample';
                s.textContent = '가나다 Abc 123';
