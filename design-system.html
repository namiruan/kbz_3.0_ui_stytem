<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>김반장 Design System</title>
<style>
  :root {
    --space-2: 2px; --space-4: 4px; --space-8: 8px; --space-12: 12px;
    --space-16: 16px; --space-24: 24px; --space-32: 32px; --space-48: 48px;
    --height-32: 32px; --height-36: 36px;
    --font-size-11: 11px; --font-size-13: 13px; --font-size-15: 15px;
    --font-size-17: 17px; --font-size-20: 20px; --font-size-24: 24px;
    --font-weight-regular: 400; --font-weight-medium: 500;
    --font-weight-semibold: 600; --font-weight-bold: 700;

    --color-brand-50: #e6f1fb; --color-brand-100: #b5d4f4; --color-brand-500: #166dee;
    --color-brand-600: #115ac6; --color-brand-700: #0d4aa3;
    --color-gray-0: #ffffff; --color-gray-50: #f4f5f6; --color-gray-100: #e6e8ea;
    --color-gray-200: #d1d5d9; --color-gray-300: #b1b8be; --color-gray-400: #8a949e;
    --color-gray-500: #6d7882; --color-gray-600: #464c53; --color-gray-700: #2e3338;
    --color-gray-800: #1e2124; --color-gray-900: #131416;
    --color-warning-50: #fffbeb; --color-warning-500: #d97706;

    --color-surface-base: var(--color-gray-0);
    --color-surface-sunken: var(--color-gray-50);
    --color-text-primary: var(--color-gray-900);
    --color-text-secondary: var(--color-gray-600);
    --color-text-tertiary: var(--color-gray-400);
    --color-text-brand: var(--color-brand-600);
    --color-border-default: var(--color-gray-100);
    --color-border-emphasis: var(--color-gray-300);

    --font-family-base: 'Pretendard', -apple-system, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    --font-family-mono: 'JetBrains Mono', 'Fira Code', 'SF Mono', Consolas, monospace;

    --font-size-caption: var(--font-size-11);
    --font-size-secondary: var(--font-size-13);
    --font-size-body: var(--font-size-15);
    --font-size-subtitle: var(--font-size-17);
    --font-size-title-md: var(--font-size-24);

    --radius-sm: 4px; --radius-md: 6px; --radius-lg: 8px; --radius-pill: 1000px;

    --shadow-md: 0 2px 8px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
    --shadow-lg: 0 4px 16px rgba(0,0,0,.10), 0 2px 4px rgba(0,0,0,.06);

    --layout-sidebar-width: 280px;
    --layout-toc-width: 220px;
    --layout-content-max: 740px;
    --layout-topbar-height: 56px;

    --duration-fast: 100ms;
    --duration-base: 150ms;
  }

  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css');

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 16px; scroll-behavior: smooth; }
  body {
    font-family: var(--font-family-base);
    font-size: var(--font-size-body);
    line-height: 1.6;
    color: var(--color-text-primary);
    background: var(--color-surface-base);
    -webkit-font-smoothing: antialiased;
  }

  .topbar {
    position: sticky; top: 0; z-index: 50;
    height: var(--layout-topbar-height);
    background: rgba(255,255,255,.85);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--color-border-default);
    display: flex; align-items: center;
    padding: 0 var(--space-24);
    gap: var(--space-16);
  }
  .brand { display: flex; align-items: center; gap: var(--space-8); cursor: pointer; text-decoration: none; }
  .brand-text {
    font-weight: var(--font-weight-semibold);
    font-size: var(--font-size-subtitle);
    letter-spacing: -0.01em;
    color: var(--color-text-primary);
  }
  .brand-mark {
    width: 28px; height: 28px;
    border-radius: var(--radius-md);
    background: var(--color-brand-600);
    display: flex; align-items: center; justify-content: center;
    color: var(--color-gray-0);
    font-family: var(--font-family-mono);
    font-size: var(--font-size-secondary);
    font-weight: var(--font-weight-bold);
  }
  .version-pill {
    font-family: var(--font-family-mono);
    font-size: var(--font-size-caption);
    color: var(--color-text-secondary);
    background: var(--color-surface-sunken);
    padding: 4px 10px;
    border-radius: var(--radius-pill);
    border: 1px solid var(--color-border-default);
  }
  .topbar-actions { margin-left: auto; display: flex; gap: var(--space-8); }

  .btn {
    height: var(--height-32);
    padding: 0 var(--space-12);
    border-radius: var(--radius-md);
    font-family: var(--font-family-base);
    font-size: var(--font-size-secondary);
    font-weight: var(--font-weight-medium);
    border: 1px solid var(--color-border-default);
    background: var(--color-surface-base);
    color: var(--color-text-primary);
    cursor: pointer;
    display: inline-flex; align-items: center; gap: 6px;
    transition: all var(--duration-fast) ease;
    white-space: nowrap;
    text-decoration: none;
  }
  .btn:hover { background: var(--color-surface-sunken); border-color: var(--color-border-emphasis); }
  .btn:active { background: var(--color-gray-100); }
  .btn:focus-visible { outline: 2px solid var(--color-brand-500); outline-offset: 2px; }
  .btn--primary {
    background: var(--color-brand-600);
    color: var(--color-gray-0);
    border-color: var(--color-brand-600);
  }
  .btn--primary:hover { background: var(--color-brand-700); border-color: var(--color-brand-700); }
  .btn--xs {
    height: 24px;
    padding: 0 8px;
    font-size: var(--font-size-caption);
  }

  .layout {
    display: grid;
    grid-template-columns: var(--layout-sidebar-width) 1fr var(--layout-toc-width);
    max-width: 1440px;
    margin: 0 auto;
  }

  .sidebar {
    border-right: 1px solid var(--color-border-default);
    padding: var(--space-24) var(--space-16);
    position: sticky;
    top: var(--layout-topbar-height);
    height: calc(100vh - var(--layout-topbar-height));
    overflow-y: auto;
  }
  .sidebar-group { margin-bottom: var(--space-24); }
  .sidebar-label {
    font-size: var(--font-size-caption);
    font-weight: var(--font-weight-semibold);
    color: var(--color-text-tertiary);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    padding: 0 var(--space-12) var(--space-8);
  }
  .sidebar-nav { list-style: none; }
  .sidebar-nav a {
    display: flex; align-items: center; gap: 8px;
    padding: 7px var(--space-12);
    color: var(--color-text-secondary);
    text-decoration: none;
    font-size: var(--font-size-secondary);
    border-radius: var(--radius-md);
    transition: all var(--duration-fast) ease;
    line-height: 1.4;
  }
  .sidebar-nav a:hover { background: var(--color-surface-sunken); color: var(--color-text-primary); }
  .sidebar-nav a.active {
    background: var(--color-brand-50);
    color: var(--color-brand-700);
    font-weight: var(--font-weight-medium);
  }
  .sidebar-nav .file-path {
    font-family: var(--font-family-mono);
    font-size: 10px;
    color: var(--color-text-tertiary);
    margin-left: auto;
    flex-shrink: 0;
  }
  .sidebar-nav a.active .file-path { color: var(--color-brand-600); }

  .content {
    padding: var(--space-32) var(--space-48);
    min-width: 0;
    overflow-x: hidden;
  }
  .content-inner {
    max-width: var(--layout-content-max);
    margin: 0 auto;
    animation: fadeIn 200ms ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .file-meta {
    display: flex; align-items: center; gap: var(--space-12);
    padding: 10px 14px;
    background: var(--color-surface-sunken);
    border: 1px solid var(--color-border-default);
    border-radius: var(--radius-md);
    margin-bottom: var(--space-24);
    font-family: var(--font-family-mono);
    font-size: var(--font-size-caption);
    color: var(--color-text-secondary);
    flex-wrap: wrap;
  }
  .file-meta-path {
    color: var(--color-text-primary);
    font-weight: var(--font-weight-medium);
    font-size: var(--font-size-secondary);
  }
  .file-meta-depends {
    display: flex; align-items: center; gap: 6px;
    font-size: var(--font-size-caption);
    color: var(--color-text-tertiary);
  }
  .file-meta-depends-label { color: var(--color-text-tertiary); margin-right: 2px; }
  .file-meta-link {
    text-decoration: none;
    border-bottom: 0 !important;
  }
  .file-meta-link > code {
    font-size: 10px;
    padding: 2px 6px;
    color: var(--color-text-secondary);
    cursor: pointer;
    transition: all var(--duration-fast) ease;
  }
  .file-meta-link:hover > code {
    color: var(--color-brand-700);
    background: var(--color-brand-50);
    border-color: var(--color-brand-500);
  }
  .file-meta-actions { margin-left: auto; }

  /* 본문에서 자동 변환된 .md 파일 링크 */
  .md a.md-file-link {
    border-bottom: 0;
    text-decoration: none;
  }
  .md a.md-file-link > code {
    color: var(--color-text-brand);
    border-color: var(--color-brand-100);
    cursor: pointer;
    transition: all var(--duration-fast) ease;
    position: relative;
    padding-right: 18px;
  }
  .md a.md-file-link > code::after {
    content: '↗';
    position: absolute;
    right: 5px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 0.85em;
    opacity: 0.6;
  }
  .md a.md-file-link:hover > code {
    background: var(--color-brand-50);
    border-color: var(--color-brand-500);
    color: var(--color-brand-700);
  }
  .md a.md-file-link:hover > code::after { opacity: 1; }

  .md h1 {
    font-size: var(--font-size-title-md);
    font-weight: var(--font-weight-bold);
    letter-spacing: -0.015em;
    line-height: 1.2;
    margin-bottom: var(--space-16);
  }
  .md h2 {
    font-size: var(--font-size-subtitle);
    font-weight: var(--font-weight-semibold);
    letter-spacing: -0.01em;
    margin-top: var(--space-32);
    margin-bottom: var(--space-12);
    scroll-margin-top: calc(var(--layout-topbar-height) + 16px);
  }
  .md h3 {
    font-size: var(--font-size-body);
    font-weight: var(--font-weight-semibold);
    margin-top: var(--space-24);
    margin-bottom: var(--space-8);
    scroll-margin-top: calc(var(--layout-topbar-height) + 16px);
  }
  .md p { margin-bottom: var(--space-12); }
  .md hr { border: 0; height: 1px; background: var(--color-border-default); margin: var(--space-32) 0; }
  .md ul, .md ol { padding-left: var(--space-24); margin-bottom: var(--space-12); }
  .md li { margin-bottom: 4px; }
  .md li::marker { color: var(--color-text-tertiary); }
  .md a {
    color: var(--color-text-brand);
    text-decoration: none;
    border-bottom: 1px solid var(--color-brand-100);
  }
  .md a:hover { border-bottom-color: var(--color-brand-500); }
  .md strong { font-weight: var(--font-weight-semibold); }
  .md em { font-style: normal; font-weight: var(--font-weight-medium); color: var(--color-text-brand); }

  .md code {
    font-family: var(--font-family-mono);
    font-size: 0.92em;
    background: var(--color-surface-sunken);
    color: var(--color-gray-800);
    padding: 2px 6px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--color-border-default);
  }
  .md pre {
    font-family: var(--font-family-mono);
    background: var(--color-gray-900);
    color: var(--color-gray-100);
    padding: var(--space-16);
    border-radius: var(--radius-lg);
    overflow-x: auto;
    margin-bottom: var(--space-12);
    font-size: var(--font-size-secondary);
    line-height: 1.6;
  }
  .md pre code { background: transparent; border: 0; color: inherit; padding: 0; font-size: inherit; }
  .md table {
    border-collapse: collapse;
    width: 100%;
    margin-bottom: var(--space-12);
    font-size: var(--font-size-secondary);
    border: 1px solid var(--color-border-default);
    border-radius: var(--radius-lg);
    overflow: hidden;
  }
  .md thead { background: var(--color-surface-sunken); }
  .md th, .md td { padding: 10px 14px; text-align: left; border-bottom: 1px solid var(--color-border-default); }
  .md tr:last-child td { border-bottom: 0; }
  .md th {
    font-weight: var(--font-weight-semibold);
    font-size: var(--font-size-secondary);
    color: var(--color-text-secondary);
  }
  .md td code { font-size: 0.85em; }

  .md blockquote {
    margin: var(--space-12) 0;
    padding: var(--space-12) var(--space-16);
    background: var(--color-warning-50);
    border-left: 3px solid var(--color-warning-500);
    border-radius: 0 var(--radius-md) var(--radius-md) 0;
    color: var(--color-gray-800);
  }
  .md blockquote p { margin-bottom: 0; }
  .md blockquote p + p { margin-top: 4px; }
  .md blockquote.tip {
    background: var(--color-brand-50);
    border-left-color: var(--color-brand-500);
  }

  /* ═══ 3-Actor Flow Diagram ═══ */
  .md .actor-flow {
    display: grid;
    grid-template-columns: 1fr auto 1fr auto 1fr;
    gap: 0;
    align-items: stretch;
    margin: var(--space-24) 0 var(--space-32);
  }
  .md .actor-card {
    padding: var(--space-16);
    border-radius: var(--radius-lg);
    border: 1px solid var(--color-border-default);
    background: var(--color-surface-base);
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-width: 0;
    transition: all var(--duration-fast) ease;
    position: relative;
  }
  /* 클릭 가능한 카드 (a 태그로 감싸진 카드) */
  .md a.actor-card-link {
    text-decoration: none !important;
    border-bottom: 0 !important;
    display: block;
  }
  .md a.actor-card-link .actor-card {
    cursor: pointer;
  }
  .md a.actor-card-link:hover .actor-card {
    border-color: var(--color-brand-500);
    box-shadow: var(--shadow-md);
    transform: translateY(-2px);
  }
  .md a.actor-card-link:hover .actor-card-corner {
    color: var(--color-brand-600);
  }
  /* 카드 우상단 코너 (→ 또는 — 표시) */
  .md .actor-card-corner {
    position: absolute;
    top: 12px;
    right: 14px;
    font-size: 14px;
    color: var(--color-text-tertiary);
    transition: color var(--duration-fast) ease;
    font-family: var(--font-family-mono);
    line-height: 1;
  }
  /* 비활성 카드 (개발자) */
  .md .actor-card--disabled {
    opacity: 0.55;
    background: var(--color-surface-sunken);
  }
  .md .actor-card--disabled .actor-emoji {
    filter: grayscale(1);
  }
  .md .actor-card-note {
    font-size: 10px;
    color: var(--color-text-tertiary);
    font-style: italic;
    margin-top: 6px;
    padding-top: 6px;
    border-top: 1px dashed var(--color-border-default);
    line-height: 1.4;
  }
  /* 비활성 카드로 향하는 화살표 dim */
  .md .flow-arrow--dim {
    opacity: 0.4;
  }
  .md .actor-emoji {
    font-size: 22px;
    line-height: 1;
    margin-bottom: 4px;
  }
  .md .actor-role {
    font-size: var(--font-size-subtitle);
    font-weight: var(--font-weight-semibold);
    color: var(--color-text-primary);
    letter-spacing: -0.01em;
    line-height: 1.3;
  }
  .md .actor-label {
    font-family: var(--font-family-mono);
    font-size: 9px;
    color: var(--color-text-tertiary);
    letter-spacing: 0.06em;
    margin-bottom: 6px;
  }
  .md .actor-action {
    font-size: var(--font-size-secondary);
    color: var(--color-text-secondary);
    line-height: 1.4;
  }
  .md .actor-output {
    margin-top: auto;
    padding-top: 10px;
    border-top: 1px dashed var(--color-border-default);
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .md .output-item {
    font-family: var(--font-family-mono);
    font-size: 10px;
    color: var(--color-text-secondary);
    background: var(--color-surface-sunken);
    padding: 3px 8px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--color-border-default);
    width: fit-content;
  }
  .md .flow-arrow {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0 var(--space-12);
    gap: 6px;
  }
  .md .arrow-label-top {
    font-size: 10px;
    color: var(--color-text-tertiary);
    text-align: center;
    line-height: 1.3;
    font-weight: var(--font-weight-medium);
  }
  .md .arrow-line {
    width: 32px;
    height: 1px;
    background: var(--color-border-emphasis);
    position: relative;
  }
  .md .arrow-line::after {
    content: '';
    position: absolute;
    right: -1px;
    top: -3px;
    border: 4px solid transparent;
    border-left-color: var(--color-border-emphasis);
    border-right-width: 0;
  }
  /* 좁은 화면: 세로로 떨어지게 */
  @media (max-width: 700px) {
    .md .actor-flow {
      grid-template-columns: 1fr;
    }
    .md .flow-arrow {
      padding: var(--space-8) 0;
    }
    .md .arrow-line {
      width: 1px;
      height: 20px;
    }
    .md .arrow-line::after {
      right: -3px;
      top: auto;
      bottom: -1px;
      border: 4px solid transparent;
      border-top-color: var(--color-border-emphasis);
      border-bottom-width: 0;
    }
  }

  .pager {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: var(--space-12);
    margin-top: var(--space-48);
    padding-top: var(--space-24);
    border-top: 1px solid var(--color-border-default);
  }
  .pager-link {
    display: flex; flex-direction: column; gap: 4px;
    padding: var(--space-16);
    border: 1px solid var(--color-border-default);
    border-radius: var(--radius-lg);
    text-decoration: none;
    transition: all var(--duration-fast) ease;
  }
  .pager-link:hover {
    border-color: var(--color-brand-500);
    background: var(--color-brand-50);
  }
  .pager-link[data-disabled="true"] { opacity: 0.4; pointer-events: none; }
  .pager-direction {
    font-size: var(--font-size-caption);
    color: var(--color-text-tertiary);
    display: flex; align-items: center; gap: 4px;
  }
  .pager-link.next .pager-direction { justify-content: flex-end; }
  .pager-link.next { text-align: right; }
  .pager-label {
    font-size: var(--font-size-body);
    font-weight: var(--font-weight-semibold);
    color: var(--color-text-primary);
  }
  .pager-path {
    font-family: var(--font-family-mono);
    font-size: var(--font-size-caption);
    color: var(--color-text-tertiary);
  }

  .toc {
    padding: var(--space-24) var(--space-16);
    position: sticky;
    top: var(--layout-topbar-height);
    height: calc(100vh - var(--layout-topbar-height));
    overflow-y: auto;
    border-left: 1px solid var(--color-border-default);
  }
  .toc-label {
    font-size: var(--font-size-caption);
    font-weight: var(--font-weight-semibold);
    color: var(--color-text-tertiary);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    padding: 0 var(--space-8) var(--space-8);
  }
  .toc ul { list-style: none; }
  .toc a {
    display: block;
    padding: 4px var(--space-8);
    color: var(--color-text-tertiary);
    text-decoration: none;
    font-size: var(--font-size-caption);
    line-height: 1.5;
    border-left: 2px solid transparent;
    margin-left: -2px;
    transition: all var(--duration-fast) ease;
  }
  .toc a:hover { color: var(--color-text-primary); }
  .toc a.active {
    color: var(--color-text-brand);
    border-left-color: var(--color-brand-500);
    font-weight: var(--font-weight-medium);
  }
  .toc a.h3-link { padding-left: var(--space-16); font-size: 10px; }
  .toc-empty {
    padding: var(--space-8);
    color: var(--color-text-tertiary);
    font-size: var(--font-size-caption);
    font-style: italic;
  }

  .toast {
    position: fixed;
    bottom: var(--space-32);
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--color-gray-900);
    color: var(--color-gray-0);
    padding: 10px 16px;
    border-radius: var(--radius-pill);
    font-size: var(--font-size-secondary);
    box-shadow: var(--shadow-lg);
    opacity: 0;
    pointer-events: none;
    transition: all var(--duration-base) ease;
    z-index: 100;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .kbd-hint {
    position: fixed;
    bottom: var(--space-16);
    right: var(--space-16);
    font-size: var(--font-size-caption);
    color: var(--color-text-tertiary);
    background: var(--color-surface-base);

<script id="files-source" type="application/json">[{"path": "README.md", "label": "Overview", "group": "overview", "slug": "README", "raw": "---\nfile: README.md\nversion: 0.5.0\nupdated: 2026-04-27\n---\n\n# 김반장 Design System\n\n김반장 3.0 프로토타입의 디자인 기준. 기획자가 LLM으로 프로토타입을 뽑고, 개발자가 결과를 실제 프레임워크로 변환하는 협업의 single source of truth.\n\n## 3-Actor 협업 모델\n\n각 actor 카드를 클릭하면 해당 워크플로우 페이지로 이동한다. 각 워크플로우 파일은 LLM에 등록해 해당 역할 모드로 작동시키는 지시문이다.\n\n<div class=\"actor-flow\">\n\n  <a class=\"actor-card-link\" href=\"#workflow--designer\">\n    <div class=\"actor-card\">\n      <div class=\"actor-card-corner\">→<\/div>\n      <div class=\"actor-emoji\">🎨<\/div>\n      <div class=\"actor-role\">Designer<\/div>\n      <div class=\"actor-label\">OWNER<\/div>\n      <div class=\"actor-action\">시스템·HTML/CSS<br>직접 관리<\/div>\n      <div class=\"actor-output\">\n        <div class=\"output-item\">tokens.css<\/div>\n        <div class=\"output-item\">component.html / css<\/div>\n      <\/div>\n    <\/div>\n  <\/a>\n\n  <div class=\"flow-arrow\">\n    <div class=\"arrow-label-top\">시스템<br>등록<\/div>\n    <div class=\"arrow-line\"><\/div>\n  <\/div>\n\n  <a class=\"actor-card-link\" href=\"#workflow--planner\">\n    <div class=\"actor-card\">\n      <div class=\"actor-card-corner\">→<\/div>\n      <div class=\"actor-emoji\">🧭<\/div>\n      <div class=\"actor-role\">Planner<\/div>\n      <div class=\"actor-label\">CONSUMER<\/div>\n      <div class=\"actor-action\">LLM에 등록 →<br>프로토타입 도출<\/div>\n      <div class=\"actor-output\">\n        <div class=\"output-item\">Prototype HTML/CSS<\/div>\n      <\/div>\n    <\/div>\n  <\/a>\n\n  <div class=\"flow-arrow flow-arrow--dim\">\n    <div class=\"arrow-label-top\">프로토타입<br>인계<\/div>\n    <div class=\"arrow-line\"><\/div>\n  <\/div>\n\n  <div class=\"actor-card actor-card--disabled\">\n    <div class=\"actor-card-corner\">—<\/div>\n    <div class=\"actor-emoji\">💻<\/div>\n    <div class=\"actor-role\">Developer<\/div>\n    <div class=\"actor-label\">TRANSLATOR<\/div>\n    <div class=\"actor-action\">실제 프레임워크<br>변환<\/div>\n    <div class=\"actor-output\">\n      <div class=\"output-item\">React · Vue<\/div>\n      <div class=\"output-item\">Flutter · SwiftUI<\/div>\n    <\/div>\n    <div class=\"actor-card-note\">개발팀 자체 진행 영역 — 이 시스템에는 포함 안 됨<\/div>\n  <\/div>\n\n<\/div>\n\n## 시스템 버전 변경 시\n\n| Actor | MAJOR | MINOR | PATCH |\n|-------|-------|-------|-------|\n| 🎨 디자이너 | 즉시 (본인이 변경) | 즉시 | 즉시 |\n| 🧭 기획자 | 통보 받으면 LLM 재등록 | 다음 작업 시점에 갱신 | 갱신 불필요 |\n\n> 💡 시스템 버전은 우상단 pill에 항상 표시. 프로토타입 인계 시 메타에도 명시.\n\n## 파일 구조\n\n```\ndesign-system/\n├── README.md            ← 지금 이 파일\n├── workflow/\n│   ├── designer.md      ← 🎨 디자이너 모드 LLM 지시문\n│   └── planner.md       ← 🧭 기획자 모드 LLM 지시문\n├── governance.md        ← 시스템 관리·버전·deprecation\n├── tokens/\n│   ├── _index.md        ← 토큰 아키텍처 (3-tier)\n│   ├── space.md  · radius.md  · color.md\n│   ├── typography.md  · elevation.md\n│   └── motion.md  · icon.md\n├── adaptation.md        ← 반응형 + 다크모드\n├── product.md           ← B2B 제약 + 상태 패턴 + 데이터 포맷팅 + Microcopy\n├── accessibility.md     ← 접근성 (WCAG 2.1 AA)\n└── architecture.md      ← Variant 모델 + 컴포넌트 계층\n```\n\n## 토큰 실제 값\n실제 CSS 토큰 값은 `tokens.css` 파일을 참조한다. 이 문서는 **사용 원칙**을 정의하고, `tokens.css`는 **실제 값**을 정의한다.\n"}, {"path": "workflow/designer.md", "label": "🎨 Designer", "group": "workflow", "slug": "workflow--designer", "raw": "---\nfile: workflow/designer.md\nversion: 0.2.0\n---\n\n# 🎨 Designer Mode\n\n> 이 문서는 LLM에 등록해 \"디자이너 모드\"로 작동시키기 위한 지시문이다. 디자이너 본인이 LLM과 대화하며 시스템을 관리할 때 컨텍스트로 사용한다.\n\n당신은 김반장 디자인 시스템을 관리하고 컴포넌트 HTML/CSS를 작성하는 디자이너 역할입니다. 사용자의 요청을 이 역할에 맞춰 처리하세요.\n\n## 당신의 역할\n\n당신은 김반장 디자인 시스템을 관리하고 컴포넌트 HTML/CSS를 작성하는 디자이너입니다. 시스템 토큰·원칙 정의, 컴포넌트 작성, 일관성 검증, 버전 관리를 담당합니다.\n\n---\n\n## 사용자 요청 처리 흐름\n\n### \"새 컴포넌트 [X] 만들어줘\"\n\n1. 먼저 다음 파일을 컨텍스트에서 확인: `tokens/_index.md` · 관련 `tokens/*.md` · `architecture.md` · `accessibility.md`\n2. 다음 순서로 작업:\n   - **Variant 차원 정의** — type × style × size × state × shape (`architecture.md`)\n   - **상태 명세** — default · hover · pressed · disabled (필요 시 focus · loading)\n   - **BEM 클래스명** — full name 사용, 약어 금지 (예: `.btn--primary-fill`)\n   - **HTML 출력** — semantic 마크업 + 접근성 속성\n   - **CSS 출력** — Semantic 토큰만 사용\n3. 작성 후 자가 점검 (아래 체크리스트)\n\n### \"토큰 [X] 추가해줘\"\n\n1. `tokens/_index.md`의 3-tier 구조 확인 → Primitive/Semantic/Component 어디에 추가할지 결정\n2. 기존 토큰과 충돌 없는지 확인\n3. `tokens.css`에 추가할 위치와 코드 제안\n4. 영향받는 컴포넌트 분석\n5. `governance.md`의 버전 규칙에 따라 버전 업 제안:\n   - 새 토큰 추가만 → MINOR\n   - 기존 토큰명·값 변경 → MAJOR\n   - 주석·설명만 변경 → PATCH\n\n### \"기존 컴포넌트 [X] 수정해줘\"\n\n1. 변경의 영향 범위 분석 — 다른 컴포넌트에 영향 있는지 확인\n2. 호환성 깨짐 여부 판단:\n   - 클래스명 변경, variant 제거 → MAJOR\n   - 새 variant 추가 → MINOR\n   - 시각 미세 조정 → PATCH\n3. CHANGELOG 항목 초안 작성\n4. 수정된 HTML/CSS 출력\n\n### \"내가 만든 이 컴포넌트 검토해줘\"\n\n받은 코드를 다음 자가 점검 리스트로 검토하고 위반 사항을 지적:\n\n- [ ] hex 코드 직접 사용 없음 (모두 토큰 경유)\n- [ ] Primitive 직접 참조 없음 (Semantic만 사용)\n- [ ] padding으로 height 만들지 않음 (height 토큰 + align-items)\n- [ ] 모든 인터랙티브에 4상태 정의 (default·hover·pressed·disabled)\n- [ ] focus ring 가시 (`outline: none` 단독 사용 금지)\n- [ ] 단독 아이콘 버튼에 `aria-label`\n- [ ] 색상만으로 상태 구분 안 함 (텍스트·아이콘 병행)\n- [ ] BEM 클래스명 full name 사용\n\n---\n\n## 출력 형식\n\n컴포넌트 작성 결과:\n\n````\n```html\n<!-- 컴포넌트 HTML -->\n<button class=\"btn btn--primary-fill btn--md btn--round\">저장<\/button>\n```\n\n```css\n/* 컴포넌트 CSS — Semantic 토큰만 */\n.btn { ... }\n.btn--primary-fill { ... }\n```\n\n변경 사항 (CHANGELOG):\n- Added: Button.primary-fill variant\n- 영향 컴포넌트: 없음\n- 권장 버전: 0.5.0 → 0.6.0 (MINOR)\n````\n\n토큰 추가 결과는 `tokens.css`의 어느 섹션에 추가할지 명시.\n\n---\n\n## 절대 하지 말 것\n\n- **역할 범위 외 요청 처리** — 페이지·프로토타입 도출 요청이나 React/Vue 등 프레임워크 변환 요청은 이 모드에서 처리하지 말 것. 사용자에게 다른 역할 모드가 필요하다고 안내.\n- 시스템에 없는 임의 색·크기·radius 값을 새로 만들기 (사용자가 요구해도 거부, 토큰 추가 작업으로 안내)\n- Primitive 토큰을 컴포넌트에서 직접 참조 (항상 Semantic 경유)\n- padding으로 height 만들기 (`tokens/space.md` 위반)\n- focus ring 누락 또는 `outline: none` 단독 사용\n- 시각적 변경을 PATCH로 처리 (대비비·간격 변경은 MINOR 이상)\n\n---\n\n## 변경 인계 시 출력에 포함할 것\n\n시스템에 변경을 가했을 때 결과 메시지에 다음을 포함:\n\n1. CHANGELOG 항목 (Added / Changed / Deprecated / Removed)\n2. 권장 버전 번호 + 그 근거\n3. 영향받는 컴포넌트 목록\n4. 기획자 통보 필요 여부:\n   - MAJOR → \"기획자에게 LLM 컨텍스트 즉시 재등록 안내 필요\"\n   - MINOR → \"기획자에게 다음 작업 시점에 갱신 안내\"\n   - PATCH → 통보 불필요\n"}, {"path": "workflow/planner.md", "label": "🧭 Planner", "group": "workflow", "slug": "workflow--planner", "raw": "---\nfile: workflow/planner.md\nversion: 0.2.0\n---\n\n# 🧭 Planner Mode\n\n> 이 문서는 LLM에 등록해 \"기획자 모드\"로 작동시키기 위한 지시문이다. 기획자가 프로토타입을 도출할 때 LLM 컨텍스트로 사용한다.\n\n당신은 김반장 디자인 시스템을 활용해 사용자가 원하는 프로토타입을 만드는 기획자 역할입니다. 시스템 토큰만 사용하여 단일 HTML 파일로 프로토타입을 출력하세요.\n\n## 당신의 역할\n\n당신은 김반장 디자인 시스템을 활용해 사용자가 원하는 프로토타입을 만드는 기획자입니다. 사용자 요구사항을 분석해 컴포넌트·상태·구조를 식별하고, 시스템 토큰만 사용해 단일 HTML 프로토타입을 작성하며, 개발자 인계용 메타 정보를 함께 출력합니다.\n\n---\n\n## 사용자 요청 처리 흐름\n\n### \"이런 컴포넌트/페이지 만들어줘\"\n\n1. **요구사항 분석**\n   - 컴포넌트 계층 식별 (Atom·Molecule·Organism·Pattern — `architecture.md`)\n   - 필요한 상태 식별 (default·empty·loading·error — `product.md`)\n   - 데이터 종류 파악 (날짜·숫자·통화 — `product.md` 데이터 포맷팅)\n\n2. **시스템 매칭**\n   - 색·간격·타이포·radius·shadow → 모두 시스템 토큰으로 매핑\n   - 기존 컴포넌트 재사용 가능한지 확인\n   - 시스템에 없는 디자인이 필요하면 → 작업 일시 중단, 사용자에게 디자이너 검토 안내\n\n3. **단일 HTML 출력**\n   - `<style>` 안에 시스템 토큰(CSS variable) 정의 + 컴포넌트 스타일\n   - 외부 CSS·JS 의존성 없이 자체 완결\n   - 상태별 데모 모두 포함 (정적 HTML로 default/empty/loading/error 다 보여줌)\n   - 접근성 속성 포함\n\n4. **인계 메타 출력**\n   - 사용된 시스템 버전, 컴포넌트 목록, 처리한 상태, 예외 사항을 yaml로\n\n---\n\n## 출력 형식\n\n````\n```html\n<!-- design-system: v0.5.0 -->\n<!-- prototype: [한 줄 설명] -->\n<!DOCTYPE html>\n<html lang=\"ko\">\n<head>\n  <meta charset=\"UTF-8\">\n  <title>[프로토타입 이름]<\/title>\n  <style>\n    :root {\n      /* 사용된 토큰만 정의 (전체 토큰 X) */\n      --color-button-primary-fill: #115ac6;\n      --space-inset-md: 16px;\n      ...\n    }\n    /* 컴포넌트 스타일 */\n  <\/style>\n<\/head>\n<body>\n  <!-- 상태별 데모 -->\n  <section data-state=\"default\">...<\/section>\n  <section data-state=\"empty\">...<\/section>\n  <section data-state=\"loading\">...<\/section>\n  <section data-state=\"error\">...<\/section>\n<\/body>\n<\/html>\n```\n\n```yaml\n# 개발자 인계 메타\nprototype: [한 줄 설명]\ndesign-system-version: 0.5.0\ncomponents-used:\n  - [Atom/Molecule/Organism 분류 + 이름]\nstates-covered: [default, empty, loading, error]\nnotes: |\n  - [예외 사항 또는 시스템 외 요청 사항]\n```\n````\n\n---\n\n## 시스템 활용 가이드\n\n### 작업별 필요한 컨텍스트\n\n전체 시스템을 LLM에 등록하지 않고 작업별로 가벼운 컨텍스트로 작동할 때:\n\n| 작업 | 필요한 파일 |\n|------|-----------|\n| 색·타이포만 결정 | `tokens/color.md` · `tokens/typography.md` |\n| 폼 컴포넌트 | 위 + `tokens/space.md` · `accessibility.md` · `product.md` |\n| 인터랙티브 컴포넌트 | 위 + `tokens/motion.md` · `architecture.md` |\n| Table·List | 위 + `tokens/elevation.md` · `product.md` |\n\n### Microcopy 작성\n\n`product.md` Microcopy 섹션을 따른다:\n- 톤: 해요체\n- 버튼: 동사 명사형 (\"저장\", \"삭제\" — \"저장하기\" X)\n- 에러: 원인 + 해결 방법, 사과 톤 금지\n\n### 데이터 표시\n\n`product.md` 데이터 포맷팅을 따른다:\n- 숫자: 천단위 콤마 (`1,234`)\n- 날짜: `YYYY.MM.DD`\n- 빈값: em dash (`—`)\n\n---\n\n## 절대 하지 말 것\n\n- **역할 범위 외 요청 처리** — 시스템 토큰·원칙 변경이나 React/Vue 등 프레임워크 변환 요청은 이 모드에서 처리하지 말 것. 사용자에게 다른 역할 모드가 필요하다고 안내.\n- hex 코드, 임의 px 값을 컴포넌트 스타일에 직접 사용 (모두 CSS variable 토큰으로)\n- Primitive 토큰을 컴포넌트에서 직접 참조 (`var(--color-brand-600)` X → `var(--color-button-primary-fill)` ✅)\n- 상태 누락 — 특히 empty/loading/error 빠뜨리지 말 것\n- 접근성 속성 누락 (`aria-label`, focus ring, `role`)\n- 시스템에 없는 디자인을 임의로 추가 (사용자 요구해도 거부 → 디자이너 검토 안내)\n- 외부 CSS·JS 라이브러리 의존 (단일 HTML 자체 완결)\n- 시스템 버전 주석 누락\n"}, {"path": "governance.md", "label": "문서 규칙·버전", "group": "governance", "slug": "governance", "raw": "---\nfile: governance.md\nversion: 0.4.0\n---\n\n# 문서 규칙 & 버전 관리\n\n> **언제 참조하나:** 시스템 유지보수자, 기여자 전원\n\n## 정의서 헤더\n\n모든 컴포넌트 `.md` 파일의 최상단에 반드시 포함한다.\n\n```yaml\n---\ncomponent: Button\nversion:   0.1.0\nstatus:    draft | stable | deprecated\nfigma-node: 606-2968\nupdated:   2025-06-01\n---\n```\n\n| 필드 | 작성 기준 | 언제 업데이트 |\n|------|----------|-------------|\n| `version` | 정의서 변경 범위 | 내용이 바뀔 때마다 |\n| `status` | 팀 합의 여부 | 리뷰 통과 시 draft → stable |\n| `figma-node` | Figma 원본 컴포넌트 노드 ID | Figma 컴포넌트 구조가 바뀔 때 |\n\n## 섹션 순서\n\n> ⚠️ 순서 고정. 변경 금지.\n\n```\n## 용도  →  ## 규칙  →  ## 스펙  →  ## 코드  →  ## 접근성 체크리스트\n```\n\n## 버전 규칙 (Semantic Versioning · MAJOR.MINOR.PATCH)\n\n| 버전 | 자리 | 기준 | 해당하는 변경 |\n|------|------|------|-------------|\n| **MAJOR** | 첫째 | 기존 코드가 깨지는 변경 | 클래스명·토큰명 변경, variant 제거 |\n| **MINOR** | 둘째 | 기존 코드 유지 + 기능 추가 | 새 variant·상태·토큰 추가 |\n| **PATCH** | 셋째 | 스펙 변경 없는 문서 수정 | 오탈자·설명·예시 수정 |\n\n```\n# MAJOR — 기존 코드를 다시 수정해야 함\n0.2.0  →  1.0.0   .btn--primary 클래스명이 .btn--brand로 변경됨\n\n# MINOR — 기존 코드는 그대로, 새 기능만 추가됨\n0.1.0  →  0.2.0   ghost variant 추가\n\n# PATCH — 코드와 스펙 변경 없음\n0.1.0  →  0.1.1   설명 오탈자 수정\n```\n\n> 💡 **판단 기준:** \"이 변경으로 기존에 만들어진 코드를 다시 수정해야 하는가?\"\n> YES → MAJOR  /  새 기능 추가 → MINOR  /  문서만 수정 → PATCH\n\n변경 절차: `CHANGELOG.md [Unreleased]` 기록 → 헤더 업데이트 → 릴리즈 시 git tag.\n\n## Deprecation 정책\n\n`status: deprecated` 선언 후 최소 1 MAJOR 버전 동안 유지한다.\n\n| 단계 | 액션 |\n|------|------|\n| Deprecate | `status: deprecated` 변경, 헤더에 대체 컴포넌트 명시, CHANGELOG 기록 |\n| 유지 | 신규 사용 금지. 기존 사용처는 다음 MAJOR까지 마이그레이션 |\n| 제거 | 다음 MAJOR 릴리즈에서 제거. 정의서·코드 동시 삭제 |\n\n```yaml\n---\ncomponent: OldButton\nstatus:        deprecated\ndeprecated-since: 1.2.0\nreplaced-by:   Button\nremove-at:     2.0.0\n---\n```\n\n> ⚠️ Deprecate 즉시 제거 금지. 사용처가 마이그레이션할 시간을 보장한다.\n"}, {"path": "tokens/_index.md", "label": "아키텍처", "group": "tokens", "slug": "tokens--index", "raw": "---\nfile: tokens/_index.md\nversion: 0.4.0\n---\n\n# 토큰 아키텍처 (3-tier)\n\n> **언제 참조하나:** 컴포넌트 작성·스타일링하는 모든 사람. 다른 토큰 문서를 읽기 전 필수.\n\nPrimitive(원시값) → Semantic(용도 부여) → Component(컴포넌트 전용) 순으로 참조한다.\n\n| Tier | 위치 | 컴포넌트에서 직접 사용 |\n|------|------|----------------------|\n| Primitive | `tokens.css` 상단 | ❌ 금지 |\n| Semantic | `tokens.css` 중단 | ✅ 사용 |\n| Component | 각 `.md` 스펙 섹션 | ✅ 사용 |\n\n## Do / Don't\n\n```css\n/* ✅ DO — Semantic을 통해 참조 */\nbackground: var(--color-button-primary-fill);\n\n/* ❌ DON'T — Primitive 직접 사용 */\nbackground: var(--color-brand-600);\n\n/* ❌ DON'T — hex 직접 사용 */\nbackground: #115ac6;\n```\n\n> 💡 Primitive = Global = Base  /  Semantic = Alias = Decision\n> 업계마다 이름이 다르지만 같은 개념이다.\n\nComponent 토큰은 복잡한 컴포넌트(Modal, Table)의 고유값에만 사용한다.\nButton·Badge처럼 단순한 컴포넌트는 Semantic만으로 충분하다.\n\n## 관련 문서\n- `tokens/space.md` — 공간 토큰\n- `tokens/color.md` — 색상 토큰\n- `tokens/typography.md` — 타이포 토큰\n- `tokens/radius.md` · `tokens/elevation.md` · `tokens/motion.md` · `tokens/icon.md`\n"}, {"path": "tokens/space.md", "label": "공간", "group": "tokens", "slug": "tokens--space", "raw": "---\nfile: tokens/space.md\nversion: 0.4.0\ndepends-on: tokens/_index.md\n---\n\n# 공간 시스템\n\n> **언제 참조하나:** padding/margin/gap 결정 시 모든 사람\n\n공간을 어디에 쓰는지로 분류해 Semantic 토큰을 사용한다. 실제 토큰 스케일은 `tokens.css` 참조.\n\n| 토큰 | 의미 | 사용처 |\n|------|------|--------|\n| `inset` | 사방 동일 padding | 카드, 테이블 셀, 컨테이너 |\n| `inset-squish` | 좌우가 상하의 2배 | 버튼, pill, 태그 |\n| `stack` | 요소 아래 margin | 리스트 항목, 섹션 구분 |\n| `gap` | flexbox/grid 자식 간격. 부모에 적용 | 버튼 그룹, 카드 그리드, 폼 필드 |\n| `generic` | 위 4가지로 안 되는 예외 | 단방향 margin, 레이아웃 특수 케이스 |\n\n## Do / Don't\n\n```css\n/* ✅ DO — 용도에 맞는 토큰 사용 */\npadding: var(--space-inset-md);          /* 카드 내부 */\npadding: var(--space-inset-squish-md);   /* 버튼 */\nmargin-bottom: var(--space-stack-sm);    /* 리스트 간격 */\ngap: var(--space-gap-sm);               /* 버튼 그룹 */\n\n/* ❌ DON'T — 임의값 직접 사용 */\npadding: 16px;\nmargin-bottom: 8px;\n```\n\n> ⚠️ 높이는 padding으로 만들지 않는다. height 토큰 고정 + `align-items: center` 사용.\n\n```css\n/* ✅ DO */\n.btn { height: var(--height-36); display: flex; align-items: center; }\n\n/* ❌ DON'T */\n.btn { padding: 8px 16px; }\n```\n\n단방향 margin은 `generic` 토큰으로 값을 가져오고 방향은 CSS 속성으로 직접 지정한다.\n\n```css\n/* ✅ DO */\nmargin-inline-end: var(--space-generic-sm);\n```\n"}, {"path": "tokens/radius.md", "label": "Radius", "group": "tokens", "slug": "tokens--radius", "raw": "---\nfile: tokens/radius.md\nversion: 0.4.0\ndepends-on: tokens/_index.md\n---\n\n# Radius 시스템\n\n> **언제 참조하나:** border-radius 결정 시 모든 사람\n\nPrimitive는 px값을 이름으로 쓴다. Semantic은 컴포넌트에서 쓰이는 맥락으로 이름 붙인다. 실제 토큰 스케일은 `tokens.css` 참조.\n\n## 컴포넌트 shape와의 관계\n\nVariant 모델의 `shape` 차원이 radius 토큰에 직접 대응한다.\n\n```\nshape: round   →  --radius-pill   (1000px)\nshape: square  →  --radius-sm     (4px)\n```\n\n## Do / Don't\n\n```css\n/* ✅ DO */\nborder-radius: var(--radius-pill);\nborder-radius: var(--radius-sm);\n\n/* ❌ DON'T */\nborder-radius: 1000px;\nborder-radius: 4px;\n```\n\n> ⚠️ Figma에 없는 radius 값을 임의로 추가하지 않는다.\n> 새 값이 필요하면 Figma에 먼저 정의한 후 추출한다.\n"}, {"path": "tokens/color.md", "label": "색상", "group": "tokens", "slug": "tokens--color", "raw": "---\nfile: tokens/color.md\nversion: 0.4.0\ndepends-on: tokens/_index.md\n---\n\n# 색상 시스템\n\n> **언제 참조하나:** 모든 시각 결정. 컴포넌트 색·상태·대비 결정 시 필수.\n\nPrimitive는 밝기 스케일(50–900)로 구성된다. 숫자가 클수록 어둡다.\nSemantic은 용도를 이름에 담아 Primitive를 참조한다. 실제 토큰 스케일은 `tokens.css` 참조.\n\n## Do / Don't\n\n```css\n/* ✅ DO */\ncolor: var(--color-text-primary);\nborder: 1px solid var(--color-border-default);\n\n/* ❌ DON'T */\ncolor: var(--color-gray-900);    /* Primitive 직접 참조 */\ncolor: #131416;                  /* hex 직접 사용 */\n```\n\n## 인터랙션 상태 패턴 (모든 인터랙티브 컴포넌트 동일)\n\n```\ndefault  →  hover(밝게)  →  pressed(어둡게)  →  disabled\n                                               bg:   --color-gray-100\n                                               text: --color-gray-400\n```\n\n> ⚠️ 색상만으로 상태를 구분하지 않는다. 아이콘·텍스트를 반드시 병행한다.\n> 텍스트-배경 대비 최소 **4.5:1** (WCAG AA). 자세한 기준은 `accessibility.md` 참조.\n"}, {"path": "tokens/typography.md", "label": "타이포그래피", "group": "tokens", "slug": "tokens--typography", "raw": "---\nfile: tokens/typography.md\nversion: 0.4.0\ndepends-on: tokens/_index.md\n---\n\n# 타이포그래피\n\n> **언제 참조하나:** 텍스트 스타일 결정 시 모든 사람\n\n폰트 크기는 Primitive(px값) → Semantic(용도명) 순으로 참조한다.\n폰트 굵기는 descriptive 이름으로 직접 정의해 Semantic 계층이 없다. 실제 토큰 스케일은 `tokens.css` 참조.\n\n## Do / Don't\n\n```css\n/* ✅ DO */\nfont-size: var(--font-size-body);\nfont-weight: var(--font-weight-medium);\n\n/* ❌ DON'T */\nfont-size: var(--font-size-15);    /* Primitive 직접 참조 */\nfont-size: 15px;                   /* 임의값 직접 사용 */\nfont-weight: 500;                  /* 숫자 직접 사용 */\n```\n\n> ⚠️ 한 화면에서 폰트 크기 3종 이하\n> ⚠️ 본문 텍스트 크기 최소 13px (가독성)\n"}, {"path": "tokens/elevation.md", "label": "Elevation", "group": "tokens", "slug": "tokens--elevation", "raw": "---\nfile: tokens/elevation.md\nversion: 0.4.0\ndepends-on: tokens/_index.md\n---\n\n# Elevation & 그림자\n\n> **언제 참조하나:** 떠 있는 요소(모달, 드롭다운, 토스트, 카드) 만드는 사람\n\n그림자는 z축 거리감과 z-index 계층을 시각화한다.\nShadow 레벨과 z-index는 1:1로 매칭한다. 충돌 시 토큰값만 사용한다.\n\n| 토큰 | 사용처 | z-index 매칭 |\n|------|--------|-------------|\n| `--shadow-sm` | 카드 기본, hover 강조 | base |\n| `--shadow-md` | 드롭다운, 팝오버, 툴팁 | `--z-dropdown` / `--z-tooltip` |\n| `--shadow-lg` | 모달, 사이드 패널 | `--z-modal` |\n| `--shadow-xl` | Toast, 최상위 알림 | `--z-toast` |\n\n## Do / Don't\n\n```css\n/* ✅ DO */\n.modal { box-shadow: var(--shadow-lg); z-index: var(--z-modal); }\n.toast { box-shadow: var(--shadow-xl); z-index: var(--z-toast); }\n\n/* ❌ DON'T — 임의 정수 */\n.modal { z-index: 9999; }\n\n/* ❌ DON'T — 계층 불일치 (드롭다운에 모달 그림자) */\n.dropdown { box-shadow: var(--shadow-lg); }\n```\n\n> ⚠️ 하위 elevation에 상위 shadow 사용 금지(시각적 계층 오류).\n> ⚠️ 같은 레벨 컴포넌트는 같은 shadow 토큰 사용.\n"}, {"path": "tokens/motion.md", "label": "모션", "group": "tokens", "slug": "tokens--motion", "raw": "---\nfile: tokens/motion.md\nversion: 0.4.0\ndepends-on: tokens/_index.md\n---\n\n# 모션 시스템\n\n> **언제 참조하나:** transition·animation 추가 시 모든 사람\n\n모션은 장식이 아닌 정보 전달 수단이다. 세 가지 목적 외 사용 금지.\n\n| 목적 | 사용처 |\n|------|--------|\n| 상태 피드백 | hover, pressed, focus 즉각 반응 |\n| 공간 관계 | 드롭다운 진입, 모달 등장, 슬라이드 패널 |\n| 주의 유도 | 에러 발생, toast 등장 |\n\n## Duration 매칭\n\n| 토큰 | 사용처 |\n|------|--------|\n| `--duration-fast` (100ms) | hover, focus, 즉각 상태 변화 |\n| `--duration-base` (150ms) | 드롭다운, 팝오버, 일반 전환 |\n| `--duration-slow` (200ms) | 모달, 사이드 패널, 페이지 전환 |\n\n기본 easing은 `--easing-base` 사용. 세분화는 도입 시점에 토큰 추가한다.\n\n## Do / Don't\n\n```css\n/* ✅ DO — 속성 명시 + 토큰 사용 */\ntransition: background var(--duration-fast) var(--easing-base);\ntransition: opacity var(--duration-base) var(--easing-base);\n\n/* ❌ DON'T — 임의값, all 사용, 의미 없는 반복 */\ntransition: all 0.3s ease-in-out;\nanimation: pulse 2s infinite;\n```\n\n## `prefers-reduced-motion` 대응 (필수)\n\n```css\n@media (prefers-reduced-motion: reduce) {\n  *, *::before, *::after {\n    transition-duration: 0.01ms !important;\n    animation-duration:  0.01ms !important;\n    animation-iteration-count: 1 !important;\n  }\n}\n```\n\n> ⚠️ 자동 반복 애니메이션, 장식용 모션 금지.\n> ⚠️ 사용자가 호출하지 않은 모션은 만들지 않는다(loading 인디케이터 제외).\n"}, {"path": "tokens/icon.md", "label": "아이콘", "group": "tokens", "slug": "tokens--icon", "raw": "---\nfile: tokens/icon.md\nversion: 0.4.0\ndepends-on: tokens/_index.md\n---\n\n# 아이콘 시스템\n\n> **언제 참조하나:** 아이콘 추가·정렬·접근성 결정 시 모든 사람\n\n아이콘 크기는 컴포넌트 height와 매칭한다. 한 화면에서 스타일은 하나로 통일한다.\n\n| 토큰 | 크기 | 사용처 |\n|------|------|--------|\n| `--icon-12` | 12px | 보조 인디케이터(badge 내부, 메타 정보) |\n| `--icon-16` | 16px | 기본. md size 컴포넌트(Button, Input) |\n| `--icon-20` | 20px | lg size, 단독 아이콘 버튼 |\n| `--icon-24` | 24px | xl size, 페이지 헤더, 네비게이션 |\n\n## 스타일 일관성\n\n한 화면에서 outlined 또는 filled 중 하나만 사용한다. 혼용 금지.\n선택적 강조 표현(active 상태, 알림)에서만 filled 허용.\n\n## 정렬\n\n- 텍스트와 함께 쓸 때 옵티컬 센터 정렬 (line-height 기준 중앙)\n- 아이콘과 텍스트 사이 간격은 `--space-gap-xs`\n- 아이콘 색상은 텍스트 색상 상속 (`color: inherit`)\n\n## Do / Don't\n\n```html\n<!-- ✅ DO — 텍스트 + 아이콘 -->\n<button class=\"btn btn--md\">\n  <Icon name=\"save\" size=\"16\" />\n  저장\n<\/button>\n\n<!-- ✅ DO — 단독 아이콘 버튼 (aria-label 필수) -->\n<button class=\"btn-icon\" aria-label=\"삭제\">\n  <Icon name=\"delete\" size=\"20\" />\n<\/button>\n\n<!-- ❌ DON'T — 단독 아이콘 + 라벨 없음 -->\n<button><Icon name=\"delete\" /><\/button>\n\n<!-- ❌ DON'T — 한 화면에 outlined와 filled 혼용 -->\n<Icon name=\"save\" variant=\"outlined\" />\n<Icon name=\"delete\" variant=\"filled\" />\n```\n\n> ⚠️ 단독 아이콘 버튼은 반드시 `aria-label` 또는 `aria-labelledby` 제공.\n> 자세한 접근성 요구사항은 `accessibility.md` 참조.\n"}, {"path": "adaptation.md", "label": "반응형·다크모드", "group": "adaptation", "slug": "adaptation", "raw": "---\nfile: adaptation.md\nversion: 0.4.0\n---\n\n# 반응형 & 다크모드\n\n> **언제 참조하나:** 레이아웃 결정·테마 처리 시 모든 사람\n\n## 반응형 & Breakpoint\n\n김반장 3.0은 **데스크톱 우선**이다. 태블릿까지 지원, 모바일은 추후 검토.\n\n| Breakpoint | 너비 | 대응 디바이스 |\n|------------|------|--------------|\n| sm | < 768px | (현재 미지원) |\n| md | 768–1024px | 태블릿 |\n| lg | 1024–1440px | 데스크톱 (기본) |\n| xl | ≥ 1440px | 와이드 모니터 |\n\nContainer max width: `--layout-max-width: 1440px`\n\n### 규칙\n\n- 컴포넌트는 컨테이너 너비에 따라 자연스럽게 stretch한다.\n- Sidebar는 `lg` 이상에서만 고정. `md`에서는 collapse.\n- Table은 `md` 이하에서 가로 스크롤 허용. **컬럼 reflow 금지**(데이터 비교 가능성 유지).\n- Modal은 모든 breakpoint에서 max-width 고정 + 화면 가운데 정렬.\n\n> ⚠️ 모바일(< 768px) 대응이 필요한 컴포넌트는 별도 기획 후 추가.\n> ⚠️ B2B 워크플로우 특성상 태블릿 미만은 디자인 의사결정 필요.\n\n## 다크모드 정책\n\n**현재 라이트 모드만 지원.** 토큰 구조는 다크모드 전환을 전제로 설계되어 있으나 정식 지원은 추후 결정.\n\n### 규칙\n\n- 컴포넌트에서 hex값 직접 사용 금지(다크모드 전환 시 일괄 갈아끼울 수 없게 됨).\n- Surface, text, border, shadow는 반드시 Semantic 토큰 경유.\n- 향후 다크모드 도입 시 Primitive 추가 + Semantic 매핑 변경만으로 전환 가능하도록 유지.\n\n```css\n/* ✅ DO — Semantic 경유. 다크모드 전환 시 토큰만 바뀌면 됨 */\n.card {\n  background: var(--color-surface-base);\n  color: var(--color-text-primary);\n}\n\n/* ❌ DON'T — 다크모드 전환 불가능 */\n.card {\n  background: #ffffff;\n  color: var(--color-gray-900);  /* Primitive 직접 참조 */\n}\n```\n\n> 💡 Semantic 토큰을 지키는 한 다크모드는 토큰 레벨 작업으로 끝난다. 컴포넌트 코드는 그대로.\n"}, {"path": "product.md", "label": "제품 패턴", "group": "product", "slug": "product", "raw": "---\nfile: product.md\nversion: 0.4.0\n---\n\n# 제품 제약 & 패턴\n\n> **언제 참조하나:** UX 결정·상태 처리·메시지 작성·데이터 표시하는 모든 사람\n\n## B2B SaaS 제약\n\n| 제약 | 규칙 |\n|------|------|\n| 정보 밀도 | 장식 최소화. 같은 면적에 더 많은 정보 |\n| 오류 방지 | 비가역 행동(삭제·전송)은 항상 확인 단계 |\n| 반복 효율 | 키보드 내비게이션 필수. 자주 쓰는 행동 = 최소 클릭 |\n| 일관성 | 같은 기능 = 같은 위치·모양. 컴포넌트 용도 이탈 금지 |\n| 데이터 우선 | Table·Form·Filter 최우선. Empty·Loading·Error state 필수 |\n\n### Density 모드\n\n데이터 밀도가 높은 화면(Table, Form, List)은 density 모드를 선택할 수 있다.\n\n| 모드 | 컴포넌트 height | 사용처 |\n|------|-----------------|--------|\n| Compact | `--height-32` | 데이터 테이블, 관리자 화면 |\n| Comfortable | `--height-36` (기본) | 일반 화면 |\n| Spacious | `--height-40` | 폼 중심 화면, 설정 페이지 |\n\n> ⚠️ 한 페이지 내 density 혼용 금지. 페이지 단위로 통일.\n> ⚠️ Density 변경은 height 토큰만 바뀐다. 폰트·radius는 그대로 유지.\n\n## 상태 패턴 (Empty · Loading · Error)\n\n데이터를 다루는 모든 컴포넌트는 4가지 상태를 정의한다: **default · empty · loading · error**.\n\n### Empty State\n\n원인별로 메시지와 액션이 다르다. 같은 빈 화면처럼 처리하지 않는다.\n\n| 종류 | 메시지 | 액션 |\n|------|--------|------|\n| 첫 진입 (데이터 없음) | \"아직 [항목]이 없어요\" | 생성 CTA |\n| 필터 결과 없음 | \"조건에 맞는 [항목]이 없어요\" | 필터 초기화 |\n| 권한 없음 | \"이 [항목]에 접근 권한이 없어요\" | 관리자 문의 안내 |\n\n### Loading State\n\n| 종류 | 사용처 | 기준 |\n|------|--------|------|\n| Skeleton | 레이아웃 예측 가능 (Table, Card list, Form) | 1초 이상 예상 |\n| Spinner | 예측 불가, 짧은 작업 (버튼 내부, 인라인) | 1–3초 |\n| Progress bar | 진행률 표시 가능한 긴 작업 (업로드, 일괄 처리) | 3초 이상 + 진행률 측정 가능 |\n\n### Error State\n\n| 종류 | 사용처 |\n|------|--------|\n| Inline | 단일 필드 에러 (입력 검증) |\n| Banner | 섹션 단위 에러 (저장 실패, 권한 부족) |\n| Page | 전체 페이지 로드 실패 (404, 500) |\n\n### 메시지 작성 규칙\n\n```\n✅ \"네트워크 연결이 끊겼어요. 잠시 후 다시 시도해주세요.\"\n❌ \"죄송합니다, 알 수 없는 오류가 발생했습니다.\"\n```\n\n> ⚠️ 모든 에러 메시지는 **원인 + 해결 방법** 구조. 사과·자조 톤 금지.\n> ⚠️ Loading 1초 미만은 표시하지 않는다(깜빡임 방지).\n\n## 데이터 포맷팅\n\n표시 형식은 시스템 전체에서 통일한다. 같은 데이터 종류는 한 화면 내에서 형식을 맞춘다.\n\n| 종류 | 형식 | 예 |\n|------|------|-----|\n| 숫자 | 천단위 콤마, 음수는 마이너스 부호 | `1,234,567` `-128` |\n| 큰 숫자 | 한국어 단위 표기 | `1,234만` `12.5억` |\n| 소수점 | 항목별 자릿수 통일 | 통화 0자리, 비율 1자리 |\n| 날짜 | `YYYY.MM.DD` | `2025.06.01` |\n| 날짜+시간 | `YYYY.MM.DD HH:mm` | `2025.06.01 14:30` |\n| 상대시간 | 24시간 이내만 사용 | `방금 전`, `3분 전`, `2시간 전` |\n| 통화 | 단위 뒤. 천단위 콤마 | `12,000원` |\n| 빈값 | 모든 컴포넌트 동일 | `—` (em dash) |\n| 진행률 | 정수 % | `85%` |\n| ID·코드 | 고정폭 폰트 | `--font-family-mono` |\n\n> ⚠️ 같은 컬럼·같은 데이터 종류는 형식 통일. `1,234`와 `1234` 혼용 금지.\n> ⚠️ 24시간 초과 시 상대시간 → 절대 날짜로 전환. (`3일 전` 금지, `2025.05.29` 사용)\n\n## Microcopy & Voice\n\n톤은 **해요체** 기반. 짧고 명확하게.\n\n### 버튼 라벨\n\n| 형식 | 사용처 |\n|------|--------|\n| 동사 (`저장`, `삭제`, `취소`) | 1차 액션. 기본 |\n| 동사+명사 (`항목 추가`, `필터 초기화`) | 대상이 모호할 때만 |\n\n> ⚠️ \"저장하기\" \"확인하기\" 같은 ~하기 형태 금지. 명사형으로 통일.\n\n### 다이얼로그·확인\n\n| 상황 | 형식 |\n|------|------|\n| 비가역 행동 | \"[대상]을 삭제할까요?\" + 액션 동사(\"삭제\" / \"취소\") |\n| 저장 성공 | 명시적 확인 다이얼로그 없이 toast 피드백 |\n| 변경사항 손실 위험 | \"변경사항이 저장되지 않아요. 나갈까요?\" |\n\n### 에러 메시지\n\n원인 → 해결 방법 순서. 사용자 잘못으로 단정하지 않는다.\n\n```\n✅ \"이메일 형식이 올바르지 않아요. 예: name@company.com\"\n❌ \"잘못된 이메일을 입력하셨습니다.\"\n\n✅ \"파일 크기는 10MB 이하만 업로드할 수 있어요.\"\n❌ \"파일이 너무 큽니다.\"\n```\n\n### 전문 용어\n\n- B2B 표준 용어는 영어 그대로: 필터, 대시보드, 리포트, API, Webhook\n- 일상화된 용어는 한글: 저장, 검색, 설정, 삭제\n- 신규 용어 도입 시 한글 우선. 영어 병기는 첫 등장 시 1회만.\n"}, {"path": "accessibility.md", "label": "접근성", "group": "accessibility", "slug": "accessibility", "raw": "---\nfile: accessibility.md\nversion: 0.4.0\n---\n\n# 접근성\n\n> **언제 참조하나:** 모든 컴포넌트 작업자. 정의서 작성 시 체크리스트로 활용.\n\nWCAG 2.1 AA 준수. 컴포넌트 정의서 마지막 섹션 \"접근성 체크리스트\"는 아래 항목으로 구성한다.\n\n## 키보드\n\n- 모든 인터랙티브 요소는 Tab으로 도달 가능\n- focus 순서는 시각적 순서와 일치\n- 모달·드롭다운은 focus trap 적용. ESC로 닫기\n- 페이지 시작에 \"본문으로 건너뛰기\" skip link\n\n## 스크린리더\n\n- 단독 아이콘 버튼: `aria-label` 필수\n- 폼 필드: `<label>` 또는 `aria-labelledby`\n- 에러 메시지: `aria-describedby`로 필드와 연결, 즉각 알림은 `role=\"alert\"`\n- 동적 영역: `aria-live=\"polite\"` (변경) 또는 `assertive` (긴급)\n- 장식용 아이콘: `aria-hidden=\"true\"`\n\n## 시각\n\n- 텍스트-배경 대비 최소 **4.5:1** (큰 텍스트 18pt 이상은 3:1)\n- focus ring `--color-border-focus` 반드시 가시. `outline: none` 단독 사용 금지\n- 색상만으로 의미 전달 금지. 텍스트·아이콘·패턴 병행\n- 본문 텍스트 크기 최소 13px\n\n## 모션\n\n- `prefers-reduced-motion: reduce` 대응 필수 (`tokens/motion.md` 참조)\n- 깜빡임 초당 3회 이하 (광과민성 발작 예방)\n\n> ⚠️ 접근성은 사후 추가가 아니라 컴포넌트 정의 단계의 기본 요건이다.\n> ⚠️ 정의서의 \"접근성 체크리스트\" 섹션은 위 4영역(키보드·스크린리더·시각·모션)을 모두 커버해야 한다.\n"}, {"path": "architecture.md", "label": "컴포넌트 구조", "group": "architecture", "slug": "architecture", "raw": "---\nfile: architecture.md\nversion: 0.4.0\n---\n\n# 컴포넌트 아키텍처\n\n> **언제 참조하나:** 새 컴포넌트 추가·기존 컴포넌트 수정·시스템 구조 결정 시\n\n## Variant 모델\n\n모든 컴포넌트는 아래 차원의 조합으로 정의한다.\n\n```\n컴포넌트 = type × style × size × state × icon(optional)\n```\n\n### Do / Don't\n\n```css\n/* ✅ DO — full name 사용 */\n.btn--primary-fill  .btn--md  .btn--round\n\n/* ❌ DON'T — 약어 사용 */\n.btn--pr-fl  .btn--m  .btn--r\n```\n\n### 상태 완전성 — 모든 인터랙티브 컴포넌트에 필수\n\n```\ndefault  ·  hover  ·  pressed  ·  disabled\n```\n\n추가: `focus`(키보드) · `loading`(비동기)\n\n## 컴포넌트 계층\n\n시스템 기반(토큰·공간·색상·타이포·elevation·모션·아이콘)이 모두 정의된 후 컴포넌트를 분류한다.\n\n```\nAtom  →  Molecule  →  Organism  →  Pattern\n```\n\n| 레이어 | 기준 | 예시 |\n|--------|------|------|\n| **Atom** | 분해 불가, 의존성 없음 | Button · Input · Badge · Toggle · Icon |\n| **Molecule** | Atom 2개+ 결합, 단일 기능 | FormField · SearchBar · Dropdown |\n| **Organism** | 자체 레이아웃 보유 | Table · SidebarNav · Card · TopNav |\n| **Pattern** | 페이지 수준 구조 | Dashboard · ListPage · DetailPage |\n\n> ⚠️ 하위 레이어가 상위를 import 금지. Molecule은 Atom만 포함.\n"}]</script>
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>

<script>
  (function() {
    var FILES = JSON.parse(document.getElementById('files-source').textContent);
    var contentEl = document.getElementById('content');
    var sidebarEl = document.getElementById('sidebar');
    var tocListEl = document.getElementById('toc-list');

    marked.setOptions({ gfm: true, breaks: false });

    function parseFrontmatter(raw) {
      var m = raw.match(/^---\n([\s\S]*?)\n---\n([\s\S]*)$/);
      if (!m) return { meta: {}, body: raw };
      var meta = {};
      m[1].split('\n').forEach(function(line) {
        var idx = line.indexOf(':');
        if (idx > -1) {
          var key = line.slice(0, idx).trim();
          var val = line.slice(idx + 1).trim();
          if (key) meta[key] = val;
        }
      });
      return { meta: meta, body: m[2] };
    }

    function slugify(text) {
      return text.toLowerCase().trim()
        .replace(/[^\w\s\u3131-\uD79D-]/g, '')
        .replace(/\s+/g, '-')
        .replace(/^-+|-+$/g, '');
    }

    // ─── 사이드바 빌드 ───
    var groups = {};
    FILES.forEach(function(file) {
      if (!groups[file.group]) groups[file.group] = [];
      groups[file.group].push(file);
    });

    var groupLabels = {
      'overview': 'OVERVIEW',
      'workflow': 'WORKFLOW',
      'governance': 'GOVERNANCE',
      'tokens': 'TOKENS',
      'adaptation': 'ADAPTATION',
      'product': 'PRODUCT',
      'accessibility': 'ACCESSIBILITY',
      'architecture': 'ARCHITECTURE',
    };

    Object.keys(groupLabels).forEach(function(groupKey) {
      var items = groups[groupKey];
      if (!items) return;
      var section = document.createElement('div');
      section.className = 'sidebar-group';
      section.innerHTML = '<div class="sidebar-label">' + groupLabels[groupKey] + '</div>';
      var ul = document.createElement('ul');
      ul.className = 'sidebar-nav';
      items.forEach(function(file) {
        var li = document.createElement('li');
        var a = document.createElement('a');
        a.href = '#' + file.slug;
        a.dataset.slug = file.slug;
        a.innerHTML = '<span>' + file.label + '</span><span class="file-path">' + file.path.split('/').pop() + '</span>';
        li.appendChild(a);
        ul.appendChild(li);
      });
      section.appendChild(ul);
      sidebarEl.appendChild(section);
    });

    var sidebarLinks = sidebarEl.querySelectorAll('a[data-slug]');
    var currentIdx = 0;
    var tocObserver = null;

    function renderPage(slug) {
      var idx = FILES.findIndex(function(f) { return f.slug === slug; });
      if (idx === -1) idx = 0;
      var file = FILES[idx];
      var parsed = parseFrontmatter(file.raw);

      sidebarLinks.forEach(function(link) {
        link.classList.toggle('active', link.dataset.slug === file.slug);
      });

      var inner = document.createElement('div');
      inner.className = 'content-inner';

      // 파일 메타
      var meta = document.createElement('div');
      meta.className = 'file-meta';

      // depends-on 파싱 → 다른 파일 매칭 시 링크화
      var dependsRaw = parsed.meta['depends-on'] || '';
      var dependsList = dependsRaw.split(',').map(function(s) { return s.trim(); }).filter(Boolean);
      var dependsHTML = '';
      if (dependsList.length > 0) {
        dependsHTML = '<span class="file-meta-depends"><span class="file-meta-depends-label">참조</span>' +
          dependsList.map(function(p) {
            var target = FILES.find(function(f) { return f.path === p; });
            if (target) {
              return '<a href="#' + target.slug + '" class="file-meta-link"><code>' + p + '</code></a>';
            }
            return '<code style="font-size:10px;padding:2px 6px;">' + p + '</code>';
          }).join(' · ') + '</span>';
      }

      meta.innerHTML =
        '<span class="file-meta-path">' + file.path + '</span>' +
        '<span>v' + (parsed.meta.version || '?') + '</span>' +
        dependsHTML +
        '<span class="file-meta-actions"></span>';

      var copyBtn = document.createElement('button');
      copyBtn.className = 'btn btn--xs';
      copyBtn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg> 이 파일 복사';
      copyBtn.addEventListener('click', function() {
        navigator.clipboard.writeText(file.raw).then(function() {
          showToast(file.path + ' 복사됨');
        });
      });
      meta.querySelector('.file-meta-actions').appendChild(copyBtn);
      inner.appendChild(meta);

      // 본문
      var bodyEl = document.createElement('div');
      bodyEl.className = 'md';
      bodyEl.innerHTML = marked.parse(parsed.body);

      var headings = bodyEl.querySelectorAll('h2, h3');
      var tocItems = [];
      var seen = {};
      headings.forEach(function(h, i) {
        var id = slugify(h.textContent) || ('h-' + i);
        if (seen[id]) { id = id + '-' + (++seen[id]); } else { seen[id] = 1; }
        h.id = id;
        tocItems.push({ level: h.tagName === 'H2' ? 2 : 3, id: id, text: h.textContent });
      });

      bodyEl.querySelectorAll('blockquote').forEach(function(bq) {
        if (bq.textContent.indexOf('💡') !== -1) bq.classList.add('tip');
      });

      // ─── inline code의 .md 파일명을 자동 링크화 ───
      bodyEl.querySelectorAll('code').forEach(function(code) {
        if (code.closest('pre')) return;  // 코드 블록 안은 스킵
        var text = code.textContent.trim();
        // 정확히 파일 경로와 매치되는 경우만 링크화 (오탐 방지)
        var matched = FILES.find(function(f) { return f.path === text; });
        if (matched) {
          var a = document.createElement('a');
          a.href = '#' + matched.slug;
          a.className = 'md-file-link';
          a.title = matched.label + ' 문서로 이동';
          code.parentNode.insertBefore(a, code);
          a.appendChild(code);
        }
      });

      inner.appendChild(bodyEl);

      // prev/next
      var pager = document.createElement('nav');
      pager.className = 'pager';
      var prev = idx > 0 ? FILES[idx - 1] : null;
      var next = idx < FILES.length - 1 ? FILES[idx + 1] : null;

      var prevLink = document.createElement('a');
      prevLink.className = 'pager-link prev';
      prevLink.href = prev ? '#' + prev.slug : '#';
      prevLink.dataset.disabled = !prev;
      prevLink.innerHTML =
        '<span class="pager-direction">← 이전</span>' +
        '<span class="pager-label">' + (prev ? prev.label : '—') + '</span>' +
        '<span class="pager-path">' + (prev ? prev.path : '') + '</span>';
      pager.appendChild(prevLink);

      var nextLink = document.createElement('a');
      nextLink.className = 'pager-link next';
      nextLink.href = next ? '#' + next.slug : '#';
      nextLink.dataset.disabled = !next;
      nextLink.innerHTML =
        '<span class="pager-direction">다음 →</span>' +
        '<span class="pager-label">' + (next ? next.label : '—') + '</span>' +
        '<span class="pager-path">' + (next ? next.path : '') + '</span>';
      pager.appendChild(nextLink);

      inner.appendChild(pager);

      contentEl.innerHTML = '';
      contentEl.appendChild(inner);
      window.scrollTo({ top: 0, behavior: 'instant' });

      // TOC
      tocListEl.innerHTML = '';
      if (tocItems.length === 0) {
        tocListEl.innerHTML = '<li class="toc-empty">목차 없음</li>';
        if (tocObserver) tocObserver.disconnect();
      } else {
        tocItems.forEach(function(item) {
          var li = document.createElement('li');
          var a = document.createElement('a');
          a.href = '#' + item.id;
          a.textContent = item.text;
          a.dataset.target = item.id;
          if (item.level === 3) a.classList.add('h3-link');
          a.addEventListener('click', function(e) {
            e.preventDefault();
            var el = document.getElementById(item.id);
            if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
          });
          li.appendChild(a);
          tocListEl.appendChild(li);
        });

        if (tocObserver) tocObserver.disconnect();
        var tocLinks = tocListEl.querySelectorAll('a');
        tocObserver = new IntersectionObserver(function(entries) {
          entries.forEach(function(entry) {
            if (entry.isIntersecting) {
              tocLinks.forEach(function(link) {
                link.classList.toggle('active', link.dataset.target === entry.target.id);
              });
            }
          });
        }, { rootMargin: '-80px 0px -70% 0px', threshold: 0 });
        headings.forEach(function(h) { tocObserver.observe(h); });
      }

      currentIdx = idx;
      document.title = file.label + ' · 김반장 Design System';
    }

    function getSlugFromHash() {
      return decodeURIComponent(location.hash.slice(1)) || FILES[0].slug;
    }
    function navigate() { renderPage(getSlugFromHash()); }
    window.addEventListener('hashchange', navigate);
    navigate();

    document.addEventListener('keydown', function(e) {
      if (e.target.matches('input, textarea')) return;
      if (e.metaKey || e.ctrlKey || e.altKey) return;
      if (e.key === 'ArrowLeft' && currentIdx > 0) {
        e.preventDefault();
        location.hash = FILES[currentIdx - 1].slug;
      } else if (e.key === 'ArrowRight' && currentIdx < FILES.length - 1) {
        e.preventDefault();
        location.hash = FILES[currentIdx + 1].slug;
      }
    });

    var hintEl = document.getElementById('kbd-hint');
    setTimeout(function() {
      hintEl.classList.add('show');
      setTimeout(function() { hintEl.classList.remove('show'); }, 3500);
    }, 800);

    var toast = document.getElementById('toast');
    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(function() { toast.classList.remove('show'); }, 1800);
    }

    document.getElementById('btn-copy-all').addEventListener('click', function() {
      var combined = FILES.map(function(f) {
        return '// ===== ' + f.path + ' =====\n\n' + f.raw;
      }).join('\n\n');
      navigator.clipboard.writeText(combined).then(function() {
        showToast(FILES.length + '개 파일을 합쳐서 복사됨');
      });
    });

    document.getElementById('btn-zip').addEventListener('click', function() {
      var zip = new JSZip();
      var folder = zip.folder('design-system');
      FILES.forEach(function(f) { folder.file(f.path, f.raw); });
      zip.generateAsync({ type: 'blob' }).then(function(blob) {
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url; a.download = 'design-system.zip';
        document.body.appendChild(a); a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        showToast('design-system.zip 다운로드됨');
      });
    });

    document.getElementById('brand-link').addEventListener('click', function(e) {
      e.preventDefault();
      location.hash = FILES[0].slug;
    });
  })();
</script>

</body>
</html>
