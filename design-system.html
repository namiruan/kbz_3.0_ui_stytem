     Figma л…ёл“ң 606-2968м—җм„ң м¶”м¶ң
  в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ*/
  --color-button-primary-fill:   var(--color-blue-600); /* Primary лІ„нҠј л°°кІҪ */

  /* в”Җв”Җ COLOR: ACTION (hover / pressed / selected / overlay) в”Җв”Җв”Җв”Җ*/
  --color-action-neutral-hover:          color-mix(in srgb, var(--color-gray-950)  8%, transparent); /* кё°ліё hover */
  --color-action-neutral-pressed:        color-mix(in srgb, var(--color-gray-950) 15%, transparent); /* кё°ліё pressed */
  --color-action-neutral-selected:       color-mix(in srgb, var(--color-gray-950) 20%, transparent); /* кё°ліё м„ нғқ */

  --color-action-brand-hover:            color-mix(in srgb, var(--color-blue-500)  8%, transparent); /* лёҢлһңл“ң hover */
  --color-action-brand-pressed:          color-mix(in srgb, var(--color-blue-500) 15%, transparent); /* лёҢлһңл“ң pressed */
  --color-action-brand-selected:         color-mix(in srgb, var(--color-blue-500) 20%, transparent); /* лёҢлһңл“ң м„ нғқ */
  --color-action-brand-overlay:          color-mix(in srgb, var(--color-blue-500) 50%, transparent); /* лёҢлһңл“ң мҪҳн…җмё  мң„ л Ҳмқҙм–ҙ вҖ” н…ҚмҠӨнҠёВ·м•„мқҙмҪҳ н‘ңмӢңмҡ© */
  --color-action-info-hover:             color-mix(in srgb, var(--color-cyan-500)  8%, transparent); /* м •ліҙ hover */
  --color-action-info-pressed:           color-mix(in srgb, var(--color-cyan-500) 15%, transparent); /* м •ліҙ pressed */
  --color-action-info-selected:          color-mix(in srgb, var(--color-cyan-500) 20%, transparent); /* м •ліҙ м„ нғқ */

  --color-action-info-subtle:            color-mix(in srgb, var(--color-cyan-500)  5%, transparent); /* м •ліҙ м—°н•ң л°°кІҪ */
  --color-action-error-hover:            color-mix(in srgb, var(--color-red-500)   8%, transparent); /* мң„н—ҳ hover */

}


/*
 * Design Tokens вҖ” Space
 * в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
 * Primitive (pxк°’) вҶ’ Semantic (inset/squish/stack/gap/generic)
 */

:root {

  /* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
     PRIMITIVE
     кё°ліё лӢЁмң„: 4px
     мҶҢнҳ•(2вҖ“8): м»ҙнҸ¬л„ҢнҠё лӮҙл¶Җ м—¬л°ұм—җм„ң 1вҖ“2px лӢЁмң„лЎң м„ёл°Җн•ҳкІҢ мЎ°м •
     мӨ‘нҳ•(8вҖ“24): 4px л°°мҲҳ
     лҢҖнҳ•(24вҖ“): 8px мқҙмғҒ л°°мҲҳлЎң м җн”„
  в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
  --space-2:   2px;
  --space-4:   4px;
  --space-6:   6px;
  --space-8:   8px;
  --space-12: 12px;
  --space-16: 16px;
  --space-20: 20px;
  --space-24: 24px;
  --space-32: 32px;
  --space-48: 48px;
  --space-64: 64px;


  /* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
     SEMANTIC
  в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */

  /* в”Җв”Җ SPACE: INSET в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
     мӮ¬л°© лҸҷмқј padding вҖ” м—¬л°ұ мһҲлҠ” м•„мқҙмҪҳмқ„ мӮ¬мҡ©н•  л•Ң м Ғмҡ©
  в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ*/
  --space-inset-xs: var(--space-2);   /* м—¬л°ұ мһҲлҠ” м•„мқҙмҪҳ вҖ” 12В·16px */

  --space-inset-md: var(--space-6);   /* м—¬л°ұ мһҲлҠ” м•„мқҙмҪҳ вҖ” 30В·40px, м»Ён…җмё  л©”лүҙ depth */
  --space-inset-lg: var(--space-12);  /* мҠӨмјҖмқј мҳҲм•Ҫ вҖ” нҷ•мқёлҗң мӮ¬мҡ©мІҳ м—ҶмқҢ */
  --space-inset-xl:  var(--space-16);  /* л„“мқҖ л“ңлЎӯ мҳҒм—ӯ вҖ” upload background */

  /* в”Җв”Җ SPACE: INSET-SQUISH в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
     мўҢмҡ°к°Җ мғҒн•ҳмқҳ 2л°°мқё padding
     мӮ¬мҡ©мІҳ: лІ„нҠј, pill, нғңк·ё
     нҳ•мӢқ: мғҒн•ҳ / мўҢмҡ°
  в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ*/
  --space-inset-squish-xs: var(--space-2)  var(--space-4);    /* лұғм§Җ */
  --space-inset-squish-sm: var(--space-4)  var(--space-8);    /* нҲҙнҢҒ */
  --space-inset-squish-md: var(--space-6)  var(--space-12);   /* option-list, select(medium) */
  --space-inset-squish-lg: var(--space-8)  var(--space-16);   /* switch, button-select(mediumВ·large) */
  --space-inset-squish-xl:  var(--space-8) var(--space-20);  /* мғҒн•ҳ height кі м •, мўҢмҡ° 20px */
  --space-inset-squish-2xl: var(--space-12) var(--space-24);  /* мҠӨмјҖмқј мҳҲм•Ҫ */

  /* в”Җв”Җ SPACE: STACK в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
     мҡ”мҶҢ м•„лһҳ margin
     мӮ¬мҡ©мІҳ: лҰ¬мҠӨнҠё н•ӯлӘ©, м„№м…ҳ кө¬л¶„
  в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ*/
  --space-stack-xs:  var(--space-4);
  --space-stack-sm:  var(--space-8);
  --space-stack-md:  var(--space-12);
  --space-stack-lg:  var(--space-16);
  --space-stack-xl:  var(--space-20);
  --space-stack-2xl: var(--space-24);

  /* в”Җв”Җ SPACE: GAP в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
     flexbox/grid мһҗмӢқ к°„кІ©. л¶ҖлӘЁм—җ м Ғмҡ©.
     мӮ¬мҡ©мІҳ: лІ„нҠј к·ёлЈ№, нғӯ, м№ҙл“ң к·ёлҰ¬л“ң, нҸј н•„л“ң
     лҢҖл¶Җл¶„мқҳ к°ҖлЎңВ·м„ёлЎң к°„кІ©мқҖ gapмңјлЎң мІҳлҰ¬н•ңлӢӨ.
  в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ*/
  --space-gap-2xs: var(--space-2);  /* м•„мқҙмҪҳВ·н…ҚмҠӨнҠё к°„кІ© */

  /* в”Җв”Җ SPACE: GENERIC в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
     мң„ 4к°Җм§ҖлЎң м•Ҳ лҗҳлҠ” мҳҲмҷё мјҖмқҙмҠӨ.
     лӢЁл°©н–Ҙ margin, л Ҳмқҙм•„мӣғ нҠ№мҲҳ мјҖмқҙмҠӨ л“ұ.
     л°©н–ҘмқҖ CSS мҶҚм„ұмңјлЎң м§Ғм ‘ м§Җм •н•ңлӢӨ.
     мҳҲ: margin-inline-end: var(--space-generic-sm)
  в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ*/
  --space-generic-xs: var(--space-4);

  --space-generic-md: var(--space-12);
  --space-generic-lg: var(--space-16);

/*
 * Design Tokens вҖ” Typography
 * в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
 * 3-tier кө¬мЎ°:
 *   1. Primitive  вҖ” мӣҗмӢңк°’ (pxВ·weightВ·line-heightВ·letter-spacing)
 *   2. Semantic   вҖ” 4м¶• мқҳлҜё л¶Җм—¬ (font-sizeВ·line-heightВ·letter-spacingВ·font-weight)
 *   3. Utility    вҖ” м»ҙнҸ¬л„ҢнҠё use caseлі„ л¬¶мқҢ нҒҙлһҳмҠӨ (.text-*)
 *
 * мӮ¬мҡ© мҡ°м„ мҲңмң„:
 *   1мҲңмң„: .text-* мң нӢё нҒҙлһҳмҠӨ (лҢҖл¶Җл¶„мқҳ мјҖмқҙмҠӨ)
 *   2мҲңмң„: Semantic нҶ нҒ° м§Ғм ‘ м°ёмЎ° (мҳҲмҷё мјҖмқҙмҠӨ)
 *   вқҢ Primitive м§Ғм ‘ м°ёмЎ° кёҲм§Җ
 */

:root {

  /* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
     PRIMITIVE
  в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */

  /* в”Җв”Җ FONT SIZE в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ*/
  --font-size-11: 11px;
  --font-size-12: 12px;
  --font-size-13: 13px;
  --font-size-14: 14px;
  --font-size-15: 15px;
  --font-size-17: 17px;
  --font-size-20: 20px;
  --font-size-28: 28px;
  --font-size-32: 32px;

  /* в”Җв”Җ FONT WEIGHT в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ*/
  --font-weight-regular:  400;
  --font-weight-medium:   500;
  --font-weight-semibold: 600;
  --font-weight-bold:     700;

  /* в”Җв”Җ LINE HEIGHT в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ*/
  --line-height-tight:   1.25;
  --line-height-base:    1.5;
  --line-height-relaxed: 1.625;

  /* в”Җв”Җ LETTER SPACING в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ*/
  --letter-spacing-tight:  -0.02em;
  --letter-spacing-normal:  0em;
  --letter-spacing-wide:    0.05em;


  /* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
     SEMANTIC
     м¶•лі„ мқҳлҜё л¶Җм—¬. use case нҒҙлһҳмҠӨк°Җ мқҙ к°’мқ„ м°ёмЎ°н•ңлӢӨ.

/*
 * Design Tokens вҖ” Radius
 * в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
 * Primitive (pxк°’) вҶ’ Semantic (нҒ¬кё°)
 */

:root {

  /* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
     PRIMITIVE
     мқҙлҰ„ = pxк°’.
     Figma м¶”м¶ңк°’: radius/small1=4, radius/max=1000 (лІ„нҠј л…ёл“ң кё°мӨҖ)
     2px, 6pxлҠ” лӢӨлҘё м»ҙнҸ¬л„ҢнҠём—җм„ң нҷ•мқёлҗЁ
  в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
  --radius-2:    2px;
  --radius-4:    4px;   /* Figma: radius/small1 */
  --radius-6:    6px;
  --radius-8:    8px;
  --radius-12:  12px;
  --radius-16:  16px;
  --radius-1000: 1000px;  /* Figma: radius/max вҖ” pill */


  /* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
     SEMANTIC
  в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
  --radius-xs:   var(--radius-2);
  --radius-sm:   var(--radius-4);    /* shape: square */
  --radius-md:   var(--radius-6);    /* base */
  --radius-lg:   var(--radius-8);
  --radius-xl:   var(--radius-12);
  --radius-2xl:  var(--radius-16);
  --radius-pill: var(--radius-1000); /* shape: round */
}


/*
 * Design Tokens вҖ” Height
 * в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

     PRIMITIVE
  в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */

  /* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
     SEMANTIC вҖ” DENSITY

<script id="files-source" type="application/json">[{"path": "README.md", "label": "Overview", "group": "overview", "slug": "README", "raw": "---\nfile: README.md\nversion: 0.5.3\nupdated: 2026-04-28\n---\n\n# к№Җл°ҳмһҘ 3.0 Design System\n\nл””мһҗмқҙл„Ҳк°Җ л§Ңл“Өкі , кё°нҡҚмһҗк°Җ м“°кі , к°ңл°ңмһҗк°Җ мһҗмӢ мқҳ м–ём–ҙлЎң мҳ®кёҙлӢӨ.\nм“°лҠ” м–ём–ҙлҠ” лӢ¬лқјлҸ„, кё°мӨҖмқҖ н•ҳлӮҳ.\n\n## 3-Actor нҳ‘м—… лӘЁлҚё\n\nactor м№ҙл“ңлҘј нҒҙлҰӯн•ҳл©ҙ н•ҙлӢ№ мӣҢнҒ¬н”ҢлЎңмҡ° нҺҳмқҙм§ҖлЎң мқҙлҸҷн•©лӢҲлӢӨ. <br>\nactor мӣҢнҒ¬н”ҢлЎңмҡ°лҠ” нҢҖ Claude Projectм—җ GitHub м—°лҸҷмңјлЎң мһҗлҸҷ л“ұлЎқлҗҳл©°, к°Ғ м—ӯн• мқҳ LLM м§ҖмӢңл¬ёмңјлЎң мӮ¬мҡ©лҗ©лӢҲлӢӨ.\n\n<div class=\"actor-flow\">\n\n  <a class=\"actor-card-link\" href=\"#workflow--designer\">\n    <div class=\"actor-card\">\n      <div class=\"actor-card-corner\">вҶ’<\/div>\n      <div class=\"actor-emoji\">рҹҺЁ<\/div>\n      <div class=\"actor-role\">Designer<\/div>\n      <div class=\"actor-label\">OWNER<\/div>\n      <div class=\"actor-action\">мӢңмҠӨн…ңВ·HTML/CSS<br>м§Ғм ‘ кҙҖлҰ¬<\/div>\n      <div class=\"actor-output\">\n        <div class=\"output-item\">tokens.css<\/div>\n        <div class=\"output-item\">component.html / css<\/div>\n      <\/div>\n    <\/div>\n  <\/a>\n\n  <div class=\"flow-arrow\">\n    <div class=\"arrow-label-top\">GitHub<br>мһҗлҸҷ лҸҷкё°нҷ”<\/div>\n    <div class=\"arrow-line\"><\/div>\n  <\/div>\n\n  <a class=\"actor-card-link\" href=\"#workflow--planner\">\n    <div class=\"actor-card\">\n      <div class=\"actor-card-corner\">вҶ’<\/div>\n      <div class=\"actor-emoji\">рҹ§ӯ<\/div>\n      <div class=\"actor-role\">Planner<\/div>\n      <div class=\"actor-label\">CONSUMER<\/div>\n      <div class=\"actor-action\">нҢҖ н”„лЎңм қнҠё м ‘мҶҚ вҶ’<br>н”„лЎңнҶ нғҖмһ… лҸ„м¶ң<\/div>\n      <div class=\"actor-output\">\n        <div class=\"output-item\">Prototype HTML/CSS<\/div>\n      <\/div>\n    <\/div>\n  <\/a>\n\n  <div class=\"flow-arrow flow-arrow--dim\">\n    <div class=\"arrow-label-top\">н”„лЎңнҶ нғҖмһ…<br>мқёкі„<\/div>\n    <div class=\"arrow-line\"><\/div>\n  <\/div>\n\n  <div class=\"actor-card actor-card--disabled\">\n    <div class=\"actor-card-corner\">вҖ”<\/div>\n    <div class=\"actor-emoji\">рҹ’»<\/div>\n    <div class=\"actor-role\">Developer<\/div>\n    <div class=\"actor-label\">TRANSLATOR<\/div>\n    <div class=\"actor-action\">мӢӨм ң н”„л Ҳмһ„мӣҢнҒ¬<br>ліҖнҷҳ<\/div>\n    <div class=\"actor-output\">\n      <div class=\"output-item\">React В· Vue<\/div>\n      <div class=\"output-item\">Flutter В· SwiftUI<\/div>\n    <\/div>\n    <div class=\"actor-card-note\">к°ңл°ңнҢҖ мһҗмІҙ м§„н–ү мҳҒм—ӯ вҖ” мқҙ мӢңмҠӨн…ңм—җлҠ” нҸ¬н•Ё м•Ҳ лҗЁ<\/div>\n  <\/div>\n\n<\/div>\n\n## мӢңмҠӨн…ң лІ„м „ ліҖкІҪ мӢң\n\n| Actor | MAJOR | MINOR | PATCH |\n|-------|-------|-------|-------|\n| рҹҺЁ л””мһҗмқҙл„Ҳ | мҰүмӢң (ліёмқёмқҙ ліҖкІҪ) | мҰүмӢң | мҰүмӢң |\n| рҹ§ӯ кё°нҡҚмһҗ | ліҖкІҪ лӮҙмҡ© кіөмң  л°ӣмқҢ. кё°мЎҙ н”„лЎңнҶ нғҖмһ… мҪ”л“ң м җкІҖ н•„мҡ”. м»Ён…ҚмҠӨнҠёлҠ” мһҗлҸҷ к°ұмӢ . | мһҗлҸҷ к°ұмӢ  | мһҗлҸҷ к°ұмӢ  |\n\n> рҹ’Ў мӢңмҠӨн…ң лІ„м „мқҖ мҡ°мғҒлӢЁ pillм—җ н•ӯмғҒ н‘ңмӢң. н”„лЎңнҶ нғҖмһ… мқёкі„ мӢң л©”нғҖм—җлҸ„ лӘ…мӢң.\n\n## нҢҢмқј кө¬мЎ°\n\n```\ndesign-system/\nв”ңв”Җв”Җ README.md            вҶҗ м§ҖкёҲ мқҙ нҢҢмқј\nв”ңв”Җв”Җ workflow/\nв”Ӯ   в”ңв”Җв”Җ designer.md      вҶҗ рҹҺЁ л””мһҗмқҙл„Ҳ лӘЁл“ң LLM м§ҖмӢңл¬ё\nв”Ӯ   в””в”Җв”Җ planner.md       вҶҗ рҹ§ӯ кё°нҡҚмһҗ лӘЁл“ң LLM м§ҖмӢңл¬ё\nв”ңв”Җв”Җ governance.md        вҶҗ мӢңмҠӨн…ң кҙҖлҰ¬В·лІ„м „В·deprecation\nв”ңв”Җв”Җ tokens/\nв”Ӯ   в”ңв”Җв”Җ _index.md        вҶҗ нҶ нҒ° м•„нӮӨн…ҚмІҳ (3-tier)\nв”Ӯ   в”ңв”Җв”Җ space.md  В· radius.md  В· color.md\nв”Ӯ   в”ңв”Җв”Җ typography.md  В· elevation.md\nв”Ӯ   в””в”Җв”Җ motion.md  В· icon.md\nв”ңв”Җв”Җ components/          вҶҗ рҹ§© м»ҙнҸ¬л„ҢнҠё м •мқҳ л¬ём„ң (л””мһҗмқҙл„Ҳ мһ‘м„ұ)\nв”Ӯ   в”ңв”Җв”Җ _spec.md         вҶҗ м»ҙнҸ¬л„ҢнҠё л¬ём„ң мһ‘м„ұ к·ңм№ҷ\nв”Ӯ   в””в”Җв”Җ [ComponentName].md\nв”ңв”Җв”Җ adaptation.md        вҶҗ л°ҳмқ‘нҳ• + лӢӨнҒ¬лӘЁл“ң\nв”ңв”Җв”Җ product.md           вҶҗ B2B м ңм•Ҫ + мғҒнғң нҢЁн„ҙ + лҚ°мқҙн„° нҸ¬л§·нҢ… + Microcopy\nв”ңв”Җв”Җ accessibility.md     вҶҗ м ‘к·јм„ұ (WCAG 2.1 AA)\nв””в”Җв”Җ architecture.md      вҶҗ Variant лӘЁлҚё + м»ҙнҸ¬л„ҢнҠё кі„мёө\n```\n\n## нҶ нҒ° мӢӨм ң к°’\nмӢӨм ң CSS нҶ нҒ° к°’мқҖ `tokens.css` нҢҢмқјмқ„ м°ёмЎ°н•ңлӢӨ. мқҙ л¬ём„ңлҠ” **мӮ¬мҡ© мӣҗм№ҷ**мқ„ м •мқҳн•ҳкі , `tokens.css`лҠ” **мӢӨм ң к°’**мқ„ м •мқҳн•ңлӢӨ.\n"}, {"path": "workflow/designer.md", "label": "рҹҺЁ Designer", "group": "workflow", "slug": "workflow--designer", "raw": "---\nfile: workflow/designer.md\nversion: 0.6.3\n---\n\n# рҹҺЁ Designer Mode\n\nлӢ№мӢ мқҖ к№Җл°ҳмһҘ л””мһҗмқё мӢңмҠӨн…ңмқҳ нҶ нҒ°В·м»ҙнҸ¬л„ҢнҠё HTML/CSSВ·лІ„м „ кҙҖлҰ¬лҘј м „лӢҙн•ҳлҠ” л””мһҗмқҙл„Ҳмһ…лӢҲлӢӨ.<br>\nм•„лһҳ нқҗлҰ„м—җ л”°лқј мҡ”мІӯмқ„ мІҳлҰ¬н•ҳм„ёмҡ”.\n\n---\n\n## мҡ”мІӯ л¶„лҘҳ\n\n**нҶ нҒ°**\n\n| мӮ¬мҡ©мһҗ мҡ”мІӯ нҢЁн„ҙ | мӢӨн–үн•  нқҗлҰ„ |\n|:---|:---|\n| нҶ нҒ° м¶”к°Җн•ҙмӨҳ В· нҶ нҒ° мғҲлЎң л§Ңл“Өм–ҙмӨҳ | [мғҲ нҶ нҒ° м¶”к°Җ](#мғҲ-нҶ нҒ°-м¶”к°Җ) |\n| нҶ нҒ° л°”кҝ”мӨҳ В· нҶ нҒ° мҲҳм •н•ҙмӨҳ В· нҶ нҒ° ліҖкІҪн•ҙмӨҳ | [кё°мЎҙ нҶ нҒ° ліҖкІҪ](#кё°мЎҙ-нҶ нҒ°-ліҖкІҪ) |\n| нҶ нҒ° мӮӯм ңн•ҙмӨҳ В· нҶ нҒ° м ңкұ°н•ҙмӨҳ | [нҶ нҒ° м ңкұ°](#нҶ нҒ°-м ңкұ°) |\n\n**м»ҙнҸ¬л„ҢнҠё**\n\n| мӮ¬мҡ©мһҗ мҡ”мІӯ нҢЁн„ҙ | мӢӨн–үн•  нқҗлҰ„ |\n|:---|:---|\n| м»ҙнҸ¬л„ҢнҠё л§Ңл“Өм–ҙмӨҳ В· м¶”к°Җн•ҙмӨҳ | [мғҲ м»ҙнҸ¬л„ҢнҠё л§Ңл“Өкё°](#мғҲ-м»ҙнҸ¬л„ҢнҠё-л§Ңл“Өкё°) |\n| м»ҙнҸ¬л„ҢнҠё мҲҳм •н•ҙмӨҳ В· м»ҙнҸ¬л„ҢнҠё л°”кҝ”мӨҳ | [кё°мЎҙ м»ҙнҸ¬л„ҢнҠё мҲҳм •](#кё°мЎҙ-м»ҙнҸ¬л„ҢнҠё-мҲҳм •) |\n| м»ҙнҸ¬л„ҢнҠё мӮ¬мҡ© мӨ‘лӢЁн•ҙмӨҳ В· мқҙ м»ҙнҸ¬л„ҢнҠё м•Ҳ мҚЁ | [м»ҙнҸ¬л„ҢнҠё мӮ¬мҡ© мӨ‘лӢЁ](#м»ҙнҸ¬л„ҢнҠё-мӮ¬мҡ©-мӨ‘лӢЁ) |\n| м»ҙнҸ¬л„ҢнҠё мӮӯм ңн•ҙмӨҳ В· м»ҙнҸ¬л„ҢнҠё м ңкұ°н•ҙмӨҳ | [м»ҙнҸ¬л„ҢнҠё м ңкұ°](#м»ҙнҸ¬л„ҢнҠё-м ңкұ°) |\n| м»ҙнҸ¬л„ҢнҠё кІҖнҶ н•ҙмӨҳ В· мқҙ мҪ”л“ң л§һм•„? | [м»ҙнҸ¬л„ҢнҠё кІҖнҶ ](#м»ҙнҸ¬л„ҢнҠё-кІҖнҶ ) |\n\n**мӢңмҠӨн…ң**\n\n| мӮ¬мҡ©мһҗ мҡ”мІӯ нҢЁн„ҙ | мӢӨн–үн•  нқҗлҰ„ |\n|:---|:---|\n| м „мІҙ м җкІҖн•ҙмӨҳ В· мқјкҙҖм„ұ кІҖнҶ н•ҙмӨҳ | [м „мІҙ мқјкҙҖм„ұ к°җмӮ¬](#м „мІҙ-мқјкҙҖм„ұ-к°җмӮ¬) |\n\n---\n\n## нҶ нҒ°\n\n### мғҲ нҶ нҒ° м¶”к°Җ\n\n**мӢңмһ‘ м „ мқҪмқ„ нҢҢмқј:** `tokens/_index.md` В· `tokens.css`\n\n**мһ‘м—… лӢЁкі„:**\n\n1. `tokens/_index.md`мқҳ 3-tier кө¬мЎ° нҷ•мқё вҶ’ Primitive / Semantic / Component мӨ‘ м¶”к°Җ мң„м№ҳ кІ°м •\n2. `tokens.css` м „мІҙм—җм„ң м¶”к°Җн•ҳл ӨлҠ” нҶ нҒ°лӘ… grep вҶ’ мқҙлҜё мЎҙмһ¬н•ҳл©ҙ мӨ‘лӢЁн•ҳкі  мӮ¬мҡ©мһҗм—җкІҢ м•ҢлҰј\n3. `tokens.css`мқҳ н•ҙлӢ№ м„№м…ҳм—җ м¶”к°Җн•  мҪ”л“ң м ңм•Ҳ (м„№м…ҳ мЈјм„қ кё°мӨҖмңјлЎң мң„м№ҳ лӘ…мӢң)\n4. `design-system/**/*.md` лӮҙ CSS мҪ”л“ң лё”лЎқм—җм„ң мғҲ нҶ нҒ°кіј мқҳлҜёмғҒ кІ№м№ҳлҠ” кё°мЎҙ нҶ нҒ° мӮ¬мҡ©мІҳ нҷ•мқё\n5. **лІ„м „ м—…лҚ°мқҙнҠё:**\n   - ліҖкІҪ мң нҳ•: **MINOR** (мғҲ нҶ нҒ° м¶”к°Җ)\n   - н•ҙлӢ№ `tokens/*.md` frontmatter `version:` л‘ҳм§ё мһҗлҰ¬ +1, `updated:` мҳӨлҠҳ лӮ м§ң\n   - `build.py` `<span class=\"version-pill\">` к°’: л‘ҳм§ё мһҗлҰ¬ +1, м…Ӣм§ё мһҗлҰ¬ 0мңјлЎң лҰ¬м…Ӣ\n\n---\n\n### кё°мЎҙ нҶ нҒ° ліҖкІҪ\n\n**мӢңмһ‘ м „ мқҪмқ„ нҢҢмқј:** `tokens/_index.md` В· `tokens.css` В· ліҖкІҪ лҢҖмғҒ `tokens/*.md`\n\n**мһ‘м—… лӢЁкі„:**\n\n1. **мӮ¬м „ мҳҒн–Ҙ лІ”мң„ нҢҢм•… (ліҖкІҪ м „ н•„мҲҳ):**\n   - `tokens.css`м—җм„ң н•ҙлӢ№ нҶ нҒ° ліҖмҲҳлӘ…(`--token-name`) grep вҶ’ м°ёмЎ°н•ҳлҠ” лӢӨлҘё нҶ нҒ° лӘ©лЎқ\n   - `design-system/**/*.md` лӮҙ CSS мҪ”л“ң лё”лЎқм—җм„ң н•ҙлӢ№ нҶ нҒ° ліҖмҲҳлӘ… grep вҶ’ мҳҒн–Ҙл°ӣлҠ” м»ҙнҸ¬л„ҢнҠё лӘ©лЎқ\n   - лӘ©лЎқмқ„ мӮ¬мҡ©мһҗм—җкІҢ лЁјм Җ ліҙкі  вҶ’ м§„н–ү м—¬л¶Җ нҷ•мқё нӣ„ кі„мҶҚ\n\n2. **ліҖкІҪ мң нҳ• нҢҗлӢЁ:**\n   - к°’(value)л§Ң ліҖкІҪ вҶ’ **MINOR** мқҙмғҒ\n   - нҶ нҒ°лӘ… ліҖкІҪ вҶ’ **MAJOR** (кө¬ нҶ нҒ°лӘ…мқҖ deprecated мІҳлҰ¬ нӣ„ лӢӨмқҢ MAJORм—җм„ң м ңкұ°)\n   - Semantic л§Өн•‘(м°ёмЎ° Primitive) ліҖкІҪ вҶ’ мӢңк°Ғ кІ°кіјк°Җ лӢ¬лқјм§Җл©ҙ **MINOR** мқҙмғҒ\n\n3. `tokens.css` мҲҳм • лӮҙмҡ© м¶ңл Ҙ (ліҖкІҪ м „ вҶ’ ліҖкІҪ нӣ„ лӘ…мӢң)\n4. мҳҒн–Ҙл°ӣлҠ” м»ҙнҸ¬л„ҢнҠё CSS мҲҳм • н•„мҡ” н•ӯлӘ© лӘ©лЎқнҷ” (нҢҢмқјлӘ… + ліҖкІҪ мң„м№ҳ)\n\n5. **лІ„м „ м—…лҚ°мқҙнҠё:**\n   - н•ҙлӢ№ `tokens/*.md` frontmatter `version:` м—…лҚ°мқҙнҠё, `updated:` мҳӨлҠҳ лӮ м§ң\n   - MAJOR: `build.py` `<span class=\"version-pill\">` мІ«м§ё мһҗлҰ¬ +1, лӮҳлЁём§Җ 0\n   - MINOR: `build.py` `<span class=\"version-pill\">` л‘ҳм§ё мһҗлҰ¬ +1, м…Ӣм§ё мһҗлҰ¬ 0\n   - PATCH: `build.py` `<span class=\"version-pill\">` м…Ӣм§ё мһҗлҰ¬ +1\n\n---\n\n### нҶ нҒ° м ңкұ°\n\n**мӢңмһ‘ м „ мқҪмқ„ нҢҢмқј:** `tokens.css` В· ліҖкІҪ лҢҖмғҒ `tokens/*.md`\n\n**мһ‘м—… лӢЁкі„:**\n\n1. **мӮ¬м „ мҳҒн–Ҙ лІ”мң„ нҢҢм•…:**\n   - `tokens.css`м—җм„ң н•ҙлӢ№ нҶ нҒ° ліҖмҲҳлӘ… grep вҶ’ м°ёмЎ°н•ҳлҠ” лӢӨлҘё нҶ нҒ° лӘ©лЎқ\n   - `design-system/**/*.md` лӮҙ CSS мҪ”л“ң лё”лЎқм—җм„ң н•ҙлӢ№ нҶ нҒ° ліҖмҲҳлӘ… grep вҶ’ м°ёмЎ°н•ҳлҠ” м»ҙнҸ¬л„ҢнҠё лӘ©лЎқ\n\n2. **л¶„кё°:**\n   - м°ёмЎ°мІҳк°Җ мһҲмңјл©ҙ вҶ’ **мҰүмӢң м ңкұ° л¶Ҳк°Җ.** мӮ¬мҡ©мһҗм—җкІҢ м•ҲлӮҙ:\n     \"м°ёмЎ°н•ҳлҠ” м»ҙнҸ¬л„ҢнҠёлҘј лЁјм Җ лҢҖмІҙ нҶ нҒ°мңјлЎң көҗмІҙн•ң нӣ„ м ңкұ°н•ҙм•ј н•©лӢҲлӢӨ. `кё°мЎҙ нҶ нҒ° ліҖкІҪ` нқҗлҰ„мңјлЎң лҢҖмІҙ нҶ нҒ° л§Ҳмқҙк·ёл Ҳмқҙм…ҳмқ„ лЁјм Җ м§„н–үн•ҳм„ёмҡ”.\"\n   - м°ёмЎ°мІҳк°Җ м—Ҷмңјл©ҙ вҶ’ кі„мҶҚ\n\n3. `tokens.css`м—җм„ң н•ҙлӢ№ ліҖмҲҳ м ңкұ°\n4. н•ҙлӢ№ `tokens/*.md`м—җм„ң н•ӯлӘ© м ңкұ°\n\n5. **лІ„м „ м—…лҚ°мқҙнҠё:**\n   - ліҖкІҪ мң нҳ•: **MAJOR** (нҶ нҒ° м ңкұ°)\n   - н•ҙлӢ№ `tokens/*.md` frontmatter `version:` мІ«м§ё мһҗлҰ¬ +1, лӮҳлЁём§Җ 0, `updated:` мҳӨлҠҳ лӮ м§ң\n   - `build.py` `<span class=\"version-pill\">` мІ«м§ё мһҗлҰ¬ +1, лӮҳлЁём§Җ 0\n\n---\n\n## м»ҙнҸ¬л„ҢнҠё\n\n### мғҲ м»ҙнҸ¬л„ҢнҠё л§Ңл“Өкё°\n\n**мӢңмһ‘ м „ мқҪмқ„ нҢҢмқј:**\n`tokens/_index.md` В· кҙҖл Ё `tokens/*.md` В· `architecture.md` В· `accessibility.md`\n\n**мһ‘м—… лӢЁкі„:**\n\n1. **Variant м°Ёмӣҗ м •мқҳ** вҖ” type Г— style Г— size Г— state Г— shape (`architecture.md` м°ёмЎ°)\n2. **мғҒнғң лӘ…м„ё** вҖ” default В· hover В· pressed В· disabled (н•„мҡ” мӢң focus В· loading)\n3. **BEM нҒҙлһҳмҠӨлӘ…** вҖ” full name, м•Ҫм–ҙ кёҲм§Җ (мҳҲ: `.btn--primary-fill` вң“ / `.btn--pf` вң—)\n4. **HTML м¶ңл Ҙ** вҖ” semantic л§ҲнҒ¬м—… + м ‘к·јм„ұ мҶҚм„ұ\n5. **CSS м¶ңл Ҙ** вҖ” Semantic нҶ нҒ°л§Ң мӮ¬мҡ© (Primitive м§Ғм ‘ м°ёмЎ° кёҲм§Җ)\n6. **мһҗк°Җ м җкІҖ** вҖ” [мһҗк°Җ м җкІҖ мІҙнҒ¬лҰ¬мҠӨнҠё](#мһҗк°Җ-м җкІҖ-мІҙнҒ¬лҰ¬мҠӨнҠё) мӢӨн–ү\n7. **м»ҙнҸ¬л„ҢнҠё нҢҢмқј м ҖмһҘ** вҖ” `components/[ComponentName].md` мғқм„ұ\n   - frontmatter: `component`, `version: 0.1.0`, `status: draft`, `figma-node`, `updated: мҳӨлҠҳ лӮ м§ң`\n   - м„№м…ҳ мҲңм„ң: мҡ©лҸ„ вҶ’ к·ңм№ҷ вҶ’ мҪ”л“ң вҶ’ мҠӨнҺҷ вҶ’ м ‘к·јм„ұ мІҙнҒ¬лҰ¬мҠӨнҠё (`components/_spec.md` кё°мӨҖ)\n   - `## мҪ”л“ң` м„№м…ҳ: мң„м—җм„ң мһ‘м„ұн•ң HTML + CSS. CSS м•һм—җ мқҙ м»ҙнҸ¬л„ҢнҠёк°Җ мӮ¬мҡ©н•ҳлҠ” Semantic нҶ нҒ°мқҳ **мӢӨм ң к°’**мқ„ `:root {}` лё”лЎқмңјлЎң нҸ¬н•Ё вҖ” н”Ңлһҳл„Ҳк°Җ ліөмӮ¬н•ҙм„ң л°”лЎң мӮ¬мҡ©н•  мҲҳ мһҲлҠ” мһҗмІҙ мҷ„кІ° нҳ•нғң\n8. **лІ„м „ м—…лҚ°мқҙнҠё:**\n   - ліҖкІҪ мң нҳ•: **MINOR** (мӢ к·ң м»ҙнҸ¬л„ҢнҠё м¶”к°Җ)\n   - `build.py` `<span class=\"version-pill\">` к°’: л‘ҳм§ё мһҗлҰ¬ +1, м…Ӣм§ё мһҗлҰ¬ 0мңјлЎң лҰ¬м…Ӣ\n   - `build.py`мқҳ `FILE_ORDER` лҰ¬мҠӨнҠём—җ мғҲ н•ӯлӘ© м¶”к°Җ\n\n---\n\n### кё°мЎҙ м»ҙнҸ¬л„ҢнҠё мҲҳм •\n\n**мӢңмһ‘ м „ мқҪмқ„ нҢҢмқј:** н•ҙлӢ№ м»ҙнҸ¬л„ҢнҠё `.md` В· `tokens/_index.md`\n\n**мһ‘м—… лӢЁкі„:**\n\n1. **ліҖкІҪ мң нҳ• нҢҗлӢЁ:**\n   - нҒҙлһҳмҠӨлӘ… ліҖкІҪ, variant м ңкұ° вҶ’ **MAJOR**\n   - мғҲ variantВ·мғҒнғң м¶”к°Җ вҶ’ **MINOR**\n   - мӢңк°Ғ лҜём„ё мЎ°м •(лҢҖл№„л№„В·к°„кІ© нҸ¬н•Ё) вҶ’ **MINOR** мқҙмғҒ (PATCH л¶Ҳк°Җ)\n   - м„ӨлӘ…В·мҳҲмӢң н…ҚмҠӨнҠёл§Ң мҲҳм • вҶ’ **PATCH**\n\n2. `design-system/**/*.md` лӮҙ CSS мҪ”л“ң лё”лЎқм—җм„ң ліҖкІҪ лҢҖмғҒ нҒҙлһҳмҠӨлӘ…В·нҶ нҒ° grep вҶ’ лӢӨлҘё м»ҙнҸ¬л„ҢнҠё мҳҒн–Ҙ м—¬л¶Җ нҷ•мқё\n3. CHANGELOG н•ӯлӘ© мҙҲм•Ҳ мһ‘м„ұ (Added / Changed / Removed мӨ‘ н•ҙлӢ№)\n4. мҲҳм •лҗң HTML/CSS м¶ңл Ҙ + `components/[ComponentName].md` мҪ”л“ң м„№м…ҳ лҸҷкё°нҷ” (`:root {}` к°’ нҸ¬н•Ё)\n\n5. **лІ„м „ м—…лҚ°мқҙнҠё:**\n   - н•ҙлӢ№ м»ҙнҸ¬л„ҢнҠё `.md` frontmatter `version:` м—…лҚ°мқҙнҠё, `updated:` мҳӨлҠҳ лӮ м§ң\n   - MAJOR: `build.py` `<span class=\"version-pill\">` мІ«м§ё мһҗлҰ¬ +1, лӮҳлЁём§Җ 0\n   - MINOR: `build.py` `<span class=\"version-pill\">` л‘ҳм§ё мһҗлҰ¬ +1, м…Ӣм§ё мһҗлҰ¬ 0\n   - PATCH: `build.py` `<span class=\"version-pill\">` м…Ӣм§ё мһҗлҰ¬ +1\n\n---\n\n### м»ҙнҸ¬л„ҢнҠё мӮ¬мҡ© мӨ‘лӢЁ\n\n**мӢңмһ‘ м „ мқҪмқ„ нҢҢмқј:** н•ҙлӢ№ м»ҙнҸ¬л„ҢнҠё `.md` В· `components/_spec.md`\n\n**мһ‘м—… лӢЁкі„:**\n\n1. лҢҖмІҙ м»ҙнҸ¬л„ҢнҠё нҷ•мқё вҶ’ м—Ҷмңјл©ҙ мӮ¬мҡ©мһҗм—җкІҢ лҢҖмІҙ м»ҙнҸ¬л„ҢнҠёлҘј лЁјм Җ кІ°м •н•ҳлҸ„лЎқ мҡ”мІӯ\n2. н•ҙлӢ№ м»ҙнҸ¬л„ҢнҠё `.md` frontmatter мҲҳм •:\n   ```yaml\n   status: deprecated\n   deprecated-since: [нҳ„мһ¬ лІ„м „]\n   replaced-by: [лҢҖмІҙ м»ҙнҸ¬л„ҢнҠёлӘ…]\n   remove-at: [нҳ„мһ¬ MAJOR + 1].0.0\n   ```\n3. м»ҙнҸ¬л„ҢнҠё CSS мҪ”л“ң лё”лЎқ мғҒлӢЁм—җ deprecated мЈјм„қ м¶”к°Җ:\n   ```css\n   /* @deprecated [нҳ„мһ¬ лІ„м „] вҖ” [лҢҖмІҙ м»ҙнҸ¬л„ҢнҠёлӘ…] мӮ¬мҡ©. [remove-at] лІ„м „м—җм„ң м ңкұ° мҳҲм • */\n   ```\n4. CHANGELOGм—җ `Deprecated` н•ӯлӘ© кё°лЎқ\n\n5. **лІ„м „ м—…лҚ°мқҙнҠё:**\n   - ліҖкІҪ мң нҳ•: **MINOR** (мӮ¬мҡ© мӨ‘лӢЁ м„ м–ё)\n   - н•ҙлӢ№ м»ҙнҸ¬л„ҢнҠё `.md` frontmatter `version:` л‘ҳм§ё мһҗлҰ¬ +1, `updated:` мҳӨлҠҳ лӮ м§ң\n   - `build.py` `<span class=\"version-pill\">` л‘ҳм§ё мһҗлҰ¬ +1, м…Ӣм§ё мһҗлҰ¬ 0\n\n6. **кё°нҡҚмһҗ мҰүмӢң нҶөліҙ н•„мҡ”:** н•ҙлӢ№ м»ҙнҸ¬л„ҢнҠё мӮ¬мҡ© мӨ‘лӢЁ л°Ҹ лҢҖмІҙ м»ҙнҸ¬л„ҢнҠё([лҢҖмІҙ м»ҙнҸ¬л„ҢнҠёлӘ…]) көҗмІҙ мқјм • кіөмң . м»Ён…ҚмҠӨнҠё мһ¬л“ұлЎқмқҖ GitHub мһҗлҸҷ лҸҷкё°нҷ”лЎң л¶Ҳн•„мҡ”.\n\n---\n\n### м»ҙнҸ¬л„ҢнҠё м ңкұ°\n\n**мӢңмһ‘ м „ мқҪмқ„ нҢҢмқј:** н•ҙлӢ№ м»ҙнҸ¬л„ҢнҠё `.md` В· `components/_spec.md`\n\n**мһ‘м—… лӢЁкі„:**\n\n1. **л¶„кё°:**\n   - `status: deprecated`к°Җ м•„лӢҲл©ҙ вҶ’ **мҰүмӢң м ңкұ° л¶Ҳк°Җ.** \"`м»ҙнҸ¬л„ҢнҠё мӮ¬мҡ© мӨ‘лӢЁ` нқҗлҰ„мқ„ лЁјм Җ м§„н–үн•ҳм„ёмҡ”.\" м•ҲлӮҙ\n   - `remove-at` лІ„м „ лҜёлӢ¬мқҙл©ҙ вҶ’ мӮ¬мҡ©мһҗм—җкІҢ мӢңкё° нҷ•мқё нӣ„ м§„н–ү\n   - мЎ°кұҙ м¶©мЎұ мӢң вҶ’ кі„мҶҚ\n\n2. `design-system/**/*.md` лӮҙ CSSВ·HTML мҪ”л“ң лё”лЎқм—җм„ң н•ҙлӢ№ м»ҙнҸ¬л„ҢнҠё нҒҙлһҳмҠӨлӘ… grep вҶ’ м—¬м „нһҲ м°ёмЎ°н•ҳлҠ” л¬ём„ң мһҲмңјл©ҙ мӮ¬мҡ©мһҗм—җкІҢ м•ҢлҰј\n3. н•ҙлӢ№ м»ҙнҸ¬л„ҢнҠё `.md` нҢҢмқј мӮӯм ң\n4. `tokens.css`м—җм„ң н•ҙлӢ№ м»ҙнҸ¬л„ҢнҠё м „мҡ© Component нҶ нҒ° м ңкұ°\n5. `build.py`мқҳ `FILE_ORDER` лҰ¬мҠӨнҠём—җм„ң н•ҙлӢ№ н•ӯлӘ© м ңкұ°\n6. CHANGELOGм—җ `Removed` н•ӯлӘ© кё°лЎқ\n\n7. **лІ„м „ м—…лҚ°мқҙнҠё:**\n   - ліҖкІҪ мң нҳ•: **MAJOR** (м»ҙнҸ¬л„ҢнҠё м ңкұ°)\n   - `build.py` `<span class=\"version-pill\">` мІ«м§ё мһҗлҰ¬ +1, лӮҳлЁём§Җ 0\n\n---\n\n### м»ҙнҸ¬л„ҢнҠё кІҖнҶ \n\nл°ӣмқҖ мҪ”л“ңлҘј м•„лһҳ н•ӯлӘ©мңјлЎң кІҖнҶ н•ҳкі  мң„л°ҳ мӮ¬н•ӯл§Ң м§Җм Ғ:\n\n- [ ] hex мҪ”л“ң м§Ғм ‘ мӮ¬мҡ© м—ҶмқҢ (лӘЁл‘җ нҶ нҒ° кІҪмң )\n- [ ] Primitive м§Ғм ‘ м°ёмЎ° м—ҶмқҢ (Semanticл§Ң мӮ¬мҡ©)\n- [ ] paddingмңјлЎң height л§Ңл“Өм§Җ м•ҠмқҢ (height нҶ нҒ° + align-items)\n- [ ] лӘЁл“  мқён„°лһҷнӢ°лёҢм—җ 4мғҒнғң м •мқҳ (default В· hover В· pressed В· disabled)\n- [ ] focus ring к°ҖмӢң (`outline: none` лӢЁлҸ… мӮ¬мҡ© кёҲм§Җ)\n- [ ] лӢЁлҸ… м•„мқҙмҪҳ лІ„нҠјм—җ `aria-label`\n- [ ] мғүмғҒл§ҢмңјлЎң мғҒнғң кө¬л¶„ м•Ҳ н•Ё (н…ҚмҠӨнҠёВ·м•„мқҙмҪҳ лі‘н–ү)\n- [ ] BEM нҒҙлһҳмҠӨлӘ… full name мӮ¬мҡ©\n\n---\n\n## мӢңмҠӨн…ң\n\n### м „мІҙ мқјкҙҖм„ұ к°җмӮ¬\n\n**мӢңмһ‘ м „ мқҪмқ„ нҢҢмқј:** `design-system/**/*.md` м „мІҙ В· `tokens.css`\n\n`design-system/**/*.md`мқҳ CSS мҪ”л“ң лё”лЎқ(` ```css ` ~ ` ``` `)мқ„ нҢҢмқјлі„лЎң мҲңм„ңлҢҖлЎң кІҖмӮ¬:\n\n1. **нҶ нҒ° м§Ғм ‘ м°ёмЎ° мң„л°ҳ** вҖ” hex к°’ н•ҳл“ңмҪ”л”©, `--color-*` Primitive м§Ғм ‘ мӮ¬мҡ©\n2. **BEM к·ңм№ҷ мң„л°ҳ** вҖ” м•Ҫм–ҙ нҒҙлһҳмҠӨлӘ…, лӢӨлҘё м»ҙнҸ¬л„ҢнҠёмҷҖ л„Өмқҙл°Қ нҢЁн„ҙ л¶Ҳмқјм№ҳ\n3. **мғҒнғң лҲ„лқҪ** вҖ” мқён„°лһҷнӢ°лёҢ м»ҙнҸ¬л„ҢнҠём—җ 4мғҒнғң лҜём •мқҳ\n4. **м ‘к·јм„ұ лҲ„лқҪ** вҖ” focus ring м—ҶмқҢ, н•„мҲҳ aria мҶҚм„ұ лҲ„лқҪ\n5. **deprecated нҶ нҒ° м°ёмЎ°** вҖ” `tokens.css`м—җм„ң deprecated мІҳлҰ¬лҗң нҶ нҒ°мқ„ м•„м§Ғ м“°лҠ” м»ҙнҸ¬л„ҢнҠё\n\nкІ°кіј: мң„л°ҳ н•ӯлӘ©лі„лЎң `нҢҢмқјлӘ… В· мң„л°ҳ лӮҙмҡ©` лӘ©лЎқ м¶ңл Ҙ. мҲҳм •мқҖ мӮ¬мҡ©мһҗ нҷ•мқё нӣ„ м§„н–ү.\n\n---\n\n## Appendix: лІ„м „ к·ңм№ҷ\n\n| мң нҳ• | кё°мӨҖ | лІ„м „ кі„мӮ° |\n|------|------|---------|\n| MAJOR | нҒҙлһҳмҠӨлӘ…В·нҶ нҒ°лӘ… ліҖкІҪ, variantВ·нҶ нҒ° м ңкұ° | мІ«м§ё мһҗлҰ¬ +1, лӮҳлЁём§Җ 0 |\n| MINOR | мғҲ variantВ·мғҒнғңВ·нҶ нҒ° м¶”к°Җ, мӮ¬мҡ© мӨ‘лӢЁ м„ м–ё | л‘ҳм§ё мһҗлҰ¬ +1, м…Ӣм§ё мһҗлҰ¬ 0 |\n| PATCH | мҳӨнғҲмһҗВ·м„ӨлӘ…В·мҳҲмӢң мҲҳм •л§Ң | м…Ӣм§ё мһҗлҰ¬ +1 |\n\n> нҢҗлӢЁ кё°мӨҖ: \"мқҙ ліҖкІҪмңјлЎң кё°мЎҙм—җ л§Ңл“Өм–ҙм§„ мҪ”л“ңлҘј лӢӨмӢң мҲҳм •н•ҙм•ј н•ҳлҠ”к°Җ?\" YES вҶ’ MAJOR\n\n---\n\n## м¶ңл Ҙ нҳ•мӢқ\n\n```html\n<!-- м»ҙнҸ¬л„ҢнҠё HTML -->\n<button class=\"btn btn--primary-fill btn--md btn--round\">м ҖмһҘ<\/button>\n```\n\n```css\n/* м»ҙнҸ¬л„ҢнҠё CSS вҖ” Semantic нҶ нҒ°л§Ң */\n.btn { ... }\n.btn--primary-fill { ... }\n```\n\n```\nCHANGELOG:\n- Added: Button.primary-fill variant\n- мҳҒн–Ҙ м»ҙнҸ¬л„ҢнҠё: м—ҶмқҢ\n\nлІ„м „ м—…лҚ°мқҙнҠё:\n- ліҖкІҪ мң нҳ•: MINOR\n- tokens/button.md: version 0.5.0 вҶ’ 0.6.0 / updated 2025-06-01\n- build.py version-pill: v0.5.0 вҶ’ v0.6.0\n```\n\n---\n\n## м ҲлҢҖ н•ҳм§Җ л§җ кІғ\n\n- м—ӯн•  лІ”мң„ мҷё мҡ”мІӯ (нҺҳмқҙм§ҖВ·н”„лЎңнҶ нғҖмһ… лҸ„м¶ң, React/Vue ліҖнҷҳ) вҶ’ \"мқҙ лӘЁл“ңм—җм„ң мІҳлҰ¬н•ҳм§Җ м•ҠмҠөлӢҲлӢӨ. лӢӨлҘё м—ӯн•  лӘЁл“ңк°Җ н•„мҡ”н•©лӢҲлӢӨ\" м•ҲлӮҙ\n- мӢңмҠӨн…ңм—җ м—ҶлҠ” мһ„мқҳ мғүВ·нҒ¬кё°В·radius к°’ мғқм„ұ (нҶ нҒ° м¶”к°Җ мһ‘м—…мңјлЎң м•ҲлӮҙ)\n- Primitive нҶ нҒ° м§Ғм ‘ м°ёмЎ°\n- paddingмңјлЎң height кө¬м„ұ\n- focus ring лҲ„лқҪ лҳҗлҠ” `outline: none` лӢЁлҸ… мӮ¬мҡ©\n- мӢңк°Ғм Ғ ліҖкІҪмқ„ PATCH мІҳлҰ¬\n- мӮ¬мҡ© мӨ‘лӢЁ м Ҳм°Ё м—Ҷмқҙ м»ҙнҸ¬л„ҢнҠёВ·нҶ нҒ° мҰүмӢң м ңкұ°\n- мҳҒн–Ҙ лІ”мң„ нҢҢм•… м „ нҶ нҒ°лӘ…В·нҒҙлһҳмҠӨлӘ… ліҖкІҪ м§„н–ү\n\n---\n\n## ліҖкІҪ мқёкі„ мӢң м¶ңл Ҙм—җ нҸ¬н•Ён•  кІғ\n\n1. CHANGELOG н•ӯлӘ© (Added / Changed / Deprecated / Removed)\n2. лІ„м „ м—…лҚ°мқҙнҠё лӮҙмҡ© (ліҖкІҪ мң нҳ• к·јкұ° + кө¬лІ„м „ вҶ’ мӢ лІ„м „ + мҲҳм • лҢҖмғҒ нҢҢмқј)\n3. мҳҒн–Ҙл°ӣлҠ” м»ҙнҸ¬л„ҢнҠё лӘ©лЎқ\n4. кё°нҡҚмһҗ нҶөліҙ н•„мҡ” м—¬л¶Җ:\n   - MAJOR вҶ’ кё°нҡҚмһҗм—җкІҢ ліҖкІҪ лӮҙмҡ© кіөмң  н•„мҡ”. нҒҙлһҳмҠӨлӘ…В·нҶ нҒ°лӘ…мқҙ л°”лҖҢм—ҲмңјлҜҖлЎң кё°мЎҙ н”„лЎңнҶ нғҖмһ… мҪ”л“ң м җкІҖ н•„мҡ”. GitHub мһҗлҸҷ лҸҷкё°нҷ”лЎң м»Ён…ҚмҠӨнҠё мһ¬л“ұлЎқмқҖ л¶Ҳн•„мҡ”.\n   - MINORВ·PATCH вҶ’ нҶөліҙ л¶Ҳн•„мҡ”. GitHub мһҗлҸҷ лҸҷкё°нҷ”лЎң л°ҳмҳҒлҗЁ.\n"}, {"path": "workflow/planner.md", "label": "рҹ§ӯ Planner", "group": "workflow", "slug": "workflow--planner", "raw": "---\nfile: workflow/planner.md\nversion: 0.4.1\n---\n\n# рҹ§ӯ Planner Mode\n\nлӢ№мӢ мқҖ к№Җл°ҳмһҘ л””мһҗмқё мӢңмҠӨн…ңмқҳ м»ҙнҸ¬л„ҢнҠёлҘј мЎ°н•©н•ҙ н”„лЎңнҶ нғҖмһ…мқ„ л§Ңл“ңлҠ” кё°нҡҚмһҗмһ…лӢҲлӢӨ.<br>\nм•„лһҳ нқҗлҰ„м—җ л”°лқј мҡ”мІӯмқ„ мІҳлҰ¬н•ҳм„ёмҡ”.\n\n---\n\n## мҡ”мІӯ л¶„лҘҳ\n\n**н”„лЎңнҶ нғҖмһ…**\n\n| мӮ¬мҡ©мһҗ мҡ”мІӯ нҢЁн„ҙ | мӢӨн–үн•  нқҗлҰ„ |\n|:---|:---|\n| л§Ңл“Өм–ҙмӨҳ В· к·ёл ӨмӨҳ В· м§ңмӨҳ В· ліҙм—¬мӨҳ | [мғҲ н”„лЎңнҶ нғҖмһ… л§Ңл“Өкё°](#мғҲ-н”„лЎңнҶ нғҖмһ…-л§Ңл“Өкё°) |\n| мҲҳм •н•ҙмӨҳ В· л°”кҝ”мӨҳ В· м¶”к°Җн•ҙмӨҳ | [н”„лЎңнҶ нғҖмһ… мҲҳм •](#н”„лЎңнҶ нғҖмһ…-мҲҳм •) |\n\n---\n\n## н”„лЎңнҶ нғҖмһ…\n\n### мғҲ н”„лЎңнҶ нғҖмһ… л§Ңл“Өкё°\n\n**мӢңмһ‘ м „ мқҪмқ„ нҢҢмқј:** мӮ¬мҡ©н•  `components/*.md`мқҳ `## мҡ©лҸ„` ~ `## мҪ”л“ң` м„№м…ҳк№Ңм§Җл§Ң (мҠӨнҺҷВ·м ‘к·јм„ұ мІҙнҒ¬лҰ¬мҠӨнҠёлҠ” л””мһҗмқҙл„Ҳ мҳҒм—ӯ)\n\n**мһ‘м—… лӢЁкі„:**\n\n1. **мҡ”кө¬мӮ¬н•ӯ л¶„м„қ**\n   - кі„мёө мӢқлі„ вҖ” Atom В· Molecule В· Organism В· Pattern (вҶ’ [м»ҙнҸ¬л„ҢнҠё кі„мёө](#м»ҙнҸ¬л„ҢнҠё-кі„мёө))\n   - н•„мҡ” мғҒнғң мӢқлі„ вҖ” default В· empty В· loading В· error (вҶ’ [мғҒнғң нҢЁн„ҙ](#мғҒнғң-нҢЁн„ҙ))\n   - лҚ°мқҙн„° мў…лҘҳ нҢҢм•… вҖ” лӮ м§ң В· мҲ«мһҗ В· нҶөнҷ” В· л№Ҳк°’ (вҶ’ [лҚ°мқҙн„° н‘ңмӢң к·ңм№ҷ](#лҚ°мқҙн„°-н‘ңмӢң-к·ңм№ҷ))\n\n2. **м»ҙнҸ¬л„ҢнҠё л§Өм№ӯ**\n   - к°Ғ UI мҡ”мҶҢлҘј `components/*.md`м—җ мһҲлҠ” м»ҙнҸ¬л„ҢнҠём—җ л§Өн•‘\n   - к°Ғ м»ҙнҸ¬л„ҢнҠёмқҳ `## мҡ©лҸ„` В· `## к·ңм№ҷ`мқ„ нҷ•мқён•ҙ л§ҘлқҪм—җ л§һлҠ”м§Җ кІҖмҰқ (мҳҲ: л№„к°Җм—ӯ м•Ўм…ҳмқҙ м•„лӢҢлҚ° danger мӮ¬мҡ© вң—)\n   - мӢңмҠӨн…ңм—җ м—ҶлҠ” м»ҙнҸ¬л„ҢнҠёк°Җ н•„мҡ”н•ҳл©ҙ вҶ’ **мһ‘м—… мӨ‘лӢЁ**, мӮ¬мҡ©мһҗм—җкІҢ м•ҲлӮҙ:\n     \"мӢңмҠӨн…ңм—җ м—ҶлҠ” м»ҙнҸ¬л„ҢнҠёмһ…лӢҲлӢӨ. л””мһҗмқҙл„Ҳм—җкІҢ м»ҙнҸ¬л„ҢнҠё м¶”к°ҖлҘј мҡ”мІӯн•ң нӣ„ м§„н–үн•ҳм„ёмҡ”.\"\n\n3. **лӢЁмқј HTML м¶ңл Ҙ**\n   - к°Ғ `components/[name].md`мқҳ `## мҪ”л“ң` м„№м…ҳмқ„ к·ёлҢҖлЎң ліөмӮ¬ (`:root {}` нҸ¬н•Ё)\n   - мҷёл¶Җ CSSВ·JS мқҳмЎҙм„ұ м—Ҷмқҙ мһҗмІҙ мҷ„кІ°\n   - мғҒнғңлі„ лҚ°лӘЁ лӘЁл‘җ нҸ¬н•Ё вҖ” default В· empty В· loading В· error м „л¶Җ н‘ңмӢң\n   - м ‘к·јм„ұ мҶҚм„ұ нҸ¬н•Ё (вҶ’ [м ‘к·јм„ұ к·ңм№ҷ](#м ‘к·јм„ұ-к·ңм№ҷ))\n\n4. **мқёкі„ л©”нғҖ м¶ңл Ҙ** вҖ” мӮ¬мҡ©лҗң мӢңмҠӨн…ң лІ„м „В·м»ҙнҸ¬л„ҢнҠё лӘ©лЎқВ·мІҳлҰ¬ мғҒнғңВ·мҳҲмҷё мӮ¬н•ӯмқ„ yamlлЎң\n\n---\n\n### н”„лЎңнҶ нғҖмһ… мҲҳм •\n\n**мӢңмһ‘ м „ мқҪмқ„ нҢҢмқј:** мӮ¬мҡ©мһҗк°Җ м „лӢ¬н•ң кё°мЎҙ н”„лЎңнҶ нғҖмһ… HTML В· мҲҳм •м—җ н•„мҡ”н•ң `components/*.md`\n\n**мһ‘м—… лӢЁкі„:**\n\n1. кё°мЎҙ HTMLм—җм„ң мӮ¬мҡ©лҗң м»ҙнҸ¬л„ҢнҠё лӘ©лЎқ нҢҢм•…\n2. **ліҖкІҪ мң нҳ• нҢҗлӢЁ:**\n   - мғҒнғң м¶”к°ҖВ·л Ҳмқҙм•„мӣғ ліҖкІҪ вҶ’ кё°мЎҙ м»ҙнҸ¬л„ҢнҠё мң м§Җ, н•„мҡ”н•ң м»ҙнҸ¬л„ҢнҠёл§Ң м¶”к°Җ\n   - мӢңмҠӨн…ңм—җ м—ҶлҠ” м»ҙнҸ¬л„ҢнҠё мҡ”мІӯ вҶ’ **мһ‘м—… мӨ‘лӢЁ**, л””мһҗмқҙл„Ҳ кІҖнҶ  м•ҲлӮҙ\n3. мҲҳм •лҗң лӢЁмқј HTML м¶ңл Ҙ (м „мІҙ нҢҢмқј м¶ңл Ҙ, ліҖкІҪ л¶Җл¶„ мЈјм„қмңјлЎң н‘ңмӢң)\n4. **мқёкі„ л©”нғҖ м—…лҚ°мқҙнҠё** вҖ” ліҖкІҪ лӮҙмҡ©В·м¶”к°Җлҗң м»ҙнҸ¬л„ҢнҠёВ·мғҒнғң л°ҳмҳҒ\n\n---\n\n## Appendix: м»ҙнҸ¬л„ҢнҠё кі„мёө\n\nмқёкі„ л©”нғҖмқҳ `components-used` л¶„лҘҳм—җ мӮ¬мҡ©.\n\n| л Ҳмқҙм–ҙ | кё°мӨҖ | мҳҲмӢң |\n|--------|------|------|\n| **Atom** | л¶„н•ҙ л¶Ҳк°Җ, мқҳмЎҙм„ұ м—ҶмқҢ | Button В· Input В· Badge В· Toggle В· Icon |\n| **Molecule** | Atom 2к°ң+ кІ°н•©, лӢЁмқј кё°лҠҘ | FormField В· SearchBar В· Dropdown |\n| **Organism** | мһҗмІҙ л Ҳмқҙм•„мӣғ ліҙмң  | Table В· SidebarNav В· Card В· TopNav |\n| **Pattern** | нҺҳмқҙм§Җ мҲҳмӨҖ кө¬мЎ° | Dashboard В· ListPage В· DetailPage |\n\n---\n\n## Appendix: мғҒнғң нҢЁн„ҙ\n\nлҚ°мқҙн„°лҘј лӢӨлЈЁлҠ” лӘЁл“  м»ҙнҸ¬л„ҢнҠёлҠ” **default В· empty В· loading В· error** 4к°Җм§Җ мғҒнғңлҘј м •мқҳн•ңлӢӨ.\n\n### Empty State\n\n| мў…лҘҳ | л©”мӢңм§Җ | м•Ўм…ҳ |\n|------|--------|------|\n| мІ« м§„мһ… (лҚ°мқҙн„° м—ҶмқҢ) | \"м•„м§Ғ [н•ӯлӘ©]мқҙ м—Ҷм–ҙмҡ”\" | мғқм„ұ CTA |\n| н•„н„° кІ°кіј м—ҶмқҢ | \"мЎ°кұҙм—җ л§һлҠ” [н•ӯлӘ©]мқҙ м—Ҷм–ҙмҡ”\" | н•„н„° мҙҲкё°нҷ” |\n| к¶Ңн•ң м—ҶмқҢ | \"мқҙ [н•ӯлӘ©]м—җ м ‘к·ј к¶Ңн•ңмқҙ м—Ҷм–ҙмҡ”\" | кҙҖлҰ¬мһҗ л¬ёмқҳ м•ҲлӮҙ |\n\n### Loading State\n\n| мў…лҘҳ | мӮ¬мҡ©мІҳ | кё°мӨҖ |\n|------|--------|------|\n| Skeleton | л Ҳмқҙм•„мӣғ мҳҲмёЎ к°ҖлҠҘ (Table В· Card В· Form) | 1мҙҲ мқҙмғҒ мҳҲмғҒ |\n| Spinner | мҳҲмёЎ л¶Ҳк°Җ, м§§мқҖ мһ‘м—… (лІ„нҠј лӮҙл¶Җ В· мқёлқјмқё) | 1вҖ“3мҙҲ |\n| Progress bar | м§„н–үлҘ  н‘ңмӢң к°ҖлҠҘн•ң кёҙ мһ‘м—… (м—…лЎңл“ң В· мқјкҙ„ мІҳлҰ¬) | 3мҙҲ мқҙмғҒ |\n\n> вҡ пёҸ 1мҙҲ лҜёл§Ң LoadingмқҖ н‘ңмӢңн•ҳм§Җ м•ҠлҠ”лӢӨ (к№ңл№Ўмһ„ л°©м§Җ).\n\n### Error State\n\n| мў…лҘҳ | мӮ¬мҡ©мІҳ |\n|------|--------|\n| Inline | лӢЁмқј н•„л“ң м—җлҹ¬ (мһ…л Ҙ кІҖмҰқ) |\n| Banner | м„№м…ҳ лӢЁмң„ м—җлҹ¬ (м ҖмһҘ мӢӨнҢЁ В· к¶Ңн•ң л¶ҖмЎұ) |\n| Page | м „мІҙ нҺҳмқҙм§Җ лЎңл“ң мӢӨнҢЁ (404 В· 500) |\n\n> вҡ пёҸ лӘЁл“  м—җлҹ¬ л©”мӢңм§ҖлҠ” **мӣҗмқё + н•ҙкІ° л°©лІ•** кө¬мЎ°. мӮ¬кіјВ·мһҗмЎ° нҶӨ кёҲм§Җ.\n\n---\n\n## Appendix: м ‘к·јм„ұ к·ңм№ҷ\n\n| мғҒнҷ© | мІҳлҰ¬ |\n|------|------|\n| лӢЁлҸ… м•„мқҙмҪҳ лІ„нҠј | `aria-label=\"[лҸҷмһ‘ мқҙлҰ„]\"` н•„мҲҳ |\n| нҸј н•„л“ң | `<label>` лҳҗлҠ” `aria-labelledby` |\n| м—җлҹ¬ л©”мӢңм§Җ | `aria-describedby`лЎң н•„л“ң м—°кІ° + `role=\"alert\"` |\n| лҸҷм Ғ м—…лҚ°мқҙнҠё мҳҒм—ӯ | `aria-live=\"polite\"` |\n| мһҘмӢқмҡ© м•„мқҙмҪҳ | `aria-hidden=\"true\"` |\n| нӮӨліҙл“ң focus | `outline: none` лӢЁлҸ… мӮ¬мҡ© кёҲм§Җ. м»ҙнҸ¬л„ҢнҠё `.md`мқҳ focus мҠӨнғҖмқј к·ёлҢҖлЎң мң м§Җ |\n\n---\n\n## Appendix: лҚ°мқҙн„° н‘ңмӢң к·ңм№ҷ\n\n| мў…лҘҳ | нҳ•мӢқ | мҳҲ |\n|------|------|-----|\n| мҲ«мһҗ | мІңлӢЁмң„ мҪӨл§Ҳ | `1,234` |\n| нҒ° мҲ«мһҗ | н•ңкөӯм–ҙ лӢЁмң„ | `1,234л§Ң` |\n| лӮ м§ң | `YYYY.MM.DD` | `2025.06.01` |\n| лӮ м§ң+мӢңк°„ | `YYYY.MM.DD HH:mm` | `2025.06.01 14:30` |\n| нҶөнҷ” | лӢЁмң„ л’Ө, мІңлӢЁмң„ мҪӨл§Ҳ | `12,000мӣҗ` |\n| л№Ҳк°’ | em dash | `вҖ”` |\n| м§„н–үлҘ  | м •мҲҳ % | `85%` |\n\n> вҡ пёҸ к°ҷмқҖ м»¬лҹјВ·к°ҷмқҖ лҚ°мқҙн„° мў…лҘҳлҠ” нҳ•мӢқ нҶөмқј. нҳјмҡ© кёҲм§Җ.\n\n---\n\n## Appendix: Microcopy к·ңм№ҷ\n\n- нҶӨ: н•ҙмҡ”мІҙ\n- лІ„нҠј: лҸҷмӮ¬ лӘ…мӮ¬нҳ• (`м ҖмһҘ`, `мӮӯм ң` вҖ” `м ҖмһҘн•ҳкё°` вң—)\n- м—җлҹ¬: мӣҗмқё + н•ҙкІ° л°©лІ•, мӮ¬кіј нҶӨ кёҲм§Җ\n\n---\n\n## м¶ңл Ҙ нҳ•мӢқ\n\n```html\n<!-- design-system: v0.5.1 -->\n<!-- prototype: [н•ң мӨ„ м„ӨлӘ…] -->\n<!DOCTYPE html>\n<html lang=\"ko\">\n<head>\n  <meta charset=\"UTF-8\">\n  <title>[н”„лЎңнҶ нғҖмһ… мқҙлҰ„]<\/title>\n  <style>\n    /* === [ComponentName] (components/[name].md В§ мҪ”л“ң) === */\n    :root { /* м»ҙнҸ¬л„ҢнҠё мҪ”л“ң м„№м…ҳмқҳ нҶ нҒ° к°’ к·ёлҢҖлЎң */ }\n    .component-class { /* м»ҙнҸ¬л„ҢнҠё CSS к·ёлҢҖлЎң */ }\n\n    /* === [лӢӨмқҢ м»ҙнҸ¬л„ҢнҠёлӘ…] === */\n    :root { /* ... */ }\n    .next-component { /* ... */ }\n\n    /* л Ҳмқҙм•„мӣғВ·мЎ°н•© мҠӨнғҖмқј */\n  <\/style>\n<\/head>\n<body>\n  <section data-state=\"default\">...<\/section>\n  <section data-state=\"empty\">...<\/section>\n  <section data-state=\"loading\">...<\/section>\n  <section data-state=\"error\">...<\/section>\n<\/body>\n<\/html>\n```\n\n```yaml\n# к°ңл°ңмһҗ мқёкі„ л©”нғҖ\nprototype: [н•ң мӨ„ м„ӨлӘ…]\ndesign-system-version: 0.5.1\ncomponents-used:\n  - Atom/Button (v0.1.0)\n  - Molecule/FormField (v0.2.0)\nstates-covered: [default, empty, loading, error]\nnotes: |\n  - [мҳҲмҷё мӮ¬н•ӯ лҳҗлҠ” мӢңмҠӨн…ң мҷё мҡ”мІӯ мӮ¬н•ӯ]\n```\n\n---\n\n## м ҲлҢҖ н•ҳм§Җ л§җ кІғ\n\n- м—ӯн•  лІ”мң„ мҷё мҡ”мІӯ (мӢңмҠӨн…ң нҶ нҒ°В·мӣҗм№ҷ ліҖкІҪ, React/Vue ліҖнҷҳ) вҶ’ \"мқҙ лӘЁл“ңм—җм„ң мІҳлҰ¬н•ҳм§Җ м•ҠмҠөлӢҲлӢӨ. лӢӨлҘё м—ӯн•  лӘЁл“ңк°Җ н•„мҡ”н•©лӢҲлӢӨ\" м•ҲлӮҙ\n- `components/*.md`м—җ м—ҶлҠ” м»ҙнҸ¬л„ҢнҠё мҠӨнғҖмқј м§Ғм ‘ мһ‘м„ұ (л””мһҗмқҙл„Ҳ кІҖнҶ  м•ҲлӮҙ)\n- м»ҙнҸ¬л„ҢнҠё мҪ”л“ң м„№м…ҳмқҳ CSS мҲҳм • (нҶ нҒ° к°’В·нҒҙлһҳмҠӨ ліҖкІҪ лӘЁл‘җ л””мһҗмқҙл„Ҳ мҳҒм—ӯ)\n- мғҒнғң лҲ„лқҪ вҖ” нҠ№нһҲ empty В· loading В· error л№ лңЁлҰ¬м§Җ л§җ кІғ\n- м ‘к·јм„ұ мҶҚм„ұ лҲ„лқҪ\n- мӢңмҠӨн…ң лІ„м „ мЈјм„қ лҲ„лқҪ\n- мҷёл¶Җ CSSВ·JS лқјмқҙлёҢлҹ¬лҰ¬ мқҳмЎҙ (лӢЁмқј HTML мһҗмІҙ мҷ„кІ°)\n"}, {"path": "governance.md", "label": "л¬ём„ң к·ңм№ҷВ·лІ„м „", "group": "governance", "slug": "governance", "raw": "---\nfile: governance.md\nversion: 0.6.2\n---\n\n# л¬ём„ң к·ңм№ҷ & лІ„м „ кҙҖлҰ¬\n\n## л¬ём„ң н—ӨлҚ”\n\nмөңмғҒлӢЁм—җ `file`кіј `version`л§Ң нҸ¬н•Ён•ңлӢӨ.\n\n```yaml\n---\nfile: tokens/color.md\nversion: 0.3.0\n---\n```\n\n---\n\n## лІ„м „ к·ңм№ҷ\n\nSemantic Versioning (MAJOR.MINOR.PATCH)\n\n| лІ„м „ | мһҗлҰ¬ | кё°мӨҖ | н•ҙлӢ№н•ҳлҠ” ліҖкІҪ |\n|------|------|------|-------------|\n| **MAJOR** | мІ«м§ё | кё°мЎҙ мҪ”л“ңк°Җ к№Ём§ҖлҠ” ліҖкІҪ | нҒҙлһҳмҠӨлӘ…В·нҶ нҒ°лӘ… ліҖкІҪ, variant м ңкұ° |\n| **MINOR** | л‘ҳм§ё | кё°мЎҙ мҪ”л“ң мң м§Җ + кё°лҠҘ м¶”к°Җ | мғҲ variantВ·мғҒнғңВ·нҶ нҒ° м¶”к°Җ |\n| **PATCH** | м…Ӣм§ё | мҠӨнҺҷ ліҖкІҪ м—ҶлҠ” л¬ём„ң мҲҳм • | мҳӨнғҲмһҗВ·м„ӨлӘ…В·мҳҲмӢң мҲҳм • |\n\n```\n# MAJOR вҖ” кё°мЎҙ мҪ”л“ңлҘј лӢӨмӢң мҲҳм •н•ҙм•ј н•Ё\n0.2.0  вҶ’  1.0.0   .btn--primary нҒҙлһҳмҠӨлӘ…мқҙ .btn--brandлЎң ліҖкІҪлҗЁ\n\n# MINOR вҖ” кё°мЎҙ мҪ”л“ңлҠ” к·ёлҢҖлЎң, мғҲ кё°лҠҘл§Ң м¶”к°ҖлҗЁ\n0.1.0  вҶ’  0.2.0   ghost variant м¶”к°Җ\n\n# PATCH вҖ” мҪ”л“ңмҷҖ мҠӨнҺҷ ліҖкІҪ м—ҶмқҢ\n0.1.0  вҶ’  0.1.1   м„ӨлӘ… мҳӨнғҲмһҗ мҲҳм •\n```\n\n> рҹ’Ў **нҢҗлӢЁ кё°мӨҖ:** \"мқҙ ліҖкІҪмңјлЎң кё°мЎҙм—җ л§Ңл“Өм–ҙм§„ мҪ”л“ңлҘј лӢӨмӢң мҲҳм •н•ҙм•ј н•ҳлҠ”к°Җ?\"\n> YES вҶ’ MAJOR  /  мғҲ кё°лҠҘ м¶”к°Җ вҶ’ MINOR  /  л¬ём„ңл§Ң мҲҳм • вҶ’ PATCH\n\nліҖкІҪ м Ҳм°Ё: `CHANGELOG.md [Unreleased]` кё°лЎқ вҶ’ н—ӨлҚ” м—…лҚ°мқҙнҠё вҶ’ лҰҙлҰ¬мҰҲ мӢң git tag.\n"}, {"path": "tokens/_index.md", "label": "м•„нӮӨн…ҚмІҳ", "group": "tokens", "slug": "tokens--index", "raw": "---\nfile: tokens/_index.md\nversion: 0.7.0\n---\n\n# л””мһҗмқё мӢңмҠӨн…ң м•„нӮӨн…ҚмІҳ\n\nмӣҗмӢңк°’(Primitive)м—җм„ң мӢңмһ‘н•ҙ мқҳлҜё(Semantic)В·м»ҙнҸ¬л„ҢнҠё(Component) нҶ нҒ°мңјлЎң лӢЁкі„лҘј мҳ¬лҰ¬кі , л°ҳліөлҗҳлҠ” use caseлҠ” мң нӢёлҰ¬нӢ° нҒҙлһҳмҠӨлЎң л¬¶лҠ”лӢӨ.\n\n## нҶ нҒ° (3-tier)\n\nPrimitive(мӣҗмӢңк°’) вҶ’ Semantic(мҡ©лҸ„ л¶Җм—¬) вҶ’ Component(м»ҙнҸ¬л„ҢнҠё м „мҡ©) мҲңмңјлЎң м°ёмЎ°н•ңлӢӨ.\n\n| Tier | мң„м№ҳ | м»ҙнҸ¬л„ҢнҠём—җм„ң м§Ғм ‘ мӮ¬мҡ© |\n|------|------|----------------------|\n| Primitive | `tokens.css` мғҒлӢЁ | вқҢ кёҲм§Җ |\n| Semantic | `tokens.css` мӨ‘лӢЁ | вң… мӮ¬мҡ© |\n| Component | к°Ғ `.md` мҠӨнҺҷ м„№м…ҳ | вң… мӮ¬мҡ© |\n\n### нҶ нҒ° л„Өмқҙл°Қ\n\n> Semantic нҢЁн„ҙмқҖ мөңлҢҖ 3лӢЁкі„([мҶҚм„ұ]-[л§ҘлқҪ]-[ліҖнҳ•])мқҙл©°, л§ҘлқҪ м°Ёмӣҗмқҙ мқҳлҜё м—ҶлҠ” нҶ нҒ°мқҖ 2лӢЁкі„лҸ„ мң нҡЁн•ҳлӢӨ.\n> `radius`(мҪ”л„Ҳ нҒ¬кё°л§Ң мЎҙмһ¬), `height`(densityк°Җ л§ҘлқҪ), `shadow`В·`duration`В·`z-index` л“ұмқҙ н•ҙлӢ№н•ңлӢӨ.\n> typographyлҠ” 4м¶•(font-sizeВ·line-heightВ·letter-spacingВ·font-weight)мқ„ к°Ғк°Ғ лҸ…лҰҪм Ғмқё SemanticмңјлЎң м •мқҳн•ңлӢӨ.\n> use caseлі„ мЎ°н•©мқҖ нҶ нҒ°мқҙ м•„лӢҢ [мң нӢёлҰ¬нӢ° нҒҙлһҳмҠӨ](#мң нӢёлҰ¬нӢ°-нҒҙлһҳмҠӨ)лЎң м ңкіөн•ңлӢӨ.\n\n| нҶ нҒ° | Primitive | Semantic |\n|------|-----------|----------|\n| **нҢЁн„ҙ** | --[мҶҚм„ұ]-[к°’] | --[мҶҚм„ұ]-[л§ҘлқҪ]-[ліҖнҳ•] |\n| color | --color-[нҢ”л ҲнҠё]-[50вҖ“900]<br>`--color-brand-500`<br>`--color-gray-100` | --color-[л§ҘлқҪ]-[ліҖнҳ•]<br>`--color-text-body`<br>`--color-surface-base` |\n| space | --space-[pxк°’]<br>`--space-8`<br>`--space-16` | --space-[мң нҳ•]-[нҒ¬кё°]<br>`--space-inset-md`<br>`--space-gap-sm` |\n| font-size | --font-size-[pxк°’]<br>`--font-size-11`<br>`--font-size-14` | --font-size-[м—ӯн• ]<br>`--font-size-base`<br>`--font-size-h1` |\n| font-weight | --font-weight-[weightлӘ…]<br>`--font-weight-semibold` | --font-weight-[к°•мЎ°]<br>`--font-weight-body`<br>`--font-weight-heading`<br>`--font-weight-display` |\n| line-height | --line-height-[л°ҖлҸ„]<br>`--line-height-tight`<br>`--line-height-base`<br>`--line-height-relaxed` | --line-height-[м„ұм§Ҳ]<br>`--line-height-ui`<br>`--line-height-reading`<br>`--line-height-prose` |\n| letter-spacing | --letter-spacing-[нҒ¬кё°]<br>`--letter-spacing-tight`<br>`--letter-spacing-normal`<br>`--letter-spacing-wide` | --letter-spacing-[кі„мёө]<br>`--letter-spacing-default`<br>`--letter-spacing-display` |\n| font-family | вҖ” | --font-family-[мң нҳ•]<br>`--font-family-base` |\n| radius | --radius-[pxк°’]<br>`--radius-4`<br>`--radius-1000` | --radius-[нҒ¬кё°]<br>`--radius-sm`<br>`--radius-pill` |\n| height | --height-[pxк°’]<br>`--height-32`<br>`--height-36` | --height-[density]<br>`--height-compact`<br>`--height-base`<br>`--height-spacious` |\n| shadow | вҖ” | --shadow-[нҒ¬кё°]<br>`--shadow-md`<br>`--shadow-lg` |\n| z-index | вҖ” | --z-[л§ҘлқҪ]<br>`--z-modal`<br>`--z-toast` |\n| duration | вҖ” | --duration-[мҶҚлҸ„]<br>`--duration-fast`<br>`--duration-base` |\n\n> Component нҶ нҒ°мқҖ ліөмһЎн•ң м»ҙнҸ¬л„ҢнҠё(Modal, Table)мқҳ кі мң к°’м—җл§Ң мӮ¬мҡ©н•ңлӢӨ.<br>\n> ButtonВ·BadgeмІҳлҹј лӢЁмҲңн•ң м»ҙнҸ¬л„ҢнҠёлҠ” Semanticл§ҢмңјлЎң м¶©л¶„н•ҳлӢӨ.\n\n| нҶ нҒ° | Component |\n|------|-----------|\n| **нҢЁн„ҙ** | --[мҶҚм„ұ]-[м»ҙнҸ¬л„ҢнҠё]-[ліҖнҳ•]-[м—ӯн• ] |\n| color | `--color-button-primary-fill` |\n\n### нҶ нҒ° мӮ¬мҡ© к·ңм№ҷ\n\n> вң… DO вҖ” Semanticмқ„ нҶөн•ҙ м°ёмЎ°\n> `background: var(--color-button-primary-fill);`\n\n> вқҢ DON'T вҖ” Primitive м§Ғм ‘ мӮ¬мҡ©\n> `background: var(--color-brand-600);`\n\n> вқҢ DON'T вҖ” hex м§Ғм ‘ мӮ¬мҡ©\n> `background: #115ac6;`\n\n\n## мң нӢёлҰ¬нӢ° нҒҙлһҳмҠӨ\n\nм—¬лҹ¬ Semantic нҶ нҒ°мқ„ use case лӢЁмң„лЎң л¬¶мқҖ **CSS нҒҙлһҳмҠӨ**. нҶ нҒ°мқҙ м•„лӢҲлҜҖлЎң `var()`лЎң м°ёмЎ°н•ҳм§Җ м•Ҡкі  `class` мҶҚм„ұмңјлЎң м Ғмҡ©н•ңлӢӨ.\nл°ҳліөм ҒмңјлЎң н•Ёк»ҳ м“°мқҙлҠ” нҶ нҒ° мЎ°н•©мқ„ н•ң нҒҙлһҳмҠӨлЎң л¬¶м–ҙ, м»ҙнҸ¬л„ҢнҠё мҪ”л“ңм—җм„ң use case мқҳлҸ„лҘј м§Ғм ‘ л“ңлҹ¬лӮёлӢӨ.\n\n### мң нӢёлҰ¬нӢ° л„Өмқҙл°Қ\n\n> `[ліҖнҳ•]`мқҖ нҒ¬кё°В·к°•мЎ° л“ұмқҙ н•„мҡ”н•  л•Ңл§Ң м¶”к°Җн•ңлӢӨ.<br>\n> мһҗм„ён•ң use case лӘ©лЎқмқҖ к°Ғ мҶҚм„ұмқҳ мҠӨнҺҷ л¬ём„ңлҘј м°ёмЎ°н•ңлӢӨ (typographyлҠ” typography.md).\n\n| мң нӢёлҰ¬нӢ° | нҒҙлһҳмҠӨ |\n|---------|--------|\n| **нҢЁн„ҙ** | .[мҶҚм„ұ]-[use case]-[ліҖнҳ•] |\n| typography | .text-[use case]<br>.text-[use case]-[ліҖнҳ•]<br>`.text-body`<br>`.text-button-md`<br>`.text-page-title` |\n\n### мң нӢёлҰ¬нӢ° мӮ¬мҡ© к·ңм№ҷ\n\n> вң… DO вҖ” мң нӢёлҰ¬нӢ° нҒҙлһҳмҠӨлЎң use case м Ғмҡ©\n> `<button class=\"text-button-md\">лІ„нҠј<\/button>`\n\n> вң… DO вҖ” м •мқҳлҗң use caseк°Җ м—Ҷмқ„ л•Ңл§Ң Semantic нҶ нҒ° м§Ғм ‘ м°ёмЎ°\n> `font-size: var(--font-size-base); font-weight: var(--font-weight-heading);`\n\n> вқҢ DON'T вҖ” мң нӢёлҰ¬нӢ° нҒҙлһҳмҠӨлҘј нҶ нҒ°мІҳлҹј м°ёмЎ°\n> `font: var(--text-button-md);`\n\n> вҡ пёҸ мғҲ use caseк°Җ л°ҳліөм ҒмңјлЎң л“ұмһҘн•ҳл©ҙ вҶ’ мғҲ мң нӢёлҰ¬нӢ° нҒҙлһҳмҠӨ м¶”к°Җ\n"}, {"path": "tokens/color.md", "label": "мғүмғҒ", "group": "tokens", "slug": "tokens--color", "raw": "---\nfile: tokens/color.md\nversion: 1.0.0\ndepends-on: tokens/_index.md\n---\n\n# мғүмғҒ мӢңмҠӨн…ң\n\n## Primitive\n\nл°қкё° мҠӨмјҖмқј(50вҖ“950)лЎң кө¬м„ұлҗңлӢӨ. мҲ«мһҗк°Җ нҒҙмҲҳлЎқ м–ҙл‘ЎлӢӨ. нҢ”л ҲнҠёлі„ мӣҗмӢңк°’мқҙл©° м»ҙнҸ¬л„ҢнҠём—җм„ң м§Ғм ‘ м°ёмЎ°н•ҳм§Җ м•ҠлҠ”лӢӨ.\n\n### Blue\n\nмЈјмҡ” лёҢлһңл“ң м»¬лҹ¬. CTA лІ„нҠј, л§ҒнҒ¬, нҸ¬м»ӨмҠӨ л§Ғ, м„ нғқВ·нҷңм„ұ мғҒнғң.\n\n<div class=\"palette-placeholder\" data-palette=\"blue\"><\/div>\n\n### Cyan\n\nліҙмЎ° лёҢлһңл“ң м»¬лҹ¬. м •ліҙм„ұ л°°м§Җ, ліҙмЎ° м•Ўм…ҳ, лҚ°мқҙн„° мӢңк°Ғнҷ” кі„м—ҙ.\n\n<div class=\"palette-placeholder\" data-palette=\"cyan\"><\/div>\n\n### Gray\n\nмӨ‘лҰҪ UI. н…ҚмҠӨнҠё, л°°кІҪ, кө¬л¶„м„ , л№„нҷңм„ұ мғҒнғң м „л°ҳ.\n\n<div class=\"palette-placeholder\" data-palette=\"gray\"><\/div>\n\n### Green\n\nм„ұкіөВ·кёҚм • мғҒнғң. мҷ„лЈҢ, мҠ№мқё, м„ұкіө л©”мӢңм§Җ, мң нҡЁм„ұ кІҖмӮ¬ нҶөкіј.\n\n<div class=\"palette-placeholder\" data-palette=\"green\"><\/div>\n\n### Orange\n\nкІҪкі В·мЈјмқҳ мғҒнғң. мЈјмқҳк°Җ н•„мҡ”н•ң м •ліҙ, кё°н•ң мһ„л°•, к¶ҢмһҘ мӮ¬н•ӯ.\n\n<div class=\"palette-placeholder\" data-palette=\"orange\"><\/div>\n\n### Red\n\nмҳӨлҘҳВ·мң„н—ҳ мғҒнғң. м—җлҹ¬ л©”мӢңм§Җ, мӮӯм ң нҷ•мқё, мң„н—ҳ м•Ўм…ҳ.\n\n<div class=\"palette-placeholder\" data-palette=\"red\"><\/div>\n\n## Semantic\n\n| к·ёлЈ№ | мӮ¬мҡ©мІҳ | мҳҲмӢң |\n|------|--------|------|\n| `surface` | мӨ‘лҰҪ л°°кІҪ | `--color-surface-base`, `--color-surface-subtle`, `--color-surface-neutral`, `--color-surface-disabled`, `--color-surface-dark`, `--color-surface-dim` |\n| `surface` | лёҢлһңл“ң л°°кІҪ | `--color-surface-brand`, `--color-surface-brand-subtle`, `--color-surface-brand-tint`, `--color-surface-info-subtle`, `--color-surface-info-tint` |\n| `surface` | мғҒнғң л°°кІҪ | `--color-surface-success-subtle`, `--color-surface-caution-subtle`, `--color-surface-error-subtle` |\n| `text` | ліёл¬ёВ·UI н…ҚмҠӨнҠё | `--color-text-body`, `--color-text-display`, `--color-text-label`, `--color-text-subtle`, `--color-text-disabled`, `--color-text-inverse` |\n| `text` | лёҢлһңл“ң н…ҚмҠӨнҠё | `--color-text-brand-vivid`, `--color-text-brand`, `--color-text-brand-muted`, `--color-text-info`, `--color-text-info-muted` |\n| `text` | мғҒнғң н”јл“ңл°ұ | `--color-text-caution`, `--color-text-error` |\n| `border` | н…Ңл‘җлҰ¬В·кө¬л¶„м„  | `--color-border-subtle`, `--color-border-default`, `--color-border-disabled`, `--color-border-selected`, `--color-border-brand`, `--color-border-focus`, `--color-border-error` |\n| `action` | мӨ‘лҰҪ мқён„°лһҷм…ҳ | `--color-action-neutral-hover`, `--color-action-neutral-pressed`, `--color-action-neutral-selected`, `--color-action-neutral-overlay` |\n| `action` | лёҢлһңл“ң мқён„°лһҷм…ҳ | `--color-action-brand-hover`, `--color-action-brand-pressed`, `--color-action-brand-selected`, `--color-action-brand-overlay`, `--color-action-info-hover`, `--color-action-info-pressed`, `--color-action-info-selected`, `--color-action-info-overlay`, `--color-action-info-subtle` |\n| `action` | мң„н—ҳ мқён„°лһҷм…ҳ | `--color-action-error-hover`, `--color-action-error-pressed`, `--color-action-error-selected`, `--color-action-error-overlay` |\n\n\n## Do / Don't\n\n> вң… DO вҖ” Semantic мӮ¬мҡ©\n> `color: var(--color-text-body);`\n> `border: 1px solid var(--color-border-default);`\n\n> вқҢ DON'T вҖ” Primitive м§Ғм ‘ м°ёмЎ°\n> `color: var(--color-gray-950);`\n\n> вқҢ DON'T вҖ” hex м§Ғм ‘ мӮ¬мҡ©\n> `color: #131416;`\n"}, {"path": "tokens/space.md", "label": "кіөк°„", "group": "tokens", "slug": "tokens--space", "raw": "---\nfile: tokens/space.md\nversion: 1.0.0\ndepends-on: tokens/_index.md\n---\n\n# кіөк°„ мӢңмҠӨн…ң\n\n## Primitive\n\n4px кё°л°ҳ мҠӨмјҖмқјлЎң кө¬м„ұлҗңлӢӨ. мҶҢнҳ•(2вҖ“8px)мқҖ м»ҙнҸ¬л„ҢнҠё лӮҙл¶Җ м—¬л°ұм—җм„ң м„ёл°Җн•ҳкІҢ, мӨ‘нҳ•(8вҖ“24px)мқҖ 4px л°°мҲҳ, лҢҖнҳ•(24px~)мқҖ 8px мқҙмғҒмңјлЎң м җн”„н•ңлӢӨ.\n\n### Space\n\n<div class=\"scale-placeholder\" data-scale=\"space\"><\/div>\n\n### Height\n\nм»ҙнҸ¬л„ҢнҠё нҒҙлҰӯ мҳҒм—ӯ кі м • лҶ’мқҙ. paddingмңјлЎң лҶ’мқҙлҘј л§Ңл“Өм§Җ м•ҠлҠ”лӢӨ.\n\n<div class=\"scale-placeholder\" data-scale=\"height\"><\/div>\n\n## Semantic\n\n| к·ёлЈ№ | мӮ¬мҡ©мІҳ | мҳҲмӢң |\n|------|--------|------|\n| `inset` | <div data-ex=\"space-inset\"><\/div> м»Ён…Ңмқҙл„Ҳ мӮ¬л°© padding | `--space-inset-xs`, `--space-inset-sm`, `--space-inset-md`, `--space-inset-lg`, `--space-inset-xl`, `--space-inset-2xl` |\n| `inset-squish` | <div data-ex=\"space-inset-squish\"><\/div> мўҢмҡ°к°Җ мғҒн•ҳмқҳ 2л°°мқё padding вҖ” лІ„нҠјВ·нғңк·ёВ·pill | `--space-inset-squish-xs`, `--space-inset-squish-sm`, `--space-inset-squish-md`, `--space-inset-squish-lg`, `--space-inset-squish-xl`, `--space-inset-squish-2xl` |\n| `stack` | <div data-ex=\"space-stack\"><\/div> мҡ”мҶҢ м•„лһҳ м„ёлЎң margin | `--space-stack-xs`, `--space-stack-sm`, `--space-stack-md`, `--space-stack-lg`, `--space-stack-xl`, `--space-stack-2xl` |\n| `gap` | <div data-ex=\"space-gap\"><\/div> flexВ·grid мһҗмӢқ к°„кІ© вҖ” л¶ҖлӘЁм—җ м Ғмҡ© | `--space-gap-2xs`, `--space-gap-xs`, `--space-gap-sm`, `--space-gap-md`, `--space-gap-lg`, `--space-gap-xl`, `--space-gap-2xl`, `--space-gap-3xl` |\n| `generic` | лӢЁл°©н–Ҙ margin л“ұ мң„ 4к°Җм§ҖлЎң м•Ҳ лҗҳлҠ” мҳҲмҷё | `--space-generic-xs`, `--space-generic-sm`, `--space-generic-md`, `--space-generic-lg`, `--space-generic-xl`, `--space-generic-2xl` |\n| `height` | м»ҙнҸ¬л„ҢнҠё нҒҙлҰӯ мҳҒм—ӯ кі м • лҶ’мқҙ | `--height-tight`, `--height-dense`, `--height-compact`, `--height-base`, `--height-spacious`, `--height-loose` |\n\n## Do / Don't\n\n> вң… DO вҖ” мҡ©лҸ„м—җ л§һлҠ” Semantic мӮ¬мҡ©\n> `padding: var(--space-inset-md);`\n> `padding: var(--space-inset-squish-md);`\n> `margin-bottom: var(--space-stack-sm);`\n> `gap: var(--space-gap-sm);`\n\n> вқҢ DON'T вҖ” мһ„мқҳк°’ м§Ғм ‘ мӮ¬мҡ©\n> `padding: 16px;`\n> `margin-bottom: 8px;`\n\n> вң… DO вҖ” height нҶ нҒ°мңјлЎң лҶ’мқҙ кі м •\n> `.btn { height: var(--height-base); display: flex; align-items: center; }`\n\n> вқҢ DON'T вҖ” paddingмңјлЎң лҶ’мқҙ мЎ°м Ҳ\n> `.btn { padding: 8px 16px; }`\n\n> вң… DO вҖ” лӢЁл°©н–Ҙ marginмқҖ genericмңјлЎң к°’мқ„ к°Җм ёмҳӨкі  л°©н–ҘмқҖ CSSлЎң м§Җм •\n> `margin-inline-end: var(--space-generic-sm);`\n\n> вқҢ DON'T вҖ” Primitive м§Ғм ‘ м°ёмЎ°\n> `padding: var(--space-16);`\n"}, {"path": "tokens/typography.md", "label": "нғҖмқҙнҸ¬к·ёлһҳн”ј", "group": "tokens", "slug": "tokens--typography", "raw": "---\nfile: tokens/typography.md\nversion: 3.0.0\ndepends-on: tokens/_index.md\n---\n\n# нғҖмқҙнҸ¬к·ёлһҳн”ј\n\n3-tier кө¬мЎ°. Primitive(мӣҗмӢңк°’) вҶ’ Semantic(м¶•лі„ мқҳлҜё) вҶ’ Utility(м»ҙнҸ¬л„ҢнҠё use case л¬¶мқҢ).\nм»ҙнҸ¬л„ҢнҠёлҠ” **`.text-*` мң нӢё нҒҙлһҳмҠӨ**лЎң м Ғмҡ©н•ңлӢӨ.\n\n## Primitive\n\n### Font Family В· Font Size\n\nлӢЁмқјк°’. Pretendard лЎңл“ң мӢӨнҢЁ мӢң л’Өмқҳ к°’мқҙ мҲңм„ңлҢҖлЎң лҢҖмІҙлҗңлӢӨ. мҶҢнҳ•(11вҖ“15px)мқҖ UI л°ҖлҸ„мҡ©, мӨ‘нҳ•(17вҖ“20px)мқҖ UI к°•мЎ°В·мҶҢм ңлӘ©, лҢҖнҳ•(28вҖ“32px)мқҖ нҺҳмқҙм§Җ кө¬мЎ°.\n\n| нҶ нҒ° | к°’ |\n|------|----|\n| `--font-family-base` | Pretendard, Apple SD Gothic Neo, Malgun Gothic |\n\n<div class=\"scale-placeholder\" data-scale=\"font-size\"><\/div>\n\n### Font Weight В· Line Height В· Letter Spacing\n\n<div class=\"scale-placeholder\" data-scale=\"typography-props\"><\/div>\n\n## Semantic вҖ” 4м¶•\n\nк°Ғ мҶҚм„ұмқ„ лҸ…лҰҪм Ғмқё м¶•мңјлЎң л¶„лҰ¬н•ңлӢӨ. мң нӢё нҒҙлһҳмҠӨк°Җ мқҙ к°’мқ„ мЎ°н•©н•ңлӢӨ.\n\n| м¶• | мӮ¬мҡ©мІҳ | нҶ нҒ° |\n|---|--------|------|\n| `font-size` | м—ӯн• лі„ нҒ¬кё° (11вҖ“32px) | `--font-size-meta`, `--font-size-label`, `--font-size-sm`, `--font-size-base`, `--font-size-lg`, `--font-size-h4`, `--font-size-h3`, `--font-size-h2`, `--font-size-h1` |\n| `line-height` | мҪҳн…җмё  м„ұм§Ҳ вҖ” н•ң мӨ„ UI В· лӢӨмӨ„ ліёл¬ё В· кёҙ кёҖ | `--line-height-ui`, `--line-height-reading`, `--line-height-prose` |\n| `letter-spacing` | кі„мёө вҖ” кё°ліё В· 28px мқҙмғҒ лҢҖнҳ• н—Өл”© | `--letter-spacing-default`, `--letter-spacing-display` |\n| `font-weight` | к°•мЎ° вҖ” ліёл¬ё В· н—Өл”©В·UI В· нҺҳмқҙм§Җ нғҖмқҙнӢҖ | `--font-weight-body`, `--font-weight-heading`, `--font-weight-display` |\n\n## Utility вҖ” Use Caseлі„ л¬¶мқҢ нҒҙлһҳмҠӨ\n\nм»ҙнҸ¬л„ҢнҠё use caseлі„лЎң 4м¶•мқ„ л¬¶мқҖ нҒҙлһҳмҠӨ. **м»ҙнҸ¬л„ҢнҠёлҠ” мқҙ нҒҙлһҳмҠӨлЎң м Ғмҡ©н•ңлӢӨ.**\n\n| к·ёлЈ№ | мӮ¬мҡ©мІҳ | нҒҙлһҳмҠӨ |\n|------|--------|--------|\n| `button` | лІ„нҠј л Ҳмқҙлё” вҖ” мҶҢВ·мӨ‘В·лҢҖ | `.text-button-sm`, `.text-button-md`, `.text-button-lg` |\n| `form` | мқён’ӢВ·лқјлІЁВ·н—¬нҚј вҖ” мқён’ӢмқҖ мҶҢВ·мӨ‘ | `.text-input-sm`, `.text-input-md`, `.text-form-label`, `.text-helper` |\n| `table` | лҚ°мқҙн„° н…Ңмқҙлё” н—ӨлҚ”В·м…Җ | `.text-table-header`, `.text-table-cell` |\n| `navigation` | нғӯВ·лёҢл Ҳл“ңнҒ¬лҹјВ·л©”лүҙ | `.text-tab`, `.text-breadcrumb`, `.text-menu-item` |\n| `hierarchy` | нҺҳмқҙм§ҖВ·м„№м…ҳВ·м„ңлёҢм„№м…ҳВ·м№ҙл“ң м ңлӘ© | `.text-page-title`, `.text-section-title`, `.text-subsection-title`, `.text-card-title` |\n| `modal` | лӘЁлӢ¬ нғҖмқҙнӢҖ | `.text-modal-title` |\n| `status` | лұғм§ҖВ·нғңк·ёВ·нҲҙнҢҒ | `.text-badge`, `.text-tag`, `.text-tooltip` |\n| `bodyВ·meta` | ліёл¬ёВ·мәЎм…ҳВ·л©”нғҖм •ліҙ | `.text-body`, `.text-caption`, `.text-meta` |\n\n## Do / Don't\n\n> вң… DO вҖ” `.text-*` мң нӢё нҒҙлһҳмҠӨ м Ғмҡ©\n> `<button class=\"text-button-md\">лІ„нҠј<\/button>`\n> `<p class=\"text-body\">ліёл¬ё<\/p>`\n\n> вң… DO вҖ” use case м—Ҷмқ„ л•Ң Semantic нҶ нҒ° м§Ғм ‘ м°ёмЎ°\n> `font-size: var(--font-size-base);`\n> `font-weight: var(--font-weight-heading);`\n\n> вқҢ DON'T вҖ” Primitive м§Ғм ‘ м°ёмЎ°\n> `font-size: var(--font-size-14);`\n\n> вқҢ DON'T вҖ” мһ„мқҳк°’ м§Ғм ‘ мӮ¬мҡ©\n> `font-size: 14px; line-height: 1.5;`\n\n> вҡ пёҸ мғҲ use caseк°Җ л°ҳліөм ҒмңјлЎң л“ұмһҘн•ҳл©ҙ вҶ’ мғҲ `.text-*` нҒҙлһҳмҠӨ м¶”к°Җ\n> вҡ пёҸ ліёл¬ё мөңмҶҢ 13px (к°ҖлҸ…м„ұ)\n"}, {"path": "tokens/radius.md", "label": "Radius", "group": "tokens", "slug": "tokens--radius", "raw": "---\nfile: tokens/radius.md\nversion: 0.4.2\ndepends-on: tokens/_index.md\n---\n\n# Radius мӢңмҠӨн…ң\n\n\nPrimitiveлҠ” pxк°’мқ„ мқҙлҰ„мңјлЎң м“ҙлӢӨ. SemanticмқҖ м»ҙнҸ¬л„ҢнҠём—җм„ң м“°мқҙлҠ” л§ҘлқҪмңјлЎң мқҙлҰ„ л¶ҷмқёлӢӨ. мӢӨм ң нҶ нҒ° мҠӨмјҖмқјмқҖ `tokens.css` м°ёмЎ°.\n\n## м»ҙнҸ¬л„ҢнҠё shapeмҷҖмқҳ кҙҖкі„\n\nVariant лӘЁлҚёмқҳ `shape` м°Ёмӣҗмқҙ radius нҶ нҒ°м—җ м§Ғм ‘ лҢҖмқ‘н•ңлӢӨ.\n\n```\nshape: round   вҶ’  --radius-pill   (1000px)\nshape: square  вҶ’  --radius-sm     (4px)\n```\n\n## Do / Don't\n\n> вң… DO вҖ” Semantic нҶ нҒ° мӮ¬мҡ©\n> `border-radius: var(--radius-pill);`\n> `border-radius: var(--radius-sm);`\n\n> вқҢ DON'T вҖ” мһ„мқҳк°’ м§Ғм ‘ мӮ¬мҡ©\n> `border-radius: 1000px;`\n> `border-radius: 4px;`\n\n> вҡ пёҸ Figmaм—җ м—ҶлҠ” radius к°’мқ„ мһ„мқҳлЎң м¶”к°Җн•ҳм§Җ м•ҠлҠ”лӢӨ.\n> мғҲ к°’мқҙ н•„мҡ”н•ҳл©ҙ Figmaм—җ лЁјм Җ м •мқҳн•ң нӣ„ м¶”м¶ңн•ңлӢӨ.\n"}, {"path": "tokens/elevation.md", "label": "Elevation", "group": "tokens", "slug": "tokens--elevation", "raw": "---\nfile: tokens/elevation.md\nversion: 0.4.3\ndepends-on: tokens/_index.md\n---\n\n# Elevation\n\nzм¶•(к№Ҡмқҙ)мқ„ shadowмҷҖ z-index л‘җ к°Җм§ҖлЎң н‘ңнҳ„н•ңлӢӨ. л‘ҳмқҖ н•ӯмғҒ к°ҷмқҖ кі„мёөмқ„ м°ёмЎ°н•ңлӢӨ.\n\n| кі„мёө | shadow | z-index | мӮ¬мҡ©мІҳ |\n|------|--------|---------|--------|\n| base | `--shadow-sm` | вҖ” | м№ҙл“ң, hover к°•мЎ° |\n| dropdown | `--shadow-md` | `--z-dropdown` (100) | л“ңлЎӯлӢӨмҡҙ, нҢқмҳӨлІ„ |\n| sticky | вҖ” | `--z-sticky` (150) | кі м • н—ӨлҚ”, м»¬лҹј |\n| backdrop | вҖ” | `--z-backdrop` (200) | лӘЁлӢ¬ л°°кІҪл§ү |\n| modal | `--shadow-lg` | `--z-modal` (210) | лӘЁлӢ¬, мӮ¬мқҙл“ң нҢЁл„җ |\n| toast | `--shadow-xl` | `--z-toast` (300) | Toast, мөңмғҒмң„ м•ҢлҰј |\n| tooltip | `--shadow-md` | `--z-tooltip` (400) | нҲҙнҢҒ |\n\n## Do / Don't\n\n> вң… DO вҖ” shadowмҷҖ z-index к°ҷмқҖ кі„мёө мӮ¬мҡ©\n> `.modal { box-shadow: var(--shadow-lg); z-index: var(--z-modal); }`\n> `.toast { box-shadow: var(--shadow-xl); z-index: var(--z-toast); }`\n\n> вқҢ DON'T вҖ” мһ„мқҳ м •мҲҳ\n> `.modal { z-index: 9999; }`\n\n> вқҢ DON'T вҖ” кі„мёө л¶Ҳмқјм№ҳ (л“ңлЎӯлӢӨмҡҙм—җ лӘЁлӢ¬ к·ёлҰјмһҗ)\n> `.dropdown { box-shadow: var(--shadow-lg); }`\n\n> вҡ пёҸ н•ҳмң„ elevationм—җ мғҒмң„ shadow мӮ¬мҡ© кёҲм§Җ(мӢңк°Ғм Ғ кі„мёө мҳӨлҘҳ).\n> вҡ пёҸ к°ҷмқҖ л ҲлІЁ м»ҙнҸ¬л„ҢнҠёлҠ” к°ҷмқҖ shadow нҶ нҒ° мӮ¬мҡ©.\n"}, {"path": "tokens/motion.md", "label": "лӘЁм…ҳ", "group": "tokens", "slug": "tokens--motion", "raw": "---\nfile: tokens/motion.md\nversion: 0.4.2\ndepends-on: tokens/_index.md\n---\n\n# лӘЁм…ҳ мӢңмҠӨн…ң\n\n\nлӘЁм…ҳмқҖ мһҘмӢқмқҙ м•„лӢҢ м •ліҙ м „лӢ¬ мҲҳлӢЁмқҙлӢӨ. м„ё к°Җм§Җ лӘ©м Ғ мҷё мӮ¬мҡ© кёҲм§Җ.\n\n| лӘ©м Ғ | мӮ¬мҡ©мІҳ |\n|------|--------|\n| мғҒнғң н”јл“ңл°ұ | hover, pressed, focus мҰүк°Ғ л°ҳмқ‘ |\n| кіөк°„ кҙҖкі„ | л“ңлЎӯлӢӨмҡҙ м§„мһ…, лӘЁлӢ¬ л“ұмһҘ, мҠ¬лқјмқҙл“ң нҢЁл„җ |\n| мЈјмқҳ мң лҸ„ | м—җлҹ¬ л°ңмғқ, toast л“ұмһҘ |\n\n## Duration л§Өм№ӯ\n\n| нҶ нҒ° | мӮ¬мҡ©мІҳ |\n|------|--------|\n| `--duration-fast` (100ms) | hover, focus, мҰүк°Ғ мғҒнғң ліҖнҷ” |\n| `--duration-base` (150ms) | л“ңлЎӯлӢӨмҡҙ, нҢқмҳӨлІ„, мқјл°ҳ м „нҷҳ |\n| `--duration-slow` (200ms) | лӘЁлӢ¬, мӮ¬мқҙл“ң нҢЁл„җ, нҺҳмқҙм§Җ м „нҷҳ |\n\nкё°ліё easingмқҖ `--easing-base` мӮ¬мҡ©. м„ёл¶„нҷ”лҠ” лҸ„мһ… мӢңм җм—җ нҶ нҒ° м¶”к°Җн•ңлӢӨ.\n\n## Do / Don't\n\n> вң… DO вҖ” мҶҚм„ұ лӘ…мӢң + нҶ нҒ° мӮ¬мҡ©\n> `transition: background var(--duration-fast) var(--easing-base);`\n> `transition: opacity var(--duration-base) var(--easing-base);`\n\n> вқҢ DON'T вҖ” мһ„мқҳк°’, all мӮ¬мҡ©, мқҳлҜё м—ҶлҠ” л°ҳліө\n> `transition: all 0.3s ease-in-out;`\n> `animation: pulse 2s infinite;`\n\n## `prefers-reduced-motion` лҢҖмқ‘ (н•„мҲҳ)\n\n```css\n@media (prefers-reduced-motion: reduce) {\n  *, *::before, *::after {\n    transition-duration: 0.01ms !important;\n    animation-duration:  0.01ms !important;\n    animation-iteration-count: 1 !important;\n  }\n}\n```\n\n> вҡ пёҸ мһҗлҸҷ л°ҳліө м• лӢҲл©”мқҙм…ҳ, мһҘмӢқмҡ© лӘЁм…ҳ кёҲм§Җ.\n> вҡ пёҸ мӮ¬мҡ©мһҗк°Җ нҳём¶ңн•ҳм§Җ м•ҠмқҖ лӘЁм…ҳмқҖ л§Ңл“Өм§Җ м•ҠлҠ”лӢӨ(loading мқёл””мјҖмқҙн„° м ңмҷё).\n"}, {"path": "tokens/icon.md", "label": "м•„мқҙмҪҳ", "group": "tokens", "slug": "tokens--icon", "raw": "---\nfile: tokens/icon.md\nversion: 0.4.2\ndepends-on: tokens/_index.md\n---\n\n# м•„мқҙмҪҳ мӢңмҠӨн…ң\n\n\nм•„мқҙмҪҳ нҒ¬кё°лҠ” м»ҙнҸ¬л„ҢнҠё heightмҷҖ л§Өм№ӯн•ңлӢӨ. н•ң нҷ”л©ҙм—җм„ң мҠӨнғҖмқјмқҖ н•ҳлӮҳлЎң нҶөмқјн•ңлӢӨ.\n\n| нҶ нҒ° | нҒ¬кё° | мӮ¬мҡ©мІҳ |\n|------|------|--------|\n| `--icon-12` | 12px | ліҙмЎ° мқёл””мјҖмқҙн„°(badge лӮҙл¶Җ, л©”нғҖ м •ліҙ) |\n| `--icon-16` | 16px | кё°ліё. md size м»ҙнҸ¬л„ҢнҠё(Button, Input) |\n| `--icon-20` | 20px | lg size, лӢЁлҸ… м•„мқҙмҪҳ лІ„нҠј |\n| `--icon-24` | 24px | xl size, нҺҳмқҙм§Җ н—ӨлҚ”, л„Өл№„кІҢмқҙм…ҳ |\n\n## мҠӨнғҖмқј мқјкҙҖм„ұ\n\nн•ң нҷ”л©ҙм—җм„ң outlined лҳҗлҠ” filled мӨ‘ н•ҳлӮҳл§Ң мӮ¬мҡ©н•ңлӢӨ. нҳјмҡ© кёҲм§Җ.\nм„ нғқм Ғ к°•мЎ° н‘ңнҳ„(active мғҒнғң, м•ҢлҰј)м—җм„ңл§Ң filled н—Ҳмҡ©.\n\n## м •л ¬\n\n- н…ҚмҠӨнҠёмҷҖ н•Ёк»ҳ м“ё л•Ң мҳөнӢ°м»¬ м„јн„° м •л ¬ (line-height кё°мӨҖ мӨ‘м•ҷ)\n- м•„мқҙмҪҳкіј н…ҚмҠӨнҠё мӮ¬мқҙ к°„кІ©мқҖ `--space-gap-xs`\n- м•„мқҙмҪҳ мғүмғҒмқҖ н…ҚмҠӨнҠё мғүмғҒ мғҒмҶҚ (`color: inherit`)\n\n## Do / Don't\n\n> вң… DO вҖ” н…ҚмҠӨнҠё + м•„мқҙмҪҳ\n> `<button class=\"btn btn--md\"><Icon name=\"save\" size=\"16\" /> м ҖмһҘ<\/button>`\n\n> вқҢ DON'T вҖ” лӢЁлҸ… м•„мқҙмҪҳ + лқјлІЁ м—ҶмқҢ\n> `<button><Icon name=\"delete\" /><\/button>`\n\n> вң… DO вҖ” лӢЁлҸ… м•„мқҙмҪҳ лІ„нҠј (aria-label н•„мҲҳ)\n> `<button class=\"btn-icon\" aria-label=\"мӮӯм ң\"><Icon name=\"delete\" size=\"20\" /><\/button>`\n\n> вқҢ DON'T вҖ” outlinedмҷҖ filled нҳјмҡ©\n> `<Icon name=\"save\" variant=\"outlined\" />`\n> `<Icon name=\"delete\" variant=\"filled\" />`\n\n> вҡ пёҸ лӢЁлҸ… м•„мқҙмҪҳ лІ„нҠјмқҖ л°ҳл“ңмӢң `aria-label` лҳҗлҠ” `aria-labelledby` м ңкіө.\n> мһҗм„ён•ң м ‘к·јм„ұ мҡ”кө¬мӮ¬н•ӯмқҖ `accessibility.md` м°ёмЎ°.\n"}, {"path": "interaction.md", "label": "мқён„°лһҷм…ҳ", "group": "interaction", "slug": "interaction", "raw": "---\nfile: interaction.md\nversion: 0.1.0\n---\n\n# мқён„°лһҷм…ҳ\n\n## мғҒнғң нҢЁн„ҙ (лӘЁл“  мқён„°лһҷнӢ°лёҢ м»ҙнҸ¬л„ҢнҠё лҸҷмқј)\n\n```\ndefault  вҶ’  hover(л°қкІҢ)  вҶ’  pressed(м–ҙл‘ЎкІҢ)  вҶ’  disabled\n                                               bg:   --color-gray-100\n                                               text: --color-gray-400\n```\n\n> вҡ пёҸ мғүмғҒл§ҢмңјлЎң мғҒнғңлҘј кө¬л¶„н•ҳм§Җ м•ҠлҠ”лӢӨ. м•„мқҙмҪҳВ·н…ҚмҠӨнҠёлҘј л°ҳл“ңмӢң лі‘н–үн•ңлӢӨ.\n> н…ҚмҠӨнҠё-л°°кІҪ лҢҖл№„ мөңмҶҢ **4.5:1** (WCAG AA). мһҗм„ён•ң кё°мӨҖмқҖ `accessibility.md` м°ёмЎ°.\n"}, {"path": "adaptation.md", "label": "л°ҳмқ‘нҳ•В·лӢӨнҒ¬лӘЁл“ң", "group": "adaptation", "slug": "adaptation", "raw": "---\nfile: adaptation.md\nversion: 0.4.1\n---\n\n# л°ҳмқ‘нҳ• & лӢӨнҒ¬лӘЁл“ң\n\n> **м–ём ң м°ёмЎ°н•ҳлӮҳ:** л Ҳмқҙм•„мӣғ кІ°м •В·н…Ңл§Ҳ мІҳлҰ¬ мӢң лӘЁл“  мӮ¬лһҢ\n\n## л°ҳмқ‘нҳ• & Breakpoint\n\nк№Җл°ҳмһҘ 3.0мқҖ **лҚ°мҠӨнҒ¬нҶұ мҡ°м„ **мқҙлӢӨ. нғңлё”лҰҝк№Ңм§Җ м§Җмӣҗ, лӘЁл°”мқјмқҖ м¶”нӣ„ кІҖнҶ .\n\n| Breakpoint | л„Ҳл№„ | лҢҖмқ‘ л””л°”мқҙмҠӨ |\n|------------|------|--------------|\n| sm | < 768px | (нҳ„мһ¬ лҜём§Җмӣҗ) |\n| md | 768вҖ“1024px | нғңлё”лҰҝ |\n| lg | 1024вҖ“1440px | лҚ°мҠӨнҒ¬нҶұ (кё°ліё) |\n| xl | вүҘ 1440px | мҷҖмқҙл“ң лӘЁлӢҲн„° |\n\nContainer max width: `--layout-max-width: 1440px`\n\n### к·ңм№ҷ\n\n- м»ҙнҸ¬л„ҢнҠёлҠ” м»Ён…Ңмқҙл„Ҳ л„Ҳл№„м—җ л”°лқј мһҗм—°мҠӨлҹҪкІҢ stretchн•ңлӢӨ.\n- SidebarлҠ” `lg` мқҙмғҒм—җм„ңл§Ң кі м •. `md`м—җм„ңлҠ” collapse.\n- TableмқҖ `md` мқҙн•ҳм—җм„ң к°ҖлЎң мҠӨнҒ¬лЎӨ н—Ҳмҡ©. **м»¬лҹј reflow кёҲм§Җ**(лҚ°мқҙн„° л№„көҗ к°ҖлҠҘм„ұ мң м§Җ).\n- ModalмқҖ лӘЁл“  breakpointм—җм„ң max-width кі м • + нҷ”л©ҙ к°ҖмҡҙлҚ° м •л ¬.\n\n> вҡ пёҸ лӘЁл°”мқј(< 768px) лҢҖмқ‘мқҙ н•„мҡ”н•ң м»ҙнҸ¬л„ҢнҠёлҠ” лі„лҸ„ кё°нҡҚ нӣ„ м¶”к°Җ.\n> вҡ пёҸ B2B мӣҢнҒ¬н”ҢлЎңмҡ° нҠ№м„ұмғҒ нғңлё”лҰҝ лҜёл§ҢмқҖ л””мһҗмқё мқҳмӮ¬кІ°м • н•„мҡ”.\n\n## лӢӨнҒ¬лӘЁл“ң м •мұ…\n\n**нҳ„мһ¬ лқјмқҙнҠё лӘЁл“ңл§Ң м§Җмӣҗ.** нҶ нҒ° кө¬мЎ°лҠ” лӢӨнҒ¬лӘЁл“ң м „нҷҳмқ„ м „м ңлЎң м„Өкі„лҗҳм–ҙ мһҲмңјлӮҳ м •мӢқ м§ҖмӣҗмқҖ м¶”нӣ„ кІ°м •.\n\n### к·ңм№ҷ\n\n- м»ҙнҸ¬л„ҢнҠём—җм„ң hexк°’ м§Ғм ‘ мӮ¬мҡ© кёҲм§Җ(лӢӨнҒ¬лӘЁл“ң м „нҷҳ мӢң мқјкҙ„ к°Ҳм•„лҒјмҡё мҲҳ м—ҶкІҢ лҗЁ).\n- Surface, text, border, shadowлҠ” л°ҳл“ңмӢң Semantic нҶ нҒ° кІҪмң .\n- н–Ҙнӣ„ лӢӨнҒ¬лӘЁл“ң лҸ„мһ… мӢң Primitive м¶”к°Җ + Semantic л§Өн•‘ ліҖкІҪл§ҢмңјлЎң м „нҷҳ к°ҖлҠҘн•ҳлҸ„лЎқ мң м§Җ.\n\n> вң… DO вҖ” Semantic кІҪмң . лӢӨнҒ¬лӘЁл“ң м „нҷҳ мӢң нҶ нҒ°л§Ң л°”лҖҢл©ҙ лҗЁ\n> `.card { background: var(--color-surface-base); color: var(--color-text-body); }`\n\n> вқҢ DON'T вҖ” hexВ·Primitive м§Ғм ‘ м°ёмЎ° (лӢӨнҒ¬лӘЁл“ң м „нҷҳ л¶Ҳк°Җ)\n> `.card { background: #ffffff; color: var(--color-gray-900); }`\n\n> рҹ’Ў Semantic нҶ нҒ°мқ„ м§ҖнӮӨлҠ” н•ң лӢӨнҒ¬лӘЁл“ңлҠ” нҶ нҒ° л ҲлІЁ мһ‘м—…мңјлЎң лҒқлӮңлӢӨ. м»ҙнҸ¬л„ҢнҠё мҪ”л“ңлҠ” к·ёлҢҖлЎң.\n"}, {"path": "product.md", "label": "м ңн’Ҳ нҢЁн„ҙ", "group": "product", "slug": "product", "raw": "---\nfile: product.md\nversion: 0.4.2\n---\n\n# м ңн’Ҳ м ңм•Ҫ & нҢЁн„ҙ\n\n## B2B SaaS м ңм•Ҫ\n\n| м ңм•Ҫ | к·ңм№ҷ |\n|------|------|\n| м •ліҙ л°ҖлҸ„ | мһҘмӢқ мөңмҶҢнҷ”. к°ҷмқҖ л©ҙм Ғм—җ лҚ” л§ҺмқҖ м •ліҙ |\n| мҳӨлҘҳ л°©м§Җ | л№„к°Җм—ӯ н–үлҸҷ(мӮӯм ңВ·м „мҶЎ)мқҖ н•ӯмғҒ нҷ•мқё лӢЁкі„ |\n| л°ҳліө нҡЁмңЁ | нӮӨліҙл“ң лӮҙл№„кІҢмқҙм…ҳ н•„мҲҳ. мһҗмЈј м“°лҠ” н–үлҸҷ = мөңмҶҢ нҒҙлҰӯ |\n| мқјкҙҖм„ұ | к°ҷмқҖ кё°лҠҘ = к°ҷмқҖ мң„м№ҳВ·лӘЁм–‘. м»ҙнҸ¬л„ҢнҠё мҡ©лҸ„ мқҙнғҲ кёҲм§Җ |\n| лҚ°мқҙн„° мҡ°м„  | TableВ·FormВ·Filter мөңмҡ°м„ . EmptyВ·LoadingВ·Error state н•„мҲҳ |\n\n### Density лӘЁл“ң\n\nлҚ°мқҙн„° л°ҖлҸ„к°Җ лҶ’мқҖ нҷ”л©ҙ(Table, Form, List)мқҖ density лӘЁл“ңлҘј м„ нғқн•  мҲҳ мһҲлӢӨ.\n\n| лӘЁл“ң | м»ҙнҸ¬л„ҢнҠё height | мӮ¬мҡ©мІҳ |\n|------|-----------------|--------|\n| Compact | `--height-compact` | лҚ°мқҙн„° н…Ңмқҙлё”, кҙҖлҰ¬мһҗ нҷ”л©ҙ |\n| Comfortable | `--height-base` (кё°ліё) | мқјл°ҳ нҷ”л©ҙ |\n| Spacious | `--height-spacious` | нҸј мӨ‘мӢ¬ нҷ”л©ҙ, м„Өм • нҺҳмқҙм§Җ |\n\n> вҡ пёҸ н•ң нҺҳмқҙм§Җ лӮҙ density нҳјмҡ© кёҲм§Җ. нҺҳмқҙм§Җ лӢЁмң„лЎң нҶөмқј.\n> вҡ пёҸ Density ліҖкІҪмқҖ height нҶ нҒ°л§Ң л°”лҖҗлӢӨ. нҸ°нҠёВ·radiusлҠ” к·ёлҢҖлЎң мң м§Җ.\n\n## мғҒнғң нҢЁн„ҙ (Empty В· Loading В· Error)\n\nлҚ°мқҙн„°лҘј лӢӨлЈЁлҠ” лӘЁл“  м»ҙнҸ¬л„ҢнҠёлҠ” 4к°Җм§Җ мғҒнғңлҘј м •мқҳн•ңлӢӨ: **default В· empty В· loading В· error**.\n\n### Empty State\n\nмӣҗмқёлі„лЎң л©”мӢңм§ҖмҷҖ м•Ўм…ҳмқҙ лӢӨлҘҙлӢӨ. к°ҷмқҖ л№Ҳ нҷ”л©ҙмІҳлҹј мІҳлҰ¬н•ҳм§Җ м•ҠлҠ”лӢӨ.\n\n| мў…лҘҳ | л©”мӢңм§Җ | м•Ўм…ҳ |\n|------|--------|------|\n| мІ« м§„мһ… (лҚ°мқҙн„° м—ҶмқҢ) | \"м•„м§Ғ [н•ӯлӘ©]мқҙ м—Ҷм–ҙмҡ”\" | мғқм„ұ CTA |\n| н•„н„° кІ°кіј м—ҶмқҢ | \"мЎ°кұҙм—җ л§һлҠ” [н•ӯлӘ©]мқҙ м—Ҷм–ҙмҡ”\" | н•„н„° мҙҲкё°нҷ” |\n| к¶Ңн•ң м—ҶмқҢ | \"мқҙ [н•ӯлӘ©]м—җ м ‘к·ј к¶Ңн•ңмқҙ м—Ҷм–ҙмҡ”\" | кҙҖлҰ¬мһҗ л¬ёмқҳ м•ҲлӮҙ |\n\n### Loading State\n\n| мў…лҘҳ | мӮ¬мҡ©мІҳ | кё°мӨҖ |\n|------|--------|------|\n| Skeleton | л Ҳмқҙм•„мӣғ мҳҲмёЎ к°ҖлҠҘ (Table, Card list, Form) | 1мҙҲ мқҙмғҒ мҳҲмғҒ |\n| Spinner | мҳҲмёЎ л¶Ҳк°Җ, м§§мқҖ мһ‘м—… (лІ„нҠј лӮҙл¶Җ, мқёлқјмқё) | 1вҖ“3мҙҲ |\n| Progress bar | м§„н–үлҘ  н‘ңмӢң к°ҖлҠҘн•ң кёҙ мһ‘м—… (м—…лЎңл“ң, мқјкҙ„ мІҳлҰ¬) | 3мҙҲ мқҙмғҒ + м§„н–үлҘ  мёЎм • к°ҖлҠҘ |\n\n### Error State\n\n| мў…лҘҳ | мӮ¬мҡ©мІҳ |\n|------|--------|\n| Inline | лӢЁмқј н•„л“ң м—җлҹ¬ (мһ…л Ҙ кІҖмҰқ) |\n| Banner | м„№м…ҳ лӢЁмң„ м—җлҹ¬ (м ҖмһҘ мӢӨнҢЁ, к¶Ңн•ң л¶ҖмЎұ) |\n| Page | м „мІҙ нҺҳмқҙм§Җ лЎңл“ң мӢӨнҢЁ (404, 500) |\n\n### л©”мӢңм§Җ мһ‘м„ұ к·ңм№ҷ\n\n> вң… \"л„ӨнҠёмӣҢнҒ¬ м—°кІ°мқҙ лҒҠкІјм–ҙмҡ”. мһ мӢң нӣ„ лӢӨмӢң мӢңлҸ„н•ҙмЈјм„ёмҡ”.\"\n\n> вқҢ \"мЈ„мҶЎн•©лӢҲлӢӨ, м•Ң мҲҳ м—ҶлҠ” мҳӨлҘҳк°Җ л°ңмғқн–ҲмҠөлӢҲлӢӨ.\"\n\n> вҡ пёҸ лӘЁл“  м—җлҹ¬ л©”мӢңм§ҖлҠ” **мӣҗмқё + н•ҙкІ° л°©лІ•** кө¬мЎ°. мӮ¬кіјВ·мһҗмЎ° нҶӨ кёҲм§Җ.\n> вҡ пёҸ Loading 1мҙҲ лҜёл§ҢмқҖ н‘ңмӢңн•ҳм§Җ м•ҠлҠ”лӢӨ(к№ңл№Ўмһ„ л°©м§Җ).\n\n## лҚ°мқҙн„° нҸ¬л§·нҢ…\n\nн‘ңмӢң нҳ•мӢқмқҖ мӢңмҠӨн…ң м „мІҙм—җм„ң нҶөмқјн•ңлӢӨ. к°ҷмқҖ лҚ°мқҙн„° мў…лҘҳлҠ” н•ң нҷ”л©ҙ лӮҙм—җм„ң нҳ•мӢқмқ„ л§һм¶ҳлӢӨ.\n\n| мў…лҘҳ | нҳ•мӢқ | мҳҲ |\n|------|------|-----|\n| мҲ«мһҗ | мІңлӢЁмң„ мҪӨл§Ҳ, мқҢмҲҳлҠ” л§Ҳмқҙл„ҲмҠӨ л¶Җнҳё | `1,234,567` `-128` |\n| нҒ° мҲ«мһҗ | н•ңкөӯм–ҙ лӢЁмң„ н‘ңкё° | `1,234л§Ң` `12.5м–ө` |\n| мҶҢмҲҳм җ | н•ӯлӘ©лі„ мһҗлҰҝмҲҳ нҶөмқј | нҶөнҷ” 0мһҗлҰ¬, л№„мңЁ 1мһҗлҰ¬ |\n| лӮ м§ң | `YYYY.MM.DD` | `2025.06.01` |\n| лӮ м§ң+мӢңк°„ | `YYYY.MM.DD HH:mm` | `2025.06.01 14:30` |\n| мғҒлҢҖмӢңк°„ | 24мӢңк°„ мқҙлӮҙл§Ң мӮ¬мҡ© | `л°©кёҲ м „`, `3л¶„ м „`, `2мӢңк°„ м „` |\n| нҶөнҷ” | лӢЁмң„ л’Ө. мІңлӢЁмң„ мҪӨл§Ҳ | `12,000мӣҗ` |\n| л№Ҳк°’ | лӘЁл“  м»ҙнҸ¬л„ҢнҠё лҸҷмқј | `вҖ”` (em dash) |\n| м§„н–үлҘ  | м •мҲҳ % | `85%` |\n| IDВ·мҪ”л“ң | кі м •нҸӯ нҸ°нҠё | `--font-family-mono` |\n\n> вҡ пёҸ к°ҷмқҖ м»¬лҹјВ·к°ҷмқҖ лҚ°мқҙн„° мў…лҘҳлҠ” нҳ•мӢқ нҶөмқј. `1,234`мҷҖ `1234` нҳјмҡ© кёҲм§Җ.\n> вҡ ё°\" skip link\n\n## мҠӨнҒ¬лҰ°лҰ¬лҚ”\n\n- лӢЁлҸ… м•„мқҙмҪҳ лІ„нҠј: `aria-label` н•„мҲҳ\n- нҸј н•„л“ң: `<label>` лҳҗлҠ” `aria-labelledby`\n- м—җлҹ¬ л©”мӢңм§Җ: `aria-describedby`лЎң н•„л“ңмҷҖ м—°кІ°, мҰүк°Ғ м•ҢлҰјмқҖ `role=\"alert\"`\n- лҸҷм Ғ мҳҒм—ӯ: `aria-live=\"polite\"` (ліҖкІҪ) лҳҗлҠ” `assertive` (кёҙкёү)\n- мһҘмӢқмҡ© м•„мқҙмҪҳ: `aria-hidden=\"true\"`\n\n## мӢңк°Ғ\n\n- н…ҚмҠӨнҠё-л°°кІҪ лҢҖл№„ мөңмҶҢ **4.5:1** (нҒ° н…ҚмҠӨнҠё 18pt мқҙмғҒмқҖ 3:1)\n- focus ring `--color-border-focus` л°ҳл“ңмӢң к°ҖмӢң. `outline: none` лӢЁлҸ… мӮ¬мҡ© кёҲм§Җ\n- мғүмғҒл§ҢмңјлЎң мқҳлҜё м „лӢ¬ кёҲм§Җ. н…ҚмҠӨнҠёВ·м•„мқҙмҪҳВ·нҢЁн„ҙ лі‘н–ү\n- ліёл¬ё н…ҚмҠӨнҠё нҒ¬кё° мөңмҶҢ 13px\n\n## лӘЁм…ҳ\n\n- `prefers-reduced-motion: reduce` лҢҖмқ‘ н•„мҲҳ (`tokens/motion.md` м°ёмЎ°)\n- к№ңл№Ўмһ„ мҙҲлӢ№ 3нҡҢ мқҙн•ҳ (кҙ‘кіјлҜјм„ұ л°ңмһ‘ мҳҲл°©)\n\n> вҡ пёҸ м ‘к·јм„ұмқҖ мӮ¬нӣ„ м¶”к°Җк°Җ м•„лӢҲлқј м»ҙнҸ¬л„ҢнҠё м •мқҳ лӢЁкі„мқҳ кё°ліё мҡ”кұҙмқҙлӢӨ.\n> вҡ пёҸ м •мқҳм„ңмқҳ \"м ‘к·јм„ұ мІҙнҒ¬лҰ¬мҠӨнҠё\" м„№м…ҳмқҖ мң„ 4мҳҒм—ӯ(нӮӨліҙл“ңВ·мҠӨнҒ¬лҰ°лҰ¬лҚ”В·мӢңк°ҒВ·лӘЁм…ҳ)мқ„ лӘЁл‘җ м»ӨлІ„н•ҙм•ј н•ңлӢӨ.\n"}, {"path": "architecture.md", "label": "м»ҙнҸ¬л„ҢнҠё кө¬мЎ°", "group": "architecture", "slug": "architecture", "raw": "---\nfile: architecture.md\nversion: 0.4.2\n---\n\n# м»ҙнҸ¬л„ҢнҠё м•„нӮӨн…ҚмІҳ\n\n## Variant лӘЁлҚё\n\nлӘЁл“  м»ҙнҸ¬л„ҢнҠёлҠ” м•„лһҳ м°Ёмӣҗмқҳ мЎ°н•©мңјлЎң м •мқҳн•ңлӢӨ.\n\n```\nм»ҙнҸ¬л„ҢнҠё = type Г— style Г— size Г— state Г— icon(optional)\n```\n\n### Do / Don't\n\n> вң… DO вҖ” full name\n> `.btn--primary-fill .btn--md .btn--round`\n\n> вқҢ DON'T вҖ” м•Ҫм–ҙ мӮ¬мҡ©\n> `.btn--pr-fl .btn--m .btn--r`\n\n### мғҒнғң мҷ„м „м„ұ вҖ” лӘЁл“  мқён„°лһҷнӢ°лёҢ м»ҙнҸ¬л„ҢнҠём—җ н•„мҲҳ\n\n```\ndefault  В·  hover  В·  pressed  В·  disabled\n```\n\nм¶”к°Җ: `focus`(нӮӨліҙл“ң) В· `loading`(л№„лҸҷкё°)\n\n## м»ҙнҸ¬л„ҢнҠё кі„мёө\n\nмӢңмҠӨн…ң кё°л°ҳ(нҶ нҒ°В·кіөк°„В·мғүмғҒВ·нғҖмқҙнҸ¬В·elevationВ·лӘЁм…ҳВ·м•„мқҙмҪҳ)мқҙ лӘЁл‘җ м •мқҳлҗң нӣ„ м»ҙнҸ¬л„ҢнҠёлҘј л¶„лҘҳн•ңлӢӨ.\n\n```\nAtom  вҶ’  Molecule  вҶ’  Organism  вҶ’  Pattern\n
